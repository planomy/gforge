name: Deploy to GitHub Pages

# Bypasses GitHub's default "Deploy from a branch" workflow which is broken
# right now (jekyll-build-pages CDN download failures). We don't actually
# need Jekyll for a static HTML site — just upload the repo as an artifact
# and deploy it.
#
# REQUIRES: Settings → Pages → Source must be set to "GitHub Actions"
# (NOT "Deploy from a branch") for this workflow to deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # All actions pinned to older versions because GitHub's codeload CDN
      # is currently flaking on newer v-tag tarballs (random 'action could
      # not be found' errors with internal correlation IDs).
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
