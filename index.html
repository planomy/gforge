<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="expires" content="0" />
<title>Granny Boom — Slay aliens while you sharpen your writing</title>
<meta name="description" content="The game that lets you slay aliens while you improve your writing." />
<link rel="icon" type="image/png" href="logo.png" />
<link rel="apple-touch-icon" href="logo.png" />
<!-- Fun display fonts for headings + the splash countdown. Loaded async-ish
     via preconnect so they don't block initial paint. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bangers&family=Black+Ops+One&family=Patrick+Hand&display=swap" />
<style>
  :root {
    --bg-0: #0a0710;
    --bg-1: #140d20;
    --bg-2: #1f1530;
    --panel: rgba(255,255,255,0.05);
    --panel-2: rgba(255,255,255,0.09);
    --border: rgba(255,255,255,0.13);
    --text: #fff4e8;
    --muted: #b09cbf;
    --accent: #ff8a3d;
    --accent-2: #ffc24a;
    --accent-3: #ff5a3d;
    --good: #4ade80;
    --bad: #ff5a7a;
    --gold: #ffd166;
    --info: #6be3ff;
    --shadow: 0 10px 30px rgba(0,0,0,0.55);
    --scrollbar-track: var(--bg-1);
    --scrollbar-thumb: rgba(255, 138, 61, 0.72);
    --scrollbar-thumb-hover: rgba(255, 209, 102, 0.92);
  }

  /* Themed scrollbars — Firefox + WebKit (modals, splash, page overflow). */
  html {
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
  }
  * {
    box-sizing: border-box;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
  }
  *::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  *::-webkit-scrollbar-track {
    background: var(--scrollbar-track);
    border-radius: 999px;
  }
  *::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--accent-2), var(--accent));
    border-radius: 999px;
    border: 2px solid var(--scrollbar-track);
  }
  *::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, var(--gold), var(--accent-3));
  }
  *::-webkit-scrollbar-corner {
    background: var(--scrollbar-track);
  }
  html, body { height: 100%; }
  body {
    margin: 0; color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background:
      radial-gradient(1200px 800px at 10% -10%, #4a1810 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 10%, #2d0f3a 0%, transparent 55%),
      radial-gradient(900px 700px at 50% 120%, #2a1505 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-2));
    background-attachment: fixed;
    overflow-x: hidden;
  }
  body::before {
    /* ember sparks */
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 25px 80px, #ff8a3daa, transparent),
      radial-gradient(1.5px 1.5px at 220px 240px, #ffc24a88, transparent),
      radial-gradient(2px 2px at 410px 130px, #ff8a3d99, transparent),
      radial-gradient(1.5px 1.5px at 620px 290px, #ff5a3d77, transparent),
      radial-gradient(2px 2px at 820px 170px, #ffaa6688, transparent),
      radial-gradient(1.5px 1.5px at 140px 410px, #ff8a3d66, transparent),
      radial-gradient(1.5px 1.5px at 730px 480px, #ffc24a88, transparent),
      radial-gradient(2px 2px at 1020px 360px, #ff8a3d99, transparent),
      radial-gradient(1.5px 1.5px at 340px 540px, #ffaa6688, transparent),
      radial-gradient(1.5px 1.5px at 940px 620px, #ff8a3d77, transparent);
    background-size: 1100px 700px;
    background-repeat: repeat;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px 18px 80px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    backdrop-filter: blur(8px); box-shadow: var(--shadow);
    /* Granny's portrait pokes out of the bar on both sides — allow it. */
    overflow: visible;
    /* Lift topbar into its own stacking context so the [data-tip] tooltips
       (which hang below the icons via ::after) render OVER the panels that
       follow it in .app. Without this they get covered by later siblings. */
    position: relative;
    z-index: 50;
    /* Granny's portrait extends ~28px below the topbar via her negative
       bottom margin. Reserve that much space below so the next panel
       doesn't overlap her lower half. */
    margin-bottom: 32px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 900; letter-spacing: 1px; font-size: 18px;
    cursor: pointer;
    /* Granny is rendered taller than the bar — negative margins on the img
       keep .brand's layout height the same as the rest of the topbar, but
       the sprite itself overflows above and below for a "popping out of the
       bar" badge effect. Allow overflow so she doesn't get clipped. */
    overflow: visible;
    min-height: 38px;
  }
  /* Granny Boom wordmark — sits on the left of the brand cluster.
     Floats above the bar via negative top/bottom margins. */
  .brand .brand-wordmark {
    display: block;
    position: relative;
    height: 84px;
    width: auto;
    margin: -22px 0 -22px 0;
    z-index: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.55));
    transition: filter .2s ease, transform .2s ease;
    user-select: none; pointer-events: none;
  }
  /* Granny — sits on the RIGHT of the wordmark, overlapping it slightly
     so she appears to be stepping in front of the logo. The negative
     left margin produces the overlap; z-index ensures she's on top. */
  .brand .brand-granny {
    display: block;
    position: relative;
    height: 96px;
    width: auto;
    margin: -28px 4px -28px -32px;
    z-index: 2;
    filter:
      drop-shadow(-3px 4px 8px rgba(0,0,0,0.65))
      drop-shadow(0 0 18px rgba(255,138,61,0.40));
    transition: filter .2s ease, transform .2s ease;
    user-select: none; pointer-events: none;
  }
  .brand:hover .brand-granny {
    filter:
      drop-shadow(0 4px 10px rgba(0,0,0,0.6))
      drop-shadow(0 0 28px rgba(255,170,90,0.75));
    transform: translateY(-2px) scale(1.04);
  }
  .brand:hover .brand-wordmark {
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6)) drop-shadow(0 0 22px rgba(255,170,90,0.45));
    transform: translateY(-2px) scale(1.03);
  }

  /* ===== Splash / intro screen =====
     Welcome heading + framed hero artwork + tagline + fake loading bar with
     a rotating quip, then a 3-2-1-BOOM countdown before the home screen
     reveals. Lives above everything (z-index 9999) and fades on exit. */
  .splash {
    position: fixed; inset: 0; z-index: 9999;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(80,30,90,0.55) 0%, rgba(20,8,28,0.95) 55%, #050308 100%),
      #050308;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; box-sizing: border-box;
    opacity: 1; transition: opacity .55s ease;
    overflow: auto;
  }
  .splash.fade-out { opacity: 0; pointer-events: none; }
  .splash-stack {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px; width: 100%; max-width: 1100px;
  }
  /* Welcome heading — addresses the player by name with a gold-orange
     gradient on the name itself for a touch of celebration. */
  .splash-welcome {
    margin: 0; text-align: center; line-height: 1.15;
    font-size: clamp(22px, 3.8vw, 38px);
    font-weight: 900; letter-spacing: 0.5px;
    color: #ffe7b8;
    text-shadow: 0 2px 6px rgba(0,0,0,0.75), 0 0 22px rgba(255,138,61,0.25);
  }
  .splash-welcome .name {
    background: linear-gradient(180deg, #ffe28a 0%, #ff9a3d 55%, #c54a16 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
  }
  /* Hero artwork frame — 75% of viewport width (capped on huge screens),
     16:9 aspect, rounded with a warm orange glow ring. */
  .splash-hero-wrap {
    width: min(75vw, 960px);
    aspect-ratio: 16 / 9;
    border-radius: 22px;
    overflow: hidden;
    box-shadow:
      0 14px 50px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,170,90,0.40),
      0 0 36px rgba(255,138,61,0.28);
  }
  .splash-hero {
    display: block; width: 100%; height: 100%; object-fit: cover;
  }
  .splash-tag {
    max-width: 640px; text-align: center;
    color: #ffe7b8; font-weight: 800; letter-spacing: 0.5px;
    font-size: clamp(14px, 2.0vw, 19px); line-height: 1.35;
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    margin: 0;
  }
  .splash-loading {
    width: min(520px, 80vw);
    color: #fff8e0;
  }
  .splash-msg {
    font-size: 14px; font-weight: 700; letter-spacing: 0.4px;
    color: #ffd28a; text-align: center;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    margin-bottom: 8px; min-height: 1.2em;
    opacity: 0; transform: translateY(2px);
    transition: opacity .25s ease, transform .25s ease;
  }
  .splash-msg.show { opacity: 1; transform: translateY(0); }
  .splash-bar {
    position: relative;
    width: 100%; height: 14px; border-radius: 999px;
    background: linear-gradient(180deg, rgba(10,5,2,0.85), rgba(30,12,4,0.85));
    border: 1px solid rgba(255,170,90,0.45);
    box-shadow: 0 4px 14px rgba(0,0,0,0.55), inset 0 1px 2px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  .splash-fill {
    width: 0%; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #b6ff5a 0%, #ffd166 45%, #ff8a3d 85%, #ff5a3d 100%);
    box-shadow: 0 0 14px rgba(255,160,60,0.7), inset 0 1px 0 rgba(255,255,255,0.4);
    transition: width .15s linear;
  }
  .splash-skip {
    position: absolute; top: 18px; right: 20px; z-index: 2;
    background: rgba(0,0,0,0.55); color: #ffd28a;
    border: 1px solid rgba(255,170,90,0.5);
    padding: 6px 12px; border-radius: 999px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    backdrop-filter: blur(6px);
  }
  .splash-skip:hover { background: rgba(0,0,0,0.75); color: #fff; }
  /* Countdown numbers + final BOOM. Each one pops in via the splash-pop
     animation and is removed by JS when its slot ends. */
  .splash-count {
    position: absolute; left: 0; right: 0; top: 50%;
    transform: translateY(-50%);
    text-align: center; z-index: 3;
    font-family: "Black Ops One", "Bungee", system-ui, sans-serif;
    font-weight: 900; font-style: italic;
    pointer-events: none;
  }
  .splash-count .num {
    display: inline-block;
    font-size: clamp(120px, 22vw, 240px);
    line-height: 1;
    background: linear-gradient(180deg, #ffd76b 0%, #ff8a3d 55%, #b53a10 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 30px rgba(255,154,61,0.85)) drop-shadow(0 8px 16px rgba(0,0,0,0.6));
    animation: splash-pop .6s ease-out;
  }
  .splash-count .boom {
    display: inline-block;
    font-size: clamp(96px, 18vw, 200px);
    letter-spacing: 4px;
    background: linear-gradient(180deg, #fff2a0 0%, #ff5a3d 55%, #6e1208 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 40px rgba(255,90,61,0.9)) drop-shadow(0 0 80px rgba(255,154,61,0.6));
    animation: splash-boom .9s ease-out;
  }
  @keyframes splash-pop {
    0%   { transform: scale(0.4) rotate(-8deg); opacity: 0; }
    50%  { transform: scale(1.15) rotate(2deg); opacity: 1; }
    100% { transform: scale(1)    rotate(0);    opacity: 1; }
  }
  @keyframes splash-boom {
    0%   { transform: scale(0.2); opacity: 0; }
    35%  { transform: scale(1.4); opacity: 1; }
    65%  { transform: scale(1.0); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .topbar .spacer { flex: 1; min-width: 8px; }

  /* Critter nests in topbar gap: fixed-height row (egg ↔ hatchling swap). */
  .critter-nest {
    flex: 1; min-width: 0;
    height: 60px;
    display: flex; justify-content: center; align-items: flex-end; gap: 6px;
    padding: 0 4px;
    overflow: visible;
  }
  .critter-slot {
    position: relative;
    width: 66px;
    height: 60px;
    padding: 0; border: none; background: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: visible;
    cursor: pointer;
    transition: transform .15s ease;
    z-index: 2;
    flex-shrink: 0;
  }
  .critter-slot:hover { transform: translateY(-2px); }
  .critter-slot.empty { cursor: default; pointer-events: none; }
  .critter-slot-visual {
    width: 66px;
    height: 50px;
    flex: 0 0 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .critter-slot-base {
    width: 66px;
    height: 50px;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
  }
  .critter-slot .critter-occupant {
    width: 50px;
    height: 50px;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.55));
  }
  .critter-slot .critter-helmet {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 42px;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    z-index: 5;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.45));
  }
  .critter-slot-meta {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -2px;
    width: 100%;
    height: auto;
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: visible;
    pointer-events: none;
    z-index: 4;
  }
  .critter-slot.egg .critter-slot-visual {
    width: 66px;
    height: 50px;
  }
  .critter-slot.egg .critter-slot-base {
    width: 66px;
    height: 50px;
  }
  /* 1 day left — soft rainbow backlight behind egg (slow cycle). */
  .critter-slot.egg.hatch-1d .critter-slot-base {
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
  }
  .critter-slot.egg.hatch-1d .critter-slot-visual::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 72px;
    height: 44px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.9;
    background: radial-gradient(ellipse at 50% 50%,
      rgba(255, 120, 120, 0.75) 0%,
      rgba(255, 120, 120, 0.38) 46%,
      rgba(255, 120, 120, 0.12) 68%,
      transparent 84%);
    filter: blur(2px);
    animation: eggBacklightRainbow 27s linear infinite;
  }
  @keyframes eggBacklightRainbow {
    0% {
      background: radial-gradient(ellipse at 50% 50%,
        rgba(255, 120, 120, 0.75) 0%,
        rgba(255, 120, 120, 0.38) 46%,
        rgba(255, 120, 120, 0.12) 68%,
        transparent 84%);
    }
    20% {
      background: radial-gradient(ellipse at 50% 50%,
        rgba(255, 184, 110, 0.75) 0%,
        rgba(255, 184, 110, 0.38) 46%,
        rgba(255, 184, 110, 0.12) 68%,
        transparent 84%);
    }
    40% {
      background: radial-gradient(ellipse at 50% 50%,
        rgba(240, 228, 120, 0.75) 0%,
        rgba(240, 228, 120, 0.38) 46%,
        rgba(240, 228, 120, 0.12) 68%,
        transparent 84%);
    }
    60% {
      background: radial-gradient(ellipse at 50% 50%,
        rgba(120, 230, 170, 0.75) 0%,
        rgba(120, 230, 170, 0.38) 46%,
        rgba(120, 230, 170, 0.12) 68%,
        transparent 84%);
    }
    80% {
      background: radial-gradient(ellipse at 50% 50%,
        rgba(130, 188, 255, 0.75) 0%,
        rgba(130, 188, 255, 0.38) 46%,
        rgba(130, 188, 255, 0.12) 68%,
        transparent 84%);
    }
    100% {
      background: radial-gradient(ellipse at 50% 50%,
        rgba(196, 142, 255, 0.75) 0%,
        rgba(196, 142, 255, 0.38) 46%,
        rgba(196, 142, 255, 0.12) 68%,
        transparent 84%);
    }
  }
  .critter-slot.equipped .critter-occupant {
    filter:
      drop-shadow(0 0 0 rgba(0,0,0,0))
      drop-shadow(0 0 10px rgba(255, 194, 74, 0.75))
      drop-shadow(0 3px 6px rgba(0,0,0,0.58));
  }
  .slot-hatch-label {
    display: flex; flex-direction: column; align-items: center;
    margin: 0;
    pointer-events: none;
    text-align: center;
    line-height: 1;
    gap: 0;
  }
  .slot-hatch-label .line1,
  .slot-hatch-label .line2 {
    display: block;
    font-size: 8px;
    font-weight: 800;
    letter-spacing: 0.02em;
    line-height: 1.05;
    color: #ffd28a;
    text-shadow: 0 1px 3px rgba(0,0,0,0.85);
  }
  .slot-hatch-label .line2 { color: var(--gold); font-weight: 900; }
  .slot-care-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    margin: 0;
    pointer-events: none;
    width: 100%;
    max-width: 66px;
  }
  .slot-care-row {
    display: flex;
    align-items: center;
    gap: 3px;
    width: 100%;
    justify-content: center;
  }
  .slot-care-tag {
    font-size: 6px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: #ffd28a;
    text-shadow: 0 1px 2px rgba(0,0,0,0.85);
    flex: 0 0 auto;
    min-width: 18px;
    text-align: right;
  }
  .slot-care-segs {
    display: flex;
    gap: 2px;
    flex: 0 1 auto;
  }
  .slot-care-seg {
    display: block;
    width: 5px;
    height: 4px;
    border-radius: 1px;
    background: rgba(80, 40, 40, 0.55);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
    transform-origin: left center;
  }
  .slot-care-seg.low {
    background: #e85d5d;
    box-shadow: 0 0 3px rgba(232, 93, 93, 0.55);
  }
  .slot-care-seg.ok {
    background: #7ddea8;
    box-shadow: 0 0 4px rgba(125, 222, 168, 0.5);
  }
  .slot-care-seg.seg-fill-in {
    background: #e85d5d;
    box-shadow: 0 0 3px rgba(232, 93, 93, 0.55);
    animation: careSegFill 0.32s ease forwards;
  }
  .slot-care-label.clickable {
    pointer-events: auto;
    cursor: pointer;
  }
  .slot-care-label.clickable:hover .slot-care-tag { color: #fff0c8; }
  .pet-shop-targets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 0 0 12px;
  }
  .pet-shop-target {
    border: 1px solid rgba(255, 209, 102, 0.35);
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 800;
    color: #ffd28a;
    cursor: pointer;
  }
  .pet-shop-target.on {
    border-color: var(--accent);
    background: rgba(255, 138, 61, 0.2);
    color: #fff4e8;
  }
  .pet-shop-target .needs-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ff6b6b;
    margin-left: 4px;
    vertical-align: middle;
  }
  @keyframes careSegFill {
    from { background: #e85d5d; transform: scaleX(0.15); }
    to { background: #7ddea8; transform: scaleX(1); box-shadow: 0 0 4px rgba(125, 222, 168, 0.5); }
  }
  @media (max-width: 720px) {
    .critter-nest { gap: 4px; height: 52px; }
    .critter-slot { width: 52px; height: 52px; }
    .critter-slot-visual { width: 52px; height: 42px; flex-basis: 42px; }
    .critter-slot-base { width: 52px; height: 42px; }
    .critter-slot .critter-occupant { width: 39px; height: 39px; }
    .critter-slot .critter-helmet { width: 32px; top: -6px; }
    .critter-slot-meta { bottom: -1px; }
    .critter-slot.egg.hatch-1d .critter-slot-visual::before {
      width: 48px; height: 30px;
    }
    .slot-hatch-label .line1,
    .slot-hatch-label .line2 { font-size: 7px; line-height: 1.02; }
    .slot-care-tag { font-size: 5px; min-width: 14px; }
    .slot-care-seg { width: 4px; height: 3px; }
    .slot-care-row { gap: 2px; }
  }

  /* Critter reveal card (post birth-ship, pre-arcade) */
  .critter-reveal {
    text-align: center; max-width: 420px; margin: 0 auto;
  }
  .critter-reveal-kicker {
    font-size: 12px; font-weight: 900; letter-spacing: 0.18em;
    color: #6be3ff; text-transform: uppercase; margin-bottom: 6px;
  }
  .critter-reveal-art {
    margin: 8px auto 12px; max-height: 220px; width: auto; max-width: 100%;
    border-radius: 16px;
    filter: drop-shadow(0 0 28px rgba(107, 227, 255, 0.45));
    animation: shipUnlockPop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .critter-reveal-ph {
    width: 180px; height: 180px; margin: 8px auto 12px; border-radius: 20px;
    display: grid; place-items: center; font-size: 72px;
    background: radial-gradient(circle at 50% 40%, rgba(107,227,255,0.25), rgba(0,0,0,0.5));
    border: 2px solid rgba(255,255,255,0.12);
    animation: shipUnlockPop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border);
    font-size: 13px;
  }
  .chip .pts { color: var(--gold); font-weight: 800; }
  .chip .name { color: var(--accent-2); font-weight: 700; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Illustrated topbar pieces (player chip, XP chip, action icons).
     All foreign-style icons (avatar, XP badge, book, chart, trophy) are
     piped through a unifying filter chain so the row reads as one set
     instead of a flea-market jumble:
       saturate(0)       → strip every icon to grayscale (kills chaos)
       brightness(...)   → lift shadows so detail survives
       sepia(0.95)       → tint grayscale uniformly toward warm amber
       saturate(2.4)     → boost the new amber to gold
       hue-rotate(-10deg)→ fine-tune toward the Granny Boom orange-gold
       drop-shadow ×2    → consistent gold glow + soft black grounding
     The hangar ship icon and the wordmark are excluded so they keep their
     native colors (blue ship pops as the "equipped" highlight; the
     wordmark stays brand orange-and-blue). */
  :root {
    --icon-tint:
      saturate(0)
      brightness(1.08)
      sepia(0.95)
      saturate(2.4)
      hue-rotate(-10deg)
      drop-shadow(0 0 6px rgba(255, 184, 84, 0.50))
      drop-shadow(0 2px 4px rgba(0,0,0,0.55));
    --icon-tint-hover:
      saturate(0)
      brightness(1.2)
      sepia(0.95)
      saturate(2.6)
      hue-rotate(-10deg)
      drop-shadow(0 0 14px rgba(255, 210, 130, 0.75))
      drop-shadow(0 4px 6px rgba(0,0,0,0.55));
  }
  .top-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; border: none; padding: 0;
    color: var(--text);
  }
  .top-chip img { display: block; height: 38px; width: auto; filter: var(--icon-tint); transition: filter .25s ease, transform .15s ease; }
  .top-chip:hover img { filter: var(--icon-tint-hover); transform: translateY(-1px); }
  .top-chip .name {
    color: var(--accent-2); font-weight: 800; font-size: 13px;
    max-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .top-chip .pts {
    color: var(--gold); font-weight: 900; font-size: 14px;
    text-shadow: 0 0 10px rgba(255,209,102,0.45);
    margin-left: -2px;
  }
  .top-chip.xp img { height: 34px; }

  .icon-btn .pet-shop-badge {
    position: absolute;
    top: 1px;
    right: 1px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #ff6b6b;
    border: 1px solid rgba(0,0,0,0.45);
    box-shadow: 0 0 6px rgba(255, 100, 100, 0.75);
    pointer-events: none;
    z-index: 2;
  }
  .icon-btn .icon-btn-fallback {
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    font-size: 22px;
    line-height: 1;
    filter: var(--icon-tint);
  }
  .icon-btn {
    background: transparent; border: none; padding: 0; cursor: pointer;
    line-height: 0;
    transition: transform .15s ease;
    position: relative; /* anchor for [data-tip] tooltips */
  }
  .icon-btn img { display: block; height: 40px; width: 40px; object-fit: contain; filter: var(--icon-tint); transition: filter .25s ease; }
  .icon-btn:hover { transform: translateY(-2px) scale(1.06); }
  .icon-btn:hover img { filter: var(--icon-tint-hover); }
  .icon-btn:active { transform: translateY(0) scale(1); }

  /* Themed tooltips: replace OS-rendered title= popups with a Granny Boom
     styled bubble. Any element with [data-tip="..."] gets the bubble on
     hover, with a small arrow pointing up to it. Bangers font + gold-on-dark
     to match the topbar. */
  [data-tip] { position: relative; }
  [data-tip]:hover { z-index: 999; } /* lift the element so its tooltip wins z-order vs siblings */
  [data-tip]::after,
  [data-tip]::before {
    position: absolute;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s ease, transform .15s ease;
    z-index: 9999;
  }
  [data-tip]::after {
    content: attr(data-tip);
    top: calc(100% + 12px);
    left: 50%;
    transform: translate(-50%, -4px);
    background: linear-gradient(180deg, #2a1320 0%, #170914 100%);
    color: #ffd29a;
    font-family: "Bangers", "Black Ops One", Impact, "Arial Black", sans-serif;
    font-weight: 400;
    letter-spacing: 1.2px;
    font-size: 15px;
    line-height: 1.1;
    padding: 7px 14px 6px;
    border-radius: 10px;
    border: 1px solid rgba(255, 180, 90, 0.45);
    box-shadow: 0 6px 18px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.5),
                0 0 18px rgba(255,140,60,0.18);
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  [data-tip]::before {
    content: '';
    top: 100%;
    left: 50%;
    transform: translate(-50%, -2px);
    border: 7px solid transparent;
    border-bottom-color: rgba(255, 180, 90, 0.45);
    filter: drop-shadow(0 -1px 0 rgba(0,0,0,0.4));
  }
  [data-tip]:hover::after,
  [data-tip]:focus-visible::after { opacity: 1; transform: translate(-50%, 0); transition-delay: .15s; }
  [data-tip]:hover::before,
  [data-tip]:focus-visible::before { opacity: 1; transform: translate(-50%, 4px); transition-delay: .15s; }
  /* Tip-left / tip-right anchors when the element is near a screen edge */
  [data-tip-pos="left"]::after { left: auto; right: 0; transform: translate(0, -4px); }
  [data-tip-pos="left"]:hover::after { transform: translate(0, 0); }
  [data-tip-pos="left"]::before { left: auto; right: 14px; transform: translate(0, -2px); }
  [data-tip-pos="left"]:hover::before { transform: translate(0, 4px); }
  /* Hangar shows the equipped ship — keep its native blue/orange so it
     reads as the one "live" item in the row. Slightly bigger to anchor. */
  .icon-btn.hangar-btn img {
    height: 44px; width: 44px;
    filter:
      drop-shadow(0 0 8px rgba(80,180,255,0.65))
      drop-shadow(0 2px 4px rgba(0,0,0,0.55));
  }
  .icon-btn.hangar-btn:hover img {
    filter:
      drop-shadow(0 0 16px rgba(120,200,255,0.85))
      drop-shadow(0 4px 6px rgba(0,0,0,0.55));
  }
  @media (max-width: 520px) {
    .top-chip img { height: 30px; }
    .top-chip.xp img { height: 28px; }
    .top-chip .name { max-width: 80px; font-size: 12px; }
    .top-chip .pts { font-size: 12px; }
    .icon-btn img { height: 32px; width: 32px; }
    .icon-btn.hangar-btn img { height: 36px; width: 36px; }
  }

  /* Hangar modal */
  .hangar { max-width: 960px; }
  .hangar-sub { text-align: center; color: var(--muted); margin: 0 0 14px; font-size: 14px; }
  .hangar-sub strong { color: var(--gold); }
  .hangar-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
  }
  @media (min-width: 760px) { .hangar-grid { grid-template-columns: repeat(4, 1fr); } }
  .hangar-card {
    position: relative;
    background: linear-gradient(180deg, rgba(20,30,50,0.7) 0%, rgba(8,10,20,0.85) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .hangar-card.equipped { border-color: #4ad6ff; box-shadow: 0 0 0 2px rgba(74,214,255,0.35) inset, 0 8px 24px rgba(74,214,255,0.18); }
  .hangar-card.owned:not(.equipped):hover { transform: translateY(-3px); border-color: var(--accent-2); }
  .hangar-card.locked { opacity: 0.92; }
  /* Streak-reward cards (e.g. Granny) — flame-warmed border + glow so they
     read as "earned, not bought" at a glance. */
  .hangar-card.streak {
    border-color: rgba(255,120,40,0.55);
    background: linear-gradient(180deg, rgba(60,28,18,0.78) 0%, rgba(20,8,4,0.92) 100%);
  }
  .hangar-card.streak.equipped {
    border-color: #ff9a3d;
    box-shadow: 0 0 0 2px rgba(255,154,61,0.45) inset, 0 8px 24px rgba(255,154,61,0.28);
  }
  .hangar-card.streak .hangar-img-wrap {
    background: radial-gradient(circle at 50% 55%, rgba(255,120,40,0.30), transparent 65%);
  }
  .hangar-card.streak .hangar-img { filter: drop-shadow(0 6px 14px rgba(255,140,60,0.55)); }
  .hangar-shots {
    position: absolute; top: 8px; right: 10px;
    background: linear-gradient(135deg, #ff8a3d, #ffd166);
    color: #1a0a04; font-weight: 900; font-size: 12px;
    padding: 2px 8px; border-radius: 999px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    letter-spacing: 0.5px;
  }
  .hangar-img-wrap {
    width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 55%, rgba(74,214,255,0.18), transparent 65%);
  }
  .hangar-img {
    max-width: 100%; max-height: 100%;
    filter: drop-shadow(0 6px 14px rgba(74,214,255,0.45));
    user-select: none; pointer-events: none;
  }
  .hangar-name { margin: 4px 0 2px; font-size: 15px; color: #e6f3ff; }
  .hangar-blurb { font-size: 11.5px; color: var(--muted); margin: 0 0 10px; min-height: 30px; }
  .hangar-btn-cta { width: 100%; font-size: 13px; padding: 8px 10px; }
  .hangar-cta { padding: 6px; font-weight: 800; }
  .hangar-cta.cta-equipped { color: #4ad6ff; letter-spacing: 1px; }
  .hangar-cta.cta-locked { color: var(--muted); font-size: 13px; line-height: 1.4; }
  .hangar-need { font-size: 11px; color: var(--gold); margin-top: 2px; font-weight: 700; }

  /* Ship unlock celebration — full-screen thrill beat before forge results */
  .modal.ship-unlock-modal {
    max-width: 520px;
    border-color: rgba(107, 227, 255, 0.45);
    box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.25) inset,
                0 0 60px rgba(74, 214, 255, 0.35),
                0 30px 90px rgba(0, 0, 0, 0.75);
    animation: shipUnlockModalIn 0.45s cubic-bezier(0.34, 1.45, 0.64, 1) both;
  }
  @keyframes shipUnlockModalIn {
    from { transform: scale(0.82) translateY(24px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }
  .ship-unlock-celebration { text-align: center; }
  .ship-unlock-kicker {
    font-size: 12px; font-weight: 900; letter-spacing: 0.22em;
    color: #6be3ff; text-transform: uppercase; margin-bottom: 4px;
    animation: shipUnlockKicker 0.8s ease-in-out infinite alternate;
  }
  @keyframes shipUnlockKicker {
    from { opacity: 0.75; text-shadow: 0 0 8px rgba(107, 227, 255, 0.4); }
    to { opacity: 1; text-shadow: 0 0 18px rgba(255, 209, 102, 0.9); }
  }
  .ship-unlock-title {
    margin: 0 0 8px; font-size: clamp(30px, 6vw, 42px); font-weight: 900;
    letter-spacing: 0.06em; line-height: 1.05;
    background: linear-gradient(135deg, #e8fbff 0%, #6be3ff 35%, #ffd166 70%, #ff8a3d 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 20px rgba(107, 227, 255, 0.55));
  }
  .ship-unlock-hero-wrap {
    margin: 10px auto 6px; padding: 12px;
    background: radial-gradient(circle at 50% 55%, rgba(74, 214, 255, 0.28), transparent 68%);
    border-radius: 16px;
  }
  .ship-unlock-hero {
    display: block; margin: 0 auto; max-height: 150px; width: auto;
    animation: shipUnlockPop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.12s both;
    filter: drop-shadow(0 0 22px rgba(74, 214, 255, 0.7))
            drop-shadow(0 0 40px rgba(255, 138, 61, 0.45));
  }
  @keyframes shipUnlockPop {
    0% { transform: scale(0.25) rotate(-8deg); opacity: 0; filter: brightness(2.5); }
    65% { transform: scale(1.1) rotate(2deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .ship-unlock-name { margin: 0; font-size: 22px; color: #e6f3ff; font-weight: 900; }
  .ship-unlock-power {
    margin: 6px 0 10px; font-size: 15px; font-weight: 900; color: var(--gold);
    letter-spacing: 0.04em;
  }
  .ship-unlock-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 98;
    background: radial-gradient(circle at 50% 40%, rgba(107, 227, 255, 0.35), transparent 55%);
    animation: shipUnlockFlash 0.55s ease-out forwards;
  }
  @keyframes shipUnlockFlash {
    0% { opacity: 0; }
    15% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700;
    transition: transform .08s, background .15s, box-shadow .15s;
    font-size: 14px; user-select: none;
  }
  .btn:hover { background: rgba(255,255,255,0.13); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent-3), var(--accent), var(--accent-2));
    color: #1a0a04; border-color: transparent; box-shadow: 0 8px 20px rgba(255,138,61,0.35);
  }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.ghost { background: transparent; }
  .btn.warn { background: linear-gradient(135deg, #ffd166, #ffaa00); color: #2a1d04; }
  .btn.danger { background: linear-gradient(135deg, #ff5a7a, #ff8a3d); color: #1a0b0b; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .btn.lg { padding: 14px 22px; font-size: 16px; border-radius: 14px; }

  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px; box-shadow: var(--shadow); backdrop-filter: blur(8px);
  }

  /* Hero */
  .hero { margin-top: 18px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
  @media (max-width: 760px) { .hero { grid-template-columns: 1fr; } }
  .hero h1 {
    margin: 0 0 8px; font-size: clamp(28px, 4vw, 40px); line-height: 1.05;
    background: linear-gradient(120deg, #fff, #ffd9b8 60%, #ffaa66);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: 0.2px;
  }
  .hero p { color: var(--muted); margin: 0 0 16px; font-size: 15px; line-height: 1.5; }

  .section-title { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin: 18px 0 8px; }

  /* Name screen */
  .center-screen { min-height: 70vh; display: grid; place-items: center; }
  .name-card { width: 100%; max-width: 560px; text-align: center; }
  /* Welcome heading uses the Bangers comic font for personality. The
     gradient + bevel-y stack matches the Granny Boom brand. */
  .name-card h2 {
    margin: 4px 0 10px;
    font-family: "Bangers", "Black Ops One", Impact, "Arial Black", sans-serif;
    font-weight: 400; /* Bangers ships at a single weight */
    font-size: clamp(30px, 5vw, 44px);
    letter-spacing: 2px;
    line-height: 1.05;
    background: linear-gradient(180deg, #ffe28a 0%, #ff9a3d 55%, #c54a16 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.55)) drop-shadow(0 0 18px rgba(255,138,61,0.35));
    transform: rotate(-1.5deg);
  }
  .name-card p {
    color: #d8e2ff;
    margin: 0 0 18px;
    font-size: 16px; line-height: 1.45;
    font-weight: 600;
  }
  .name-card input {
    width: 100%; padding: 14px 16px; font-size: 18px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
    outline: none; text-align: center;
  }
  .name-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,138,61,0.25); }

  /* Topic tabs — 2×3 grid of illustrated banner buttons */
  .topic-tabs {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px 10px;
    margin: 12px 0 14px;
    width: 100%;
  }
  .topic-tab {
    position: relative;
    background: transparent; border: none; padding: 0; cursor: pointer;
    transition: transform .15s ease, filter .25s ease;
    filter: brightness(0.55) saturate(0.55) drop-shadow(0 4px 12px rgba(0,0,0,0.45));
    display: flex; align-items: center; justify-content: center;
    width: 100%; min-width: 0; line-height: 0;
  }
  .topic-tab:hover {
    filter: brightness(0.85) saturate(0.85) drop-shadow(0 6px 18px rgba(0,0,0,0.5));
    transform: translateY(-2px);
  }
  .topic-tab.active {
    transform: translateY(-3px);
    filter: brightness(1.05) saturate(1.1)
            drop-shadow(0 8px 22px rgba(0,0,0,0.5))
            drop-shadow(0 0 18px var(--tab-glow, rgba(255,138,61,0.6)));
  }
  .topic-tab[data-topic="sport"]     { --tab-glow: rgba(74,222,128,0.6); }
  .topic-tab[data-topic="adventure"] { --tab-glow: rgba(255,194,74,0.6); }
  .topic-tab[data-topic="mystery"]   { --tab-glow: rgba(167,139,250,0.65); }
  .topic-tab[data-topic="scifi"]     { --tab-glow: rgba(107,227,255,0.6); }
  .topic-tab[data-topic="fantasy"]   { --tab-glow: rgba(192,132,252,0.65); }
  .topic-tab[data-topic="horror"]    { --tab-glow: rgba(239,68,68,0.6); }
  .topic-tab img {
    height: 46px; width: 100%; max-width: 100%;
    object-fit: contain; display: block; pointer-events: none;
  }
  .topic-tab .progress {
    position: absolute; top: 2px; right: 5px; z-index: 2;
    font-size: 10px; padding: 1px 6px; border-radius: 999px;
    background: rgba(10,7,16,0.85); color: #fff4e8; font-weight: 900;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    line-height: 1.5;
  }
  @media (max-width: 520px) {
    .topic-tab img { height: 38px; }
    .topic-tabs { gap: 6px 8px; margin: 10px 0 12px; }
    .topic-tab .progress { font-size: 9px; padding: 1px 5px; top: 1px; right: 3px; }
  }

  /* Daily Quest — full-width (legacy) or compact inside welcome panel */
  .daily-quest {
    position: relative;
    margin: 18px 0 14px;
    padding: 26px 18px 16px;
    display: flex; align-items: center; gap: 16px;
    background: linear-gradient(135deg, #2a1530 0%, #3a1f44 60%, #2a1530 100%);
    border: 1px solid rgba(255, 209, 102, 0.45);
    border-radius: 18px;
    box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.12), 0 14px 36px rgba(0,0,0,0.45);
    overflow: hidden; isolation: isolate;
  }
  .daily-quest::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(900px 240px at 20% -20%, rgba(255,209,102,0.18), transparent 60%);
  }
  .daily-quest .dq-ribbon {
    position: absolute; top: 0; left: 0;
    background: linear-gradient(135deg, #ffd166, #ffaa00);
    color: #2a1d04;
    font-family: 'Bangers', 'Black Ops One', Impact, sans-serif;
    font-size: 13px; letter-spacing: 1.6px;
    padding: 6px 16px;
    border-radius: 0 0 12px 0;
    box-shadow: 0 6px 16px rgba(255,170,0,0.35);
  }
  /* Square thumbnail of the actual story art on the left side of the
     tile. Falls back to the topic emoji if no art file exists. */
  .daily-quest .dq-thumb {
    position: relative;
    width: 96px; height: 96px;
    border-radius: 14px;
    overflow: hidden;
    flex-shrink: 0;
    background: linear-gradient(135deg, #2a1530, #140d20);
    border: 1px solid rgba(255, 209, 102, 0.4);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  }
  .daily-quest.claimed .dq-thumb { border-color: rgba(74, 222, 128, 0.45); }
  .daily-quest .dq-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .daily-quest .dq-thumb-fallback {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 48px; line-height: 1;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.55));
  }
  /* Title + subtitle only — stays compact on the left. */
  .daily-quest .dq-text { flex: 0 1 auto; min-width: 0; max-width: 38%; }
  /* Middle band: sentence-stem preview fills the gap before the CTA. */
  .daily-quest .dq-stems-col {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    align-items: center;
    padding: 0 8px 0 4px;
  }
  .daily-quest .dq-title {
    font-family: 'Bangers', 'Black Ops One', Impact, sans-serif;

  /* Story cards */
  .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 14px; }
  .story-card {
    --t1: #ff8a3d; --t2: #ffc24a;
    position: relative;
    /* Equal inset on all four sides — the artwork sits inside the card
       like a picture in a frame. Picked specifically to match the
       adventure deck look the user singled out as the gold standard. */
    padding: 10px 10px 12px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 18px; cursor: pointer; text-align: left;
    transition: transform .15s ease, box-shadow .25s ease, border-color .25s;
    overflow: hidden; isolation: isolate;
  }
  .story-card[data-topic="sport"]     { --t1: #4ade80; --t2: #22d3ee; }
  .story-card[data-topic="adventure"] { --t1: #ff8a3d; --t2: #ffc24a; }
  .story-card[data-topic="mystery"]   { --t1: #a78bfa; --t2: #ec4899; }
  .story-card[data-topic="scifi"]     { --t1: #6be3ff; --t2: #8b5cf6; }
  .story-card[data-topic="fantasy"]   { --t1: #c084fc; --t2: #f472b6; }
  .story-card[data-topic="horror"]    { --t1: #f87171; --t2: #991b1b; }
  /* Sci-fi PNGs are edge-to-edge; adventure art has a baked-in black matte.
     Shrink the image slightly so the art well shows a dark frame like adventure. */
  .story-card[data-topic="scifi"] .art { background: #08060c; }
  .story-card[data-topic="scifi"] .art img { transform: scale(0.92); }
  /* Fantasy PNGs keep a thin transparent matte; zoom slightly so the
     topic gradient frame doesn't peek around the artwork. */
  .story-card[data-topic="fantasy"] .art img { transform: scale(1.06); }
  .story-card[data-topic="fantasy"]:hover .art img { transform: scale(1.12); }
  .story-card:hover {
    transform: translateY(-4px);
    border-color: color-mix(in srgb, var(--t1) 55%, transparent);
    box-shadow: 0 20px 40px rgba(0,0,0,0.55), 0 0 0 1px color-mix(in srgb, var(--t1) 30%, transparent),
                0 0 36px color-mix(in srgb, var(--t1) 22%, transparent);
  }

  .story-card .art {
    position: relative; aspect-ratio: 4 / 3; width: 100%;
    background: linear-gradient(135deg, color-mix(in srgb, var(--t1) 65%, #1a0a14), color-mix(in srgb, var(--t2) 55%, #140a1f));
    overflow: hidden;
    /* Curved inner corners so every theme reads as a framed picture
       inside the outer card, not a flush edge-to-edge poster. */
    border-radius: 12px;
  }
  /* When the real image loads, JS sets the art's aspect-ratio to match the
     image's natural ratio, so cover never has to crop. */
  .story-card .art img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform .5s ease, filter .25s;
  }
  .story-card:hover .art img { transform: scale(1.07); }
  .story-card[data-topic="scifi"]:hover .art img { transform: scale(0.97); }
  .story-card .art-fallback {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 72px; pointer-events: none;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.5));
    opacity: 0.7;
  }
  .story-card .art::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, transparent 45%, rgba(10,7,16,0.78) 100%);
  }
  .story-card .art .sheen {
    position: absolute; inset: 0; pointer-events: none; opacity: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
    transition: opacity .35s, transform .6s;
    transform: translateX(-30%);
  }
  .story-card:hover .art .sheen { opacity: 1; transform: translateX(30%); }

  .story-card .l {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    font-size: 11px; font-weight: 900; letter-spacing: 1.2px;
    color: #fff; background: rgba(0,0,0,0.55); padding: 4px 10px; border-radius: 999px;
    backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.12);
  }
  .story-card .l.l1 { color: #b6ffd0; }
  .story-card .l.l2 { color: #ffe7a8; }
  .story-card .l.l3 { color: #ffb6c4; }

  .story-card .forged-stamp {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    font-size: 11px; font-weight: 900; letter-spacing: 1px;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #052e13; padding: 4px 10px; border-radius: 999px;
    box-shadow: 0 6px 18px rgba(34,197,94,0.45);
  }

  /* Card padding (10px) now provides the horizontal inset, so the body
     just adds vertical spacing between the framed art and the meta row. */
  .story-card .body { padding: 12px 4px 2px; position: relative; z-index: 1; }
  .story-card h3 {
    margin: 0; font-size: 18px; font-weight: 900; letter-spacing: 0.2px;
    color: #fff4e8;
    text-shadow: 0 1px 0 rgba(0,0,0,0.35);
  }
  .story-card .ctx {
    color: var(--muted); font-size: 12.5px; margin-top: 6px; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    min-height: 2.9em;
  }
  .story-card .meta {
    display: flex; gap: 8px; margin-top: 12px; align-items: center; justify-content: space-between;
    color: var(--muted); font-size: 12px; font-weight: 700;
  }
  /* When art loads, title is baked into the image — hide the text title + context
     and tighten the body so it's just the CTA row. */
  .story-card.has-art .body { padding: 10px 4px 0; }
  .story-card.has-art h3,
  .story-card.has-art .ctx { display: none; }
  .story-card.has-art .meta { margin-top: 0; }
  .story-card .play-cta {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--t1), var(--t2));
    color: #0a0710; padding: 6px 12px; border-radius: 999px;
    font-size: 11.5px; font-weight: 900; letter-spacing: 0.4px;
    box-shadow: 0 4px 14px color-mix(in srgb, var(--t1) 35%, transparent);
    transition: transform .15s, box-shadow .2s;
  }
  .story-card:hover .play-cta { transform: translateX(2px); }
  .story-card.done .play-cta {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #052e13;
    box-shadow: 0 4px 14px rgba(34,197,94,0.35);
  }
  .story-card .paragon-mark {
    color: var(--gold); font-weight: 900; letter-spacing: 0.5px; font-size: 11px;
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* Forge screen */
  .forge { display: flex; flex-direction: column; gap: 14px; }
  .forge-head { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .forge-head .crumb { color: var(--muted); font-size: 13px; }

  .forge-title-row {
    display: flex; align-items: center; gap: 14px;
    margin: 8px 0 4px;
  }
  .forge-title-col { flex: 1 1 auto; min-width: 0; }
  .forge-title-col h2 {
    overflow: hidden; text-overflow: ellipsis;
  }
  .forge-thumb {
    flex: 0 0 auto;
    height: 140px; max-width: 240px;
    border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 10px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    background: rgba(0,0,0,0.3);
  }
  .forge-thumb img {
    height: 100%; width: auto; max-width: 100%;
    display: block; object-fit: cover;
  }
  @media (max-width: 520px) {
    .forge-thumb { height: 96px; max-width: 150px; border-radius: 10px; }
  }
  .progress-dots { display: flex; gap: 8px; }
  .progress-dots .d {
    width: 26px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.12);
  }
  .progress-dots .d.done { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .progress-dots .d.current { background: var(--accent); box-shadow: 0 0 10px rgba(255,138,61,0.6); }

  .build-display {
    background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; font-size: 19px; line-height: 1.7; color: #fff4e8;
    font-family: Georgia, "Times New Roman", serif;
  }
  .build-display .opener { color: var(--accent-2); font-weight: 700; }
  .build-display .slot-blank {
    display: inline-block; min-width: 70px; padding: 0 6px;
    border-bottom: 2px dashed rgba(255,138,61,0.55);
    color: rgba(255,255,255,0.35);
    text-align: center;
  }
  .build-display .slot-filled {
    display: inline-block; padding: 1px 6px; border-radius: 6px;
    background: rgba(255,138,61,0.16); color: #fff;
    border-bottom: 2px solid var(--accent);
  }
  .build-display .slot-wrong {
    background: rgba(255,90,122,0.18); border-bottom-color: var(--bad);
  }
  .build-display .slot-correct {
    background: rgba(74,222,128,0.15); border-bottom-color: var(--good);
  }

  .containers { display: grid; gap: 12px; }
  .container-card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; padding: 14px;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .container-card.wrong { border-color: var(--bad); background: linear-gradient(160deg, rgba(255,90,122,0.10), transparent 70%); }
  .container-card.correct { border-color: rgba(74,222,128,0.6); background: linear-gradient(160deg, rgba(74,222,128,0.08), transparent 70%); }
  .container-card .role {
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    font-weight: 800;
  }
  .options { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt {
    background: linear-gradient(180deg, #2a1d40, #1d1230);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 10px;
    padding: 8px 14px; cursor: pointer; color: #fff; font-weight: 600; font-size: 15px;
    transition: transform .08s, background .15s, border-color .15s;
    font-family: Georgia, "Times New Roman", serif;
  }
  .opt:hover { background: linear-gradient(180deg, #36254f, #251638); border-color: rgba(255,138,61,0.4); }
  .opt:active { transform: translateY(1px); }
  .opt.selected {
    background: linear-gradient(180deg, #ff8a3d, #ff5a3d);
    color: #1a0a04; border-color: var(--accent-2);
    box-shadow: 0 6px 16px rgba(255,138,61,0.35);
  }
  .opt.locked { background: linear-gradient(180deg, #2c8b6f, #186650); color: #fff; border-color: rgba(74,222,128,0.5); cursor: default; }

  .forge-actions {
    position: sticky; bottom: 14px;
    display: flex; gap: 10px; justify-content: space-between; align-items: center;
    background: rgba(10,7,16,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px;
  }
  .forge-actions .info { color: var(--muted); font-size: 13px; }

  /* Typing step */
  .typing-card {
    background: linear-gradient(160deg, rgba(74,222,128,0.10), rgba(255,138,61,0.05));
    border: 1px solid rgba(74,222,128,0.45); border-radius: 14px; padding: 16px;
  }
  .typing-card h3 { margin: 0 0 8px; color: var(--good); font-size: 16px; }
  /* IMPORTANT: .ref (target sentence) and textarea (student's typing) share
     identical font-family / font-size / line-height / padding / letter-spacing
     so kids can compare letter-for-letter top vs bottom. Eye-tracking
     suffers if even 1px of font-size differs between the two — so they're
     bundled into one block and kept in lockstep. */
  .typing-card .ref,
  .typing-card textarea {
    font-family: Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    letter-spacing: 0;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
  }
  .typing-card .ref {
    margin: 8px 0; color: #fff4e8;
    user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
    cursor: default;
  }
  .typing-card .ref::selection { background: transparent; }
  .typing-card .ref::-moz-selection { background: transparent; }
  .typing-card textarea {
    width: 100%; color: var(--text);
    outline: none;
    min-height: 70px; resize: vertical;
  }
  .typing-card textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,138,61,0.2); }
  .typing-card .matchbar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; margin-top: 8px; overflow: hidden; }
  .typing-card .matchbar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .25s; width: 0%; }
  .typing-card .helper { color: var(--muted); font-size: 12px; margin-top: 6px; }

  /* Toast / modal / confetti (shared from EALD pattern) */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: rgba(20,13,32,0.95); border: 1px solid var(--border); padding: 12px 16px;
    border-radius: 14px; color: var(--text); display: flex; gap: 10px; align-items: center;
    box-shadow: var(--shadow); z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -6px); pointer-events: auto; }
  .toast .em { font-size: 22px; }

  .modal-back {
    position: fixed; inset: 0; background: rgba(2,2,8,0.78); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 18px;
    backdrop-filter: blur(6px);
  }
  .modal-back.show { display: flex; }
  .modal {
    width: 100%; max-width: 580px; background: linear-gradient(160deg, #2a1530, #140d20);
    border: 1px solid var(--border); border-radius: 20px; padding: 24px; text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7); animation: pop .25s ease;
    max-height: 92vh; overflow-y: auto;
  }
  .modal.wide { max-width: 960px; }
  @keyframes pop { from { transform: scale(.9); opacity: 0;} to { transform: scale(1); opacity: 1;} }
  .modal h2 { margin: 0 0 6px; font-size: 28px; }

  /* Themed confirm dialog — replaces native browser confirm() so we don't
     get a flat OS-styled popup floating at the top of the page. Lives on
     z-index: 220 so it can sit on top of the regular #modalBack (z:100). */
  .confirm-back {
    position: fixed; inset: 0; background: rgba(2,2,8,0.82);
    display: none; align-items: center; justify-content: center;
    z-index: 220; padding: 18px;
    backdrop-filter: blur(6px);
  }
  .confirm-back.show { display: flex; }
  .confirm-dlg {
    width: 100%; max-width: 420px;
    background: linear-gradient(160deg, #2a1530, #140d20);
    border: 1px solid var(--border); border-radius: 18px;
    padding: 22px 22px 18px; text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    animation: pop .22s ease;
  }
  .confirm-emoji { font-size: 40px; line-height: 1; margin-bottom: 6px; }
  .confirm-art {
    margin: 0 auto 10px;
    line-height: 0;
    filter:
      drop-shadow(0 0 10px rgba(255, 200, 120, 0.95))
      drop-shadow(0 0 22px rgba(255, 150, 60, 0.80))
      drop-shadow(0 0 42px rgba(255, 110, 30, 0.50))
      drop-shadow(0 4px 14px rgba(0,0,0,0.65));
  }
  .confirm-art img {
    display: block;
    width: 128px;
    height: auto;
    margin: 0 auto;
  }
  .confirm-title {
    font-family: 'Bangers', 'Patrick Hand', system-ui, sans-serif;
    font-size: 28px; letter-spacing: 0.6px;
    margin: 0 0 10px; color: var(--accent);
    text-shadow: 0 2px 0 rgba(0,0,0,0.35);
  }
  .confirm-msg {
    margin: 0 0 18px; color: var(--text);
    font-size: 15px; line-height: 1.45;
  }
  .confirm-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .confirm-row .btn { min-width: 120px; padding: 10px 18px; }
  .modal p { color: var(--muted); margin: 0 0 14px; }

  .paragraph-reveal {
    background: rgba(0,0,0,0.35); border: 1px solid var(--accent-2); border-radius: 14px;
    padding: 18px 20px; margin: 12px 0; font-family: Georgia, serif; font-size: 17px; line-height: 1.7;
    color: #fff4e8; text-align: left; box-shadow: inset 0 0 30px rgba(255,138,61,0.10);
  }

  .stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .stat {
    flex: 1 1 130px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; text-align: left;
  }
  .stat .k { font-size: 12px; color: var(--muted); }
  .stat .v { font-weight: 800; font-size: 18px; }

  .row-wrap { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 99; }
  .confetti i {
    position: absolute; top: -10px; width: 8px; height: 14px; border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0.9; } }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .shake { animation: shake .25s ease 1; }

  /* Gallery */
  .gallery-list { display: grid; gap: 12px; }
  .saved-story {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
  }
  .saved-story h3 { margin: 0 0 6px; font-size: 18px; }
  .saved-story .body {
    font-family: Georgia, serif; font-size: 16px; line-height: 1.7; color: #fff4e8;
    background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-top: 10px;
  }

  /* Progress overview */
  .progress-page {
    display: flex; flex-direction: column; gap: 12px;
    max-width: 100%; min-width: 0;
  }
  .progress-hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 12px; }
  .ph-stat { background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .ph-stat .k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .ph-stat .v { font-size: 26px; font-weight: 900; margin-top: 4px; line-height: 1; }
  .ph-stat .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .ph-stat.accent .v { color: var(--accent); }
  .ph-stat.gold .v { color: var(--gold); }

  .panel.topic-matrix { padding: 16px 18px; }
  .panel.topic-matrix h3 { margin: 0 0 10px; font-size: 16px; }
  .matrix-row {
    display: grid;
    grid-template-columns: 26px minmax(0, 1fr) minmax(0, 1fr);
    gap: 6px 8px;
    align-items: stretch;
    margin: 6px 0;
  }
  .matrix-row .lbl {
    width: auto; color: var(--muted); font-size: 11px; font-weight: 800;
    display: flex; align-items: center;
  }
  .matrix-cell {
    min-width: 0;
    padding: 6px 8px; border-radius: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    font-size: 11px; line-height: 1.25; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .matrix-cell.done { background: linear-gradient(135deg, rgba(255,138,61,0.25), rgba(255,194,74,0.10)); border-color: rgba(255,138,61,0.5); color: #fff; }
  .matrix-cell.perfect { background: linear-gradient(135deg, rgba(255,209,102,0.35), rgba(255,138,61,0.20)); border-color: rgba(255,209,102,0.6); color: #fff; box-shadow: 0 0 12px rgba(255,209,102,0.25); }
  @media (max-width: 520px) {
    .matrix-row { grid-template-columns: 22px minmax(0, 1fr); }
    .matrix-row .matrix-cell:nth-child(3) { grid-column: 2; }
  }

  /* Arcade */
  .arcade-frame { background: linear-gradient(180deg, #1a0a1c 0%, #2c0e1a 100%); border: 1px solid var(--border); border-radius: 16px; padding: 14px; box-shadow: var(--shadow); }
  .arcade-hud {
    display: flex; gap: 12px; align-items: center; justify-content: space-between;
    margin-bottom: 10px; font-weight: 800;
    background: rgba(0,0,0,0.3); padding: 8px 14px; border-radius: 12px; border: 1px solid var(--border);
  }
  .arcade-hud .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-right: 6px; }
  .arcade-hud .score { color: var(--gold); font-size: 18px; }
  .arcade-hud .lives { color: var(--bad); letter-spacing: 4px; font-size: 20px; }
  .arcade-hud .lives .life-ship {
    height: 22px; width: 26px; object-fit: contain; vertical-align: middle;
    margin-left: 4px; filter: drop-shadow(0 0 4px rgba(80,180,255,0.55));
  }
  @media (max-width: 520px) { .arcade-hud .lives .life-ship { height: 18px; width: 22px; } }
  .arcade-hud .timer { color: var(--accent-2); font-size: 18px; font-variant-numeric: tabular-nums; }
  .arcade-hud .timer.low { color: var(--bad); animation: lowPulse 0.7s ease-in-out infinite; }
  @keyframes lowPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .arcade-canvas-wrap {
    position: relative; width: 100%; max-width: 720px; margin: 0 auto;
    aspect-ratio: 4 / 3;
    background: radial-gradient(ellipse at center, #1d0a18 0%, #060206 70%);
    border-radius: 12px; overflow: hidden;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  }
  .arcade-canvas-wrap canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .arcade-overlay {
    position: absolute; inset: 0; display: grid; place-items: center;
    background: rgba(2,2,12,0.65); backdrop-filter: blur(2px);
    color: #fff; font-weight: 900; text-align: center; padding: 18px;
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  .arcade-overlay.show { opacity: 1; pointer-events: auto; }
  .arcade-overlay h2 { margin: 0 0 6px; font-size: 30px; letter-spacing: 1px; }
  .arcade-overlay p { margin: 0; color: var(--muted); font-weight: 700; font-size: 14px; }
  /* Granny pregame variant: bigger, brighter, with her portrait. */
  .arcade-overlay.granny {
    background: radial-gradient(ellipse at center, rgba(80,30,50,0.85), rgba(8,4,16,0.94) 70%);
  }
  .arc-granny {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    animation: arcGrannyIn .35s ease-out both;
  }
  .arc-granny-portrait {
    width: clamp(140px, 28vw, 220px); height: auto;
    filter: drop-shadow(0 0 22px rgba(255,160,80,0.55)) drop-shadow(0 6px 14px rgba(0,0,0,0.55));
    animation: arcGrannyBob 1.4s ease-in-out infinite alternate;
  }
  .arc-granny-msg {
    font-family: 'Bangers', 'Black Ops One', system-ui, sans-serif;
    font-weight: 400; letter-spacing: 1.5px;
    font-size: clamp(28px, 5vw, 46px);
    line-height: 1.05;
    color: #fff;
    background: linear-gradient(180deg, #fff 0%, #ffd29a 60%, #ff7a45 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 4px 10px rgba(0,0,0,0.55);
    filter: drop-shadow(0 0 18px rgba(255,140,60,0.45));
    transform: rotate(-1.5deg);
    padding: 0 12px; max-width: 90%;
  }
  .arc-granny-bonus {
    font-family: 'Patrick Hand', system-ui, sans-serif;
    font-size: clamp(14px, 1.8vw, 18px);
    color: #ffd86b; font-weight: 700; letter-spacing: 0.5px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  @keyframes arcGrannyIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  @keyframes arcGrannyBob {
    from { transform: translateY(0) rotate(-1deg); }
    to   { transform: translateY(-6px) rotate(1deg); }
  }
  /* Cinematic cards: rounded scene art on a dark backdrop. Used for the
     pre-Granny SOS beat and the Grand-Daddy arrival flash. Same overall
     vibe as the Granny pregame card — rounded, glowing, framed. */
  .arcade-overlay.cinematic {
    background: radial-gradient(ellipse at center, rgba(40,10,20,0.85), rgba(6,3,14,0.95) 72%);
  }
  .arc-cinematic {
    width: 88%; max-width: 640px;
    aspect-ratio: 16 / 9;
    border-radius: 18px;
    overflow: hidden;
    background: #050410;
    box-shadow: 0 0 42px rgba(255,120,60,0.45),
                0 12px 32px rgba(0,0,0,0.65),
                inset 0 0 0 2px rgba(255,180,90,0.18);
    animation: arcCinematicIn .35s ease-out both;
  }
  .arc-cinematic-img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    user-select: none; -webkit-user-drag: none;
  }
  .arc-cinematic.birth-ship {
    width: 96%;
    max-width: 1020px;
    aspect-ratio: 21 / 9;
  }
  .arc-cinematic.birth-ship .arc-cinematic-img { object-fit: contain; }
  /* Critter egg delivery: mothership descends, egg drops, then reveal modal. */
  .arcade-overlay.birth-delivery {
    display: block;
    background: radial-gradient(ellipse at 50% 30%, rgba(30, 12, 40, 0.92), rgba(4, 2, 12, 0.98) 72%);
    overflow: hidden;
  }
  .arc-birth-scene { position: absolute; inset: 0; overflow: hidden; }
  .arc-birth-whiz {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background:
      radial-gradient(circle at 50% 18%, rgba(107, 227, 255, 0.45), transparent 42%),

    animation: arcBirthWhiz 0.65s ease-out 0.15s both;
  }
  @keyframes arcBirthWhiz {
    0% { opacity: 0; transform: scale(0.6); }
    35% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 0; transform: scale(1.2); }
  }
  .arc-birth-ship {
    position: absolute; left: 50%; top: -42%;
    width: min(82%, 540px); height: auto;
    transform: translateX(-50%);
    object-fit: contain; pointer-events: none; user-select: none;
    filter: drop-shadow(0 0 28px rgba(107, 227, 255, 0.55))

  @keyframes arcBirthShipDescend {

  }
  .arc-birth-egg {
    position: absolute; left: 50%; top: 18%;
    width: clamp(52px, 12vw, 72px); height: auto;

  @keyframes arcBirthEggDrop {
    0% { top: 18%; opacity: 0; transform: translateX(-50%) scale(0.58); }

  /* Granny's bazooka art — bg stripped, sits on a transparent hit target. */

  /* ===== Home-screen fun-font pass =====
     Bangers (comic display font) makes the homescreen feel like the inside

     story-card titles/CTAs — kept off long-form paragraphs and the gameplay

<script>
/* ============================================================
   Granny Boom — Slay aliens while you sharpen your writing (v1.0)
   Game logic in this file; story templates in js/stories-data.js.
   ============================================================ */
const APP_VERSION = 'v1.0.1';
const ASSET_VERSION = '2'; // bump when topic/story art changes (cache-bust)

/* --------------------- STATE / STORAGE --------------------- */
// Dev mode is opt-in via "?dev" on the URL. It exposes the Test Fly button
// in the Hangar (and a quick "unlock all" helper) so the arcade can be
// launched without forging a story. Kids on the public URL never see it.
const DEV_MODE = (() => { try { return new URLSearchParams(location.search).has('dev'); } catch (_) { return false; } })();
const STORE_KEY = 'grannyboom.v1';
// Legacy keys we migrate from on first load so existing testers keep their
// XP, ships, streaks, paragraphs, etc. Walked oldest-first so each rename
// generation auto-upgrades. Add new entries to the FRONT of the list when
// renaming again later.
const LEGACY_STORE_KEYS = ['gforge.v1', 'gforce.v1'];

function defaultState() {
  return {
    name: '',
    points: 0,
    selectedTopic: 'sport',
    completed: {},          // key: storyId -> { perfect, attempts, score }
    paragraphs: [],         // [{ storyId, title, topic, text, ts, perfect, xp }]
    badges: [],
    streak: 0,
    lastSession: null,
    history: [],
    ships: { owned: ['mk1'], equipped: 'mk1' },
    bestArcadeScore: 0,
    // Granny is a surprise drop-in, not an equippable ship — these counters
    // track when she should turn up for an arcade run (see GRANNY_BASE_CHANCE
    // / GRANNY_PITY_THRESHOLD). `arcadeRunsSinceGranny` counts arcade games
    // played without her so we can force a visit before it gets boring.
    arcadeRunsSinceGranny: 0,
    grannyVisits: 0,
    // Daily Quest: one rotating "Today's Special" story per local day.
    // Forging it grants 2× XP exactly once per day. `date` is YYYY-M-D
    // (see todayStr()); when it doesn't match today we re-pick.
    // `history` logs past picks { date, storyId } for the 7-day cooldown.
    dailyQuest: { date: null, storyId: null, claimed: false, history: [] },
    // Permanent streak-milestone unlocks (see STREAK_MILESTONES).
    streakUnlocks: [],
    grannyFavourUntil: null,  // YYYY-M-D — 7-day friendlier Granny cadence
    // Skill tree: writing gates unlock nodes; XP buys them; one equipped.
    upgrades: { owned: [], equipped: null },
    totalXpEarned: 0,
    dailyQuestClaims: 0,
    motherDefeated: false,
    bossSeen: false,
    arcadeFireBoost: false,  // Paragon Overdrive — next arcade only
    pendingShipUnlockId: null,  // set when a tier unlocks; cleared after celebration
    // Critter eggs: one per completed theme (see CRITTER_DEFS).
    critters: { sport: null, adventure: null, mystery: null, scifi: null, fantasy: null, horror: null },
    pendingCritterDeliveries: [],  // [{ topic }] — one birth per arcade run
    themesCritterQueued: [],       // topics that already earned an egg slot
    equippedCritterTopic: null,    // hatched sidekick shown in arcade
    // Per-topic care dates (YYYY-M-D): nourishment daily, joy weekly.
    petCare: {}
  };
}
function pushHistory(entry) {
  if (!Array.isArray(state.history)) state.history = [];
  state.history.unshift(Object.assign({ ts: Date.now() }, entry));
  if (state.history.length > 50) state.history.length = 50;
}
function loadState() {
  try {
    let raw = localStorage.getItem(STORE_KEY);
    // One-time migration from any legacy key so existing players keep their
    // XP, badges, streak, ships and forged paragraphs across rename cycles.
    if (!raw) {
      for (const oldKey of LEGACY_STORE_KEYS) {
        const legacy = localStorage.getItem(oldKey);
        if (legacy) {
          localStorage.setItem(STORE_KEY, legacy);
          try { localStorage.removeItem(oldKey); } catch (_) {}
          raw = legacy;
          break;
        }
      }
      // Sweep any other stale legacy keys so they don't sit around.
      for (const oldKey of LEGACY_STORE_KEYS) {
        try { localStorage.removeItem(oldKey); } catch (_) {}
      }
    }
    if (!raw) return defaultState();
    const merged = Object.assign(defaultState(), JSON.parse(raw));
    // Make sure the ship slot is always in a sane shape, even on old saves.
    if (!merged.ships || typeof merged.ships !== 'object') merged.ships = { owned: ['mk1'], equipped: 'mk1' };
    if (!Array.isArray(merged.ships.owned) || merged.ships.owned.length === 0) merged.ships.owned = ['mk1'];
    if (!merged.ships.owned.includes('mk1')) merged.ships.owned.unshift('mk1');
    if (!merged.ships.equipped || !merged.ships.owned.includes(merged.ships.equipped)) merged.ships.equipped = 'mk1';
    // Granny used to be a 7-day-streak unlock — she's now a random in-game
    // drop-in instead, so eject her from any saved owned/equipped slot so
    // the Hangar UI doesn't try to render or equip her.
    merged.ships.owned = merged.ships.owned.filter(id => id !== 'granny');
    if (merged.ships.equipped === 'granny') merged.ships.equipped = 'mk1';
    if (typeof merged.arcadeRunsSinceGranny !== 'number') merged.arcadeRunsSinceGranny = 0;
    if (typeof merged.grannyVisits !== 'number') merged.grannyVisits = 0;
    // Daily Quest shape — older saves won't have it. ensureDailyQuest()
    // will fill in date/storyId on the next home render.
    if (!merged.dailyQuest || typeof merged.dailyQuest !== 'object') {
      merged.dailyQuest = { date: null, storyId: null, claimed: false, history: [] };
    }
    if (!Array.isArray(merged.dailyQuest.history)) merged.dailyQuest.history = [];
    if (!Array.isArray(merged.streakUnlocks)) merged.streakUnlocks = [];
    if (!merged.upgrades || typeof merged.upgrades !== 'object') {
      merged.upgrades = { owned: [], equipped: null };
    }
    if (!Array.isArray(merged.upgrades.owned)) merged.upgrades.owned = [];
    if (typeof merged.totalXpEarned !== 'number') merged.totalXpEarned = merged.points || 0;
    if (typeof merged.dailyQuestClaims !== 'number') merged.dailyQuestClaims = 0;
    if (typeof merged.motherDefeated !== 'boolean') merged.motherDefeated = false;
    if (typeof merged.bossSeen !== 'boolean') merged.bossSeen = false;
    if (typeof merged.arcadeFireBoost !== 'boolean') merged.arcadeFireBoost = false;
    if (merged.pendingShipUnlockId === undefined) merged.pendingShipUnlockId = null;
    if (!merged.critters || typeof merged.critters !== 'object') {
      merged.critters = { sport: null, adventure: null, mystery: null, scifi: null, fantasy: null, horror: null };
    }
    for (const t of TOPICS) {
      if (!(t.id in merged.critters)) merged.critters[t.id] = null;
    }
    if (!Array.isArray(merged.pendingCritterDeliveries)) merged.pendingCritterDeliveries = [];
    if (!Array.isArray(merged.themesCritterQueued)) merged.themesCritterQueued = [];
    if (merged.equippedCritterTopic === undefined) merged.equippedCritterTopic = null;
    if (!merged.petCare || typeof merged.petCare !== 'object') merged.petCare = {};
    for (const t of TOPICS) {
      if (!merged.petCare[t.id] || typeof merged.petCare[t.id] !== 'object') {
        merged.petCare[t.id] = { lastFedDate: null, lastJoyDate: null };
      }
    }
    if (!Array.isArray(merged.badges)) merged.badges = [];
    if (!Array.isArray(merged.paragraphs)) merged.paragraphs = [];
    if (!merged.completed || typeof merged.completed !== 'object') merged.completed = {};
    if (!TOPICS.some(t => t.id === merged.selectedTopic)) merged.selectedTopic = 'sport';
    return merged;
  } catch (e) { return defaultState(); }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
let state = loadState();
if (!Array.isArray(state.history)) state.history = [];
if (!Array.isArray(state.paragraphs)) state.paragraphs = [];

/* --------------------- BADGES --------------------- */
const BADGES = {
  apprentice: { name: 'Forge Apprentice', icon: '🔨', desc: 'Forge your first paragraph.' },
  smith:      { name: 'Sentence Smith',   icon: '⚒️', desc: 'Forge 5 paragraphs.' },
  master:     { name: 'Master Smith',     icon: '🏆', desc: 'Forge every story in the library.' },
  perfect:    { name: 'Flawless Forge',   icon: '✨', desc: 'Build a sentence with no wrong picks.' },
  paragon:    { name: 'Paragon',          icon: '💎', desc: 'Forge a paragraph with zero wrong picks.' },
  l3:         { name: 'Three-Level Forge', icon: '🥇', desc: 'Complete a Level 3 story.' },
  streak5:    { name: 'On Fire',          icon: '🔥', desc: 'Reach a 5-day forge streak.' },
  veteran:    { name: "Granny Boom's Favourite Child", icon: '🎖️', desc: 'Reach a 50-day forge streak.' },
  arcade:     { name: 'Arcade Ace',       icon: '🕹️', desc: 'Score 200+ in the reward game.' },
  defender:   { name: 'Galactic Defender',icon: '🛸', desc: 'Clear a full wave in the arcade.' },
  boss:       { name: 'Grand-Daddy Slayer',icon: '😈', desc: 'Defeat the Grand-Daddy boss.' }
};

/* --------------------- SHIPS (hangar / upgrades) --------------------- */
// Each barrel is a position on the ship sprite expressed as a fraction of the
// cropped sprite's width/height (0,0 = top-left, 1,1 = bottom-right). Optional
// vx adds a horizontal velocity component for angled wingtip shots.
// `cost` on each ship is a lifetime-XP unlock threshold (totalXpEarned), not
// a price — ships auto-unlock when earned XP crosses the line; XP is never
// deducted. Skill-tree purchases only spend current `state.points`.
const SHIPS = [
  {
    id: 'mk1', name: 'Cadet Mk I', cost: 0,
    src: 'ships/ship1.png',
    blurb: 'Standard cadet trainer. One trusty cannon.',
    barrels: [{ fx: 0.486, fy: 0.00 }]
  },
  {
    id: 'mk2', name: 'Twin Striker Mk II', cost: 5000,
    src: 'ships/ship2.png',
    blurb: 'Twin-cannon spread — double the firepower.',
    barrels: [
      { fx: 0.405, fy: 0.00 },
      { fx: 0.579, fy: 0.00 }
    ]
  },
  {
    id: 'mk3', name: 'Tri-Lance Mk III', cost: 10000,
    src: 'ships/ship3.png',
    blurb: 'Three barrels. Wave-clearing speed.',
    barrels: [
      { fx: 0.443, fy: 0.088 },
      { fx: 0.488, fy: 0.000 },
      { fx: 0.547, fy: 0.088 }
    ]
  },
  {
    id: 'mk4', name: 'Vanguard Mk IV', cost: 22000,
    src: 'ships/ship4.png',
    blurb: '5-bullet spread with wingtip missiles. Top-tier warship.',
    barrels: [
      { fx: 0.488, fy: 0.000 },
      { fx: 0.439, fy: 0.050 },
      { fx: 0.555, fy: 0.050 },
      { fx: 0.080, fy: 0.410, vx: -0.16 },
      { fx: 0.920, fy: 0.410, vx:  0.16 }
    ]
  },
  // RANDOM DROP-IN: Granny isn't sold or equipped from the Hangar — she
  // turns up unannounced for a random arcade run (see startArcade). She
  // doesn't fire normal bullets; her bazooka lobs cupcake nukes that curve
  // through the air and explode in a wide AOE blast. `hidden: true` keeps
  // her out of the Hangar grid, while the rest of the definition (sprite,
  // barrel position, displayH, special flag) is still used at runtime when
  // the random roll lands her in the seat.
  {
    id: 'granny', name: 'Granny Boom', cost: 0,
    src: 'ships/granny.png',
    blurb: 'Surprise drop-in — nuke cupcakes detonate across multiple invaders.',
    barrels: [{ fx: 0.78, fy: 0.18 }],
    displayH: 96,
    special: 'granny',
    hidden: true
  }
];
// Granny's projectile sprite — preloaded so the first cupcake doesn't pop in.
const CUPCAKE_SRC = 'projectiles/cupcake_nuke.png';
const CUPCAKE_IMG = new Image();
CUPCAKE_IMG.decoding = 'async';

/* --------------------- GRANNY RANDOM EVENT --------------------- */
// Granny isn't equipped — she just shows up, on a strict cadence rather
// than a flat dice roll (so students never get her 5 times in a row, and
// always get a stretch of normal arcade play between visits).
//
// Cycle, measured from the last Granny visit (or from a fresh save):
//   • Runs 1..GRANNY_MIN_GAP        → never Granny (quiet zone)
//   • Next GRANNY_WINDOW runs       → Granny appears EXACTLY ONCE, picked
//                                     uniformly across the three slots
//                                     (slot 0: 1/3, slot 1: 1/2, slot 2: 1/1)
//   • As soon as she shows up the counter resets and the cycle restarts.
//
// With the defaults below: at least 4 granny-free games, then one of the
// next 3 will be Granny — guaranteed, never two in a row, never a gap
// longer than 7 runs.
const GRANNY_MIN_GAP = 4;   // arcade runs that MUST be granny-free
const GRANNY_WINDOW  = 3;   // size of the window in which she lands once
const GRANNY_PREGAME_MESSAGES = [
  "She's back!",
  "Go get 'em, Granny!",
  "Granny's locked and loaded.",
  "Cupcakes are baked — incoming!",
  "Surprise! It's Granny.",
  "Knit. Aim. Fire.",
  "Granny remembered her glasses today.",
  "Today's special: nuke cupcakes.",
  "Hold my knitting needles…",
  "Don't tell Grandpa about this.",
  "Aliens, meet your doom.",
  "Granny's outta tea. Uh oh.",
  "Sprinkles. And chaos.",
  "She heard the aliens — they're toast.",
  "Granny means business."
];
function rollGrannyRound() {
  const minGap = getGrannyMinGap();
  const runs = state.arcadeRunsSinceGranny || 0;
  // Quiet zone: the first N arcade runs after a Granny visit are granny-free.
  if (runs < minGap) return false;
  const slot = runs - minGap;
  const remaining = GRANNY_WINDOW - slot;
  if (remaining <= 1) return true; // last slot in the window (or overshoot)
  return Math.floor(Math.random() * remaining) === 0;
}
function pickGrannyMessage() {
  return GRANNY_PREGAME_MESSAGES[Math.floor(Math.random() * GRANNY_PREGAME_MESSAGES.length)];
}
