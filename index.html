<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="expires" content="0" />
<title>Granny Boom — Slay aliens while you sharpen your writing</title>
<meta name="description" content="The game that lets you slay aliens while you improve your writing." />
<link rel="icon" type="image/png" href="logo.png" />
<link rel="apple-touch-icon" href="logo.png" />
<!-- Fun display fonts for headings + the splash countdown. Loaded async-ish
     via preconnect so they don't block initial paint. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bangers&family=Black+Ops+One&family=Patrick+Hand&display=swap" />
<style>
  :root {
    --bg-0: #0a0710;
    --bg-1: #140d20;
    --bg-2: #1f1530;
    --panel: rgba(255,255,255,0.05);
    --panel-2: rgba(255,255,255,0.09);
    --border: rgba(255,255,255,0.13);
    --text: #fff4e8;
    --muted: #b09cbf;
    --accent: #ff8a3d;
    --accent-2: #ffc24a;
    --accent-3: #ff5a3d;
    --good: #4ade80;
    --bad: #ff5a7a;
    --gold: #ffd166;
    --info: #6be3ff;
    --shadow: 0 10px 30px rgba(0,0,0,0.55);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background:
      radial-gradient(1200px 800px at 10% -10%, #4a1810 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 10%, #2d0f3a 0%, transparent 55%),
      radial-gradient(900px 700px at 50% 120%, #2a1505 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-2));
    background-attachment: fixed;
    overflow-x: hidden;
  }
  body::before {
    /* ember sparks */
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 25px 80px, #ff8a3daa, transparent),
      radial-gradient(1.5px 1.5px at 220px 240px, #ffc24a88, transparent),
      radial-gradient(2px 2px at 410px 130px, #ff8a3d99, transparent),
      radial-gradient(1.5px 1.5px at 620px 290px, #ff5a3d77, transparent),
      radial-gradient(2px 2px at 820px 170px, #ffaa6688, transparent),
      radial-gradient(1.5px 1.5px at 140px 410px, #ff8a3d66, transparent),
      radial-gradient(1.5px 1.5px at 730px 480px, #ffc24a88, transparent),
      radial-gradient(2px 2px at 1020px 360px, #ff8a3d99, transparent),
      radial-gradient(1.5px 1.5px at 340px 540px, #ffaa6688, transparent),
      radial-gradient(1.5px 1.5px at 940px 620px, #ff8a3d77, transparent);
    background-size: 1100px 700px;
    background-repeat: repeat;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px 18px 80px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    backdrop-filter: blur(8px); box-shadow: var(--shadow);
    /* Granny's portrait pokes out of the bar on both sides — allow it. */
    overflow: visible;
    /* Lift topbar into its own stacking context so the [data-tip] tooltips
       (which hang below the icons via ::after) render OVER the panels that
       follow it in .app. Without this they get covered by later siblings. */
    position: relative;
    z-index: 50;
    /* Granny's portrait extends ~28px below the topbar via her negative
       bottom margin. Reserve that much space below so the next panel
       doesn't overlap her lower half. */
    margin-bottom: 32px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 900; letter-spacing: 1px; font-size: 18px;
    cursor: pointer;
    /* Granny is rendered taller than the bar — negative margins on the img
       keep .brand's layout height the same as the rest of the topbar, but
       the sprite itself overflows above and below for a "popping out of the
       bar" badge effect. Allow overflow so she doesn't get clipped. */
    overflow: visible;
    min-height: 38px;
  }
  /* Granny Boom wordmark — sits on the left of the brand cluster.
     Floats above the bar via negative top/bottom margins. */
  .brand .brand-wordmark {
    display: block;
    position: relative;
    height: 84px;
    width: auto;
    margin: -22px 0 -22px 0;
    z-index: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.55));
    transition: filter .2s ease, transform .2s ease;
    user-select: none; pointer-events: none;
  }
  /* Granny — sits on the RIGHT of the wordmark, overlapping it slightly
     so she appears to be stepping in front of the logo. The negative
     left margin produces the overlap; z-index ensures she's on top. */
  .brand .brand-granny {
    display: block;
    position: relative;
    height: 96px;
    width: auto;
    margin: -28px 4px -28px -32px;
    z-index: 2;
    filter:
      drop-shadow(-3px 4px 8px rgba(0,0,0,0.65))
      drop-shadow(0 0 18px rgba(255,138,61,0.40));
    transition: filter .2s ease, transform .2s ease;
    user-select: none; pointer-events: none;
  }
  .brand:hover .brand-granny {
    filter:
      drop-shadow(0 4px 10px rgba(0,0,0,0.6))
      drop-shadow(0 0 28px rgba(255,170,90,0.75));
    transform: translateY(-2px) scale(1.04);
  }
  .brand:hover .brand-wordmark {
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6)) drop-shadow(0 0 22px rgba(255,170,90,0.45));
    transform: translateY(-2px) scale(1.03);
  }

  /* ===== Splash / intro screen =====
     Welcome heading + framed hero artwork + tagline + fake loading bar with
     a rotating quip, then a 3-2-1-BOOM countdown before the home screen
     reveals. Lives above everything (z-index 9999) and fades on exit. */
  .splash {
    position: fixed; inset: 0; z-index: 9999;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(80,30,90,0.55) 0%, rgba(20,8,28,0.95) 55%, #050308 100%),
      #050308;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; box-sizing: border-box;
    opacity: 1; transition: opacity .55s ease;
    overflow: auto;
  }
  .splash.fade-out { opacity: 0; pointer-events: none; }
  .splash-stack {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px; width: 100%; max-width: 1100px;
  }
  /* Welcome heading — addresses the player by name with a gold-orange
     gradient on the name itself for a touch of celebration. */
  .splash-welcome {
    margin: 0; text-align: center; line-height: 1.15;
    font-size: clamp(22px, 3.8vw, 38px);
    font-weight: 900; letter-spacing: 0.5px;
    color: #ffe7b8;
    text-shadow: 0 2px 6px rgba(0,0,0,0.75), 0 0 22px rgba(255,138,61,0.25);
  }
  .splash-welcome .name {
    background: linear-gradient(180deg, #ffe28a 0%, #ff9a3d 55%, #c54a16 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
  }
  /* Hero artwork frame — 75% of viewport width (capped on huge screens),
     16:9 aspect, rounded with a warm orange glow ring. */
  .splash-hero-wrap {
    width: min(75vw, 960px);
    aspect-ratio: 16 / 9;
    border-radius: 22px;
    overflow: hidden;
    box-shadow:
      0 14px 50px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,170,90,0.40),
      0 0 36px rgba(255,138,61,0.28);
  }
  .splash-hero {
    display: block; width: 100%; height: 100%; object-fit: cover;
  }
  .splash-tag {
    max-width: 640px; text-align: center;
    color: #ffe7b8; font-weight: 800; letter-spacing: 0.5px;
    font-size: clamp(14px, 2.0vw, 19px); line-height: 1.35;
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    margin: 0;
  }
  .splash-loading {
    width: min(520px, 80vw);
    color: #fff8e0;
  }
  .splash-msg {
    font-size: 14px; font-weight: 700; letter-spacing: 0.4px;
    color: #ffd28a; text-align: center;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    margin-bottom: 8px; min-height: 1.2em;
    opacity: 0; transform: translateY(2px);
    transition: opacity .25s ease, transform .25s ease;
  }
  .splash-msg.show { opacity: 1; transform: translateY(0); }
  .splash-bar {
    position: relative;
    width: 100%; height: 14px; border-radius: 999px;
    background: linear-gradient(180deg, rgba(10,5,2,0.85), rgba(30,12,4,0.85));
    border: 1px solid rgba(255,170,90,0.45);
    box-shadow: 0 4px 14px rgba(0,0,0,0.55), inset 0 1px 2px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  .splash-fill {
    width: 0%; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #b6ff5a 0%, #ffd166 45%, #ff8a3d 85%, #ff5a3d 100%);
    box-shadow: 0 0 14px rgba(255,160,60,0.7), inset 0 1px 0 rgba(255,255,255,0.4);
    transition: width .15s linear;
  }
  .splash-skip {
    position: absolute; top: 18px; right: 20px; z-index: 2;
    background: rgba(0,0,0,0.55); color: #ffd28a;
    border: 1px solid rgba(255,170,90,0.5);
    padding: 6px 12px; border-radius: 999px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    backdrop-filter: blur(6px);
  }
  .splash-skip:hover { background: rgba(0,0,0,0.75); color: #fff; }
  /* Countdown numbers + final BOOM. Each one pops in via the splash-pop
     animation and is removed by JS when its slot ends. */
  .splash-count {
    position: absolute; left: 0; right: 0; top: 50%;
    transform: translateY(-50%);
    text-align: center; z-index: 3;
    font-family: "Black Ops One", "Bungee", system-ui, sans-serif;
    font-weight: 900; font-style: italic;
    pointer-events: none;
  }
  .splash-count .num {
    display: inline-block;
    font-size: clamp(120px, 22vw, 240px);
    line-height: 1;
    background: linear-gradient(180deg, #ffd76b 0%, #ff8a3d 55%, #b53a10 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 30px rgba(255,154,61,0.85)) drop-shadow(0 8px 16px rgba(0,0,0,0.6));
    animation: splash-pop .6s ease-out;
  }
  .splash-count .boom {
    display: inline-block;
    font-size: clamp(96px, 18vw, 200px);
    letter-spacing: 4px;
    background: linear-gradient(180deg, #fff2a0 0%, #ff5a3d 55%, #6e1208 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 40px rgba(255,90,61,0.9)) drop-shadow(0 0 80px rgba(255,154,61,0.6));
    animation: splash-boom .9s ease-out;
  }
  @keyframes splash-pop {
    0%   { transform: scale(0.4) rotate(-8deg); opacity: 0; }
    50%  { transform: scale(1.15) rotate(2deg); opacity: 1; }
    100% { transform: scale(1)    rotate(0);    opacity: 1; }
  }
  @keyframes splash-boom {
    0%   { transform: scale(0.2); opacity: 0; }
    35%  { transform: scale(1.4); opacity: 1; }
    65%  { transform: scale(1.0); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .topbar .spacer { flex: 1; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border);
    font-size: 13px;
  }
  .chip .pts { color: var(--gold); font-weight: 800; }
  .chip .name { color: var(--accent-2); font-weight: 700; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Illustrated topbar pieces (player chip, XP chip, action icons).
     All foreign-style icons (avatar, XP badge, book, chart, trophy) are
     piped through a unifying filter chain so the row reads as one set
     instead of a flea-market jumble:
       saturate(0)       → strip every icon to grayscale (kills chaos)
       brightness(...)   → lift shadows so detail survives
       sepia(0.95)       → tint grayscale uniformly toward warm amber
       saturate(2.4)     → boost the new amber to gold
       hue-rotate(-10deg)→ fine-tune toward the Granny Boom orange-gold
       drop-shadow ×2    → consistent gold glow + soft black grounding
     The hangar ship icon and the wordmark are excluded so they keep their
     native colors (blue ship pops as the "equipped" highlight; the
     wordmark stays brand orange-and-blue). */
  :root {
    --icon-tint:
      saturate(0)
      brightness(1.08)
      sepia(0.95)
      saturate(2.4)
      hue-rotate(-10deg)
      drop-shadow(0 0 6px rgba(255, 184, 84, 0.50))
      drop-shadow(0 2px 4px rgba(0,0,0,0.55));
    --icon-tint-hover:
      saturate(0)
      brightness(1.2)
      sepia(0.95)
      saturate(2.6)
      hue-rotate(-10deg)
      drop-shadow(0 0 14px rgba(255, 210, 130, 0.75))
      drop-shadow(0 4px 6px rgba(0,0,0,0.55));
  }
  .top-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; border: none; padding: 0;
    color: var(--text);
  }
  .top-chip img { display: block; height: 38px; width: auto; filter: var(--icon-tint); transition: filter .25s ease, transform .15s ease; }
  .top-chip:hover img { filter: var(--icon-tint-hover); transform: translateY(-1px); }
  .top-chip .name {
    color: var(--accent-2); font-weight: 800; font-size: 13px;
    max-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .top-chip .pts {
    color: var(--gold); font-weight: 900; font-size: 14px;
    text-shadow: 0 0 10px rgba(255,209,102,0.45);
    margin-left: -2px;
  }
  .top-chip.xp img { height: 34px; }

  .icon-btn {
    background: transparent; border: none; padding: 0; cursor: pointer;
    line-height: 0;
    transition: transform .15s ease;
    position: relative; /* anchor for [data-tip] tooltips */
  }
  .icon-btn img { display: block; height: 40px; width: 40px; object-fit: contain; filter: var(--icon-tint); transition: filter .25s ease; }
  .icon-btn:hover { transform: translateY(-2px) scale(1.06); }
  .icon-btn:hover img { filter: var(--icon-tint-hover); }
  .icon-btn:active { transform: translateY(0) scale(1); }

  /* Themed tooltips: replace OS-rendered title= popups with a Granny Boom
     styled bubble. Any element with [data-tip="..."] gets the bubble on
     hover, with a small arrow pointing up to it. Bangers font + gold-on-dark
     to match the topbar. */
  [data-tip] { position: relative; }
  [data-tip]:hover { z-index: 999; } /* lift the element so its tooltip wins z-order vs siblings */
  [data-tip]::after,
  [data-tip]::before {
    position: absolute;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s ease, transform .15s ease;
    z-index: 9999;
  }
  [data-tip]::after {
    content: attr(data-tip);
    top: calc(100% + 12px);
    left: 50%;
    transform: translate(-50%, -4px);
    background: linear-gradient(180deg, #2a1320 0%, #170914 100%);
    color: #ffd29a;
    font-family: "Bangers", "Black Ops One", Impact, "Arial Black", sans-serif;
    font-weight: 400;
    letter-spacing: 1.2px;
    font-size: 15px;
    line-height: 1.1;
    padding: 7px 14px 6px;
    border-radius: 10px;
    border: 1px solid rgba(255, 180, 90, 0.45);
    box-shadow: 0 6px 18px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.5),
                0 0 18px rgba(255,140,60,0.18);
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  [data-tip]::before {
    content: '';
    top: 100%;
    left: 50%;
    transform: translate(-50%, -2px);
    border: 7px solid transparent;
    border-bottom-color: rgba(255, 180, 90, 0.45);
    filter: drop-shadow(0 -1px 0 rgba(0,0,0,0.4));
  }
  [data-tip]:hover::after,
  [data-tip]:focus-visible::after { opacity: 1; transform: translate(-50%, 0); transition-delay: .15s; }
  [data-tip]:hover::before,
  [data-tip]:focus-visible::before { opacity: 1; transform: translate(-50%, 4px); transition-delay: .15s; }
  /* Tip-left / tip-right anchors when the element is near a screen edge */
  [data-tip-pos="left"]::after { left: auto; right: 0; transform: translate(0, -4px); }
  [data-tip-pos="left"]:hover::after { transform: translate(0, 0); }
  [data-tip-pos="left"]::before { left: auto; right: 14px; transform: translate(0, -2px); }
  [data-tip-pos="left"]:hover::before { transform: translate(0, 4px); }
  /* Hangar shows the equipped ship — keep its native blue/orange so it
     reads as the one "live" item in the row. Slightly bigger to anchor. */
  .icon-btn.hangar-btn img {
    height: 44px; width: 44px;
    filter:
      drop-shadow(0 0 8px rgba(80,180,255,0.65))
      drop-shadow(0 2px 4px rgba(0,0,0,0.55));
  }
  .icon-btn.hangar-btn:hover img {
    filter:
      drop-shadow(0 0 16px rgba(120,200,255,0.85))
      drop-shadow(0 4px 6px rgba(0,0,0,0.55));
  }

  @media (max-width: 520px) {
    .top-chip img { height: 30px; }
    .top-chip.xp img { height: 28px; }
    .top-chip .name { max-width: 80px; font-size: 12px; }
    .top-chip .pts { font-size: 12px; }
    .icon-btn img { height: 32px; width: 32px; }
    .icon-btn.hangar-btn img { height: 36px; width: 36px; }
  }

  /* Hangar modal */
  .hangar { max-width: 960px; }
  .hangar-sub { text-align: center; color: var(--muted); margin: 0 0 14px; font-size: 14px; }
  .hangar-sub strong { color: var(--gold); }
  .hangar-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
  }
  @media (min-width: 760px) { .hangar-grid { grid-template-columns: repeat(4, 1fr); } }
  .hangar-card {
    position: relative;
    background: linear-gradient(180deg, rgba(20,30,50,0.7) 0%, rgba(8,10,20,0.85) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .hangar-card.equipped { border-color: #4ad6ff; box-shadow: 0 0 0 2px rgba(74,214,255,0.35) inset, 0 8px 24px rgba(74,214,255,0.18); }
  .hangar-card.owned:not(.equipped):hover { transform: translateY(-3px); border-color: var(--accent-2); }
  .hangar-card.locked { opacity: 0.92; }
  /* Streak-reward cards (e.g. Granny) — flame-warmed border + glow so they
     read as "earned, not bought" at a glance. */
  .hangar-card.streak {
    border-color: rgba(255,120,40,0.55);
    background: linear-gradient(180deg, rgba(60,28,18,0.78) 0%, rgba(20,8,4,0.92) 100%);
  }
  .hangar-card.streak.equipped {
    border-color: #ff9a3d;
    box-shadow: 0 0 0 2px rgba(255,154,61,0.45) inset, 0 8px 24px rgba(255,154,61,0.28);
  }
  .hangar-card.streak .hangar-img-wrap {
    background: radial-gradient(circle at 50% 55%, rgba(255,120,40,0.30), transparent 65%);
  }
  .hangar-card.streak .hangar-img { filter: drop-shadow(0 6px 14px rgba(255,140,60,0.55)); }
  .hangar-shots {
    position: absolute; top: 8px; right: 10px;
    background: linear-gradient(135deg, #ff8a3d, #ffd166);
    color: #1a0a04; font-weight: 900; font-size: 12px;
    padding: 2px 8px; border-radius: 999px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    letter-spacing: 0.5px;
  }
  .hangar-img-wrap {
    width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 55%, rgba(74,214,255,0.18), transparent 65%);
  }
  .hangar-img {
    max-width: 100%; max-height: 100%;
    filter: drop-shadow(0 6px 14px rgba(74,214,255,0.45));
    user-select: none; pointer-events: none;
  }
  .hangar-name { margin: 4px 0 2px; font-size: 15px; color: #e6f3ff; }
  .hangar-blurb { font-size: 11.5px; color: var(--muted); margin: 0 0 10px; min-height: 30px; }
  .hangar-btn-cta { width: 100%; font-size: 13px; padding: 8px 10px; }
  .hangar-cta { padding: 6px; font-weight: 800; }
  .hangar-cta.cta-equipped { color: #4ad6ff; letter-spacing: 1px; }
  .hangar-cta.cta-locked { color: var(--muted); font-size: 13px; line-height: 1.4; }
  .hangar-need { font-size: 11px; color: var(--gold); margin-top: 2px; font-weight: 700; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700;
    transition: transform .08s, background .15s, box-shadow .15s;
    font-size: 14px; user-select: none;
  }
  .btn:hover { background: rgba(255,255,255,0.13); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent-3), var(--accent), var(--accent-2));
    color: #1a0a04; border-color: transparent; box-shadow: 0 8px 20px rgba(255,138,61,0.35);
  }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.ghost { background: transparent; }
  .btn.warn { background: linear-gradient(135deg, #ffd166, #ffaa00); color: #2a1d04; }
  .btn.danger { background: linear-gradient(135deg, #ff5a7a, #ff8a3d); color: #1a0b0b; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .btn.lg { padding: 14px 22px; font-size: 16px; border-radius: 14px; }

  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px; box-shadow: var(--shadow); backdrop-filter: blur(8px);
  }

  /* Hero */
  .hero { margin-top: 18px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
  @media (max-width: 760px) { .hero { grid-template-columns: 1fr; } }
  .hero h1 {
    margin: 0 0 8px; font-size: clamp(28px, 4vw, 40px); line-height: 1.05;
    background: linear-gradient(120deg, #fff, #ffd9b8 60%, #ffaa66);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: 0.2px;
  }
  .hero p { color: var(--muted); margin: 0 0 16px; font-size: 15px; line-height: 1.5; }

  .section-title { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin: 18px 0 8px; }

  /* Name screen */
  .center-screen { min-height: 70vh; display: grid; place-items: center; }
  .name-card { width: 100%; max-width: 560px; text-align: center; }
  /* Welcome heading uses the Bangers comic font for personality. The
     gradient + bevel-y stack matches the Granny Boom brand. */
  .name-card h2 {
    margin: 4px 0 10px;
    font-family: "Bangers", "Black Ops One", Impact, "Arial Black", sans-serif;
    font-weight: 400; /* Bangers ships at a single weight */
    font-size: clamp(30px, 5vw, 44px);
    letter-spacing: 2px;
    line-height: 1.05;
    background: linear-gradient(180deg, #ffe28a 0%, #ff9a3d 55%, #c54a16 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.55)) drop-shadow(0 0 18px rgba(255,138,61,0.35));
    transform: rotate(-1.5deg);
  }
  .name-card p {
    color: #d8e2ff;
    margin: 0 0 18px;
    font-size: 16px; line-height: 1.45;
    font-weight: 600;
  }
  .name-card input {
    width: 100%; padding: 14px 16px; font-size: 18px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
    outline: none; text-align: center;
  }
  .name-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,138,61,0.25); }

  /* Topic tabs — illustrated banner buttons */
  .topic-tabs { display: flex; gap: 14px; flex-wrap: wrap; margin: 14px 0 18px; }
  .topic-tab {
    position: relative;
    background: transparent; border: none; padding: 0; cursor: pointer;
    transition: transform .15s ease, filter .25s ease;
    filter: brightness(0.55) saturate(0.55) drop-shadow(0 4px 12px rgba(0,0,0,0.45));
    display: inline-flex; align-items: center; line-height: 0;
  }
  .topic-tab:hover {
    filter: brightness(0.85) saturate(0.85) drop-shadow(0 6px 18px rgba(0,0,0,0.5));
    transform: translateY(-2px);
  }
  .topic-tab.active {
    transform: translateY(-3px);
    filter: brightness(1.05) saturate(1.1)
            drop-shadow(0 8px 22px rgba(0,0,0,0.5))
            drop-shadow(0 0 18px var(--tab-glow, rgba(255,138,61,0.6)));
  }
  .topic-tab[data-topic="sport"]     { --tab-glow: rgba(74,222,128,0.6); }
  .topic-tab[data-topic="adventure"] { --tab-glow: rgba(255,194,74,0.6); }
  .topic-tab[data-topic="mystery"]   { --tab-glow: rgba(167,139,250,0.65); }
  .topic-tab[data-topic="scifi"]     { --tab-glow: rgba(107,227,255,0.6); }
  .topic-tab img {
    height: 56px; width: auto; display: block; pointer-events: none;
  }
  .topic-tab .progress {
    position: absolute; top: 4px; right: 8px; z-index: 2;
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: rgba(10,7,16,0.85); color: #fff4e8; font-weight: 900;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    line-height: 1.5;
  }
  @media (max-width: 520px) {
    .topic-tab img { height: 42px; }
    .topic-tabs { gap: 8px; }
  }

  /* Daily Quest hero tile — sits above the stories grid on home. Pure
     additive UI; no other layout depends on it. */
  .daily-quest {
    position: relative;
    margin: 18px 0 14px;
    padding: 26px 18px 16px;
    display: flex; align-items: center; gap: 16px;
    background: linear-gradient(135deg, #2a1530 0%, #3a1f44 60%, #2a1530 100%);
    border: 1px solid rgba(255, 209, 102, 0.45);
    border-radius: 18px;
    box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.12), 0 14px 36px rgba(0,0,0,0.45);
    overflow: hidden; isolation: isolate;
  }
  .daily-quest::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(900px 240px at 20% -20%, rgba(255,209,102,0.18), transparent 60%);
  }
  .daily-quest .dq-ribbon {
    position: absolute; top: 0; left: 0;
    background: linear-gradient(135deg, #ffd166, #ffaa00);
    color: #2a1d04;
    font-family: 'Bangers', 'Black Ops One', Impact, sans-serif;
    font-size: 13px; letter-spacing: 1.6px;
    padding: 6px 16px;
    border-radius: 0 0 12px 0;
    box-shadow: 0 6px 16px rgba(255,170,0,0.35);
  }
  /* Square thumbnail of the actual story art on the left side of the
     tile. Falls back to the topic emoji if no art file exists. */
  .daily-quest .dq-thumb {
    position: relative;
    width: 96px; height: 96px;
    border-radius: 14px;
    overflow: hidden;
    flex-shrink: 0;
    background: linear-gradient(135deg, #2a1530, #140d20);
    border: 1px solid rgba(255, 209, 102, 0.4);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  }
  .daily-quest.claimed .dq-thumb { border-color: rgba(74, 222, 128, 0.45); }
  .daily-quest .dq-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .daily-quest .dq-thumb-fallback {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 48px; line-height: 1;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.55));
  }
  .daily-quest .dq-text { flex: 1; min-width: 0; }
  .daily-quest .dq-title {
    font-family: 'Bangers', 'Black Ops One', Impact, sans-serif;
    font-size: 28px; letter-spacing: 1.1px; line-height: 1.05;
    color: #fff4e8; margin: 0 0 4px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.5);
  }
  .daily-quest .dq-sub {
    font-family: 'Patrick Hand', system-ui, sans-serif;
    font-size: 16px; color: #f5e9ff; opacity: 0.9;
    line-height: 1.25; margin: 0;
  }
  .daily-quest .dq-cta {
    flex-shrink: 0;
    background: linear-gradient(135deg, #ffd166, #ffaa00);
    color: #2a1d04;
    font-family: 'Bangers', 'Black Ops One', Impact, sans-serif;
    font-size: 17px; letter-spacing: 1.4px;
    padding: 12px 22px; border-radius: 14px;
    border: none; cursor: pointer;
    box-shadow: 0 8px 22px rgba(255,170,0,0.4);
    transition: transform .15s ease, box-shadow .2s ease, filter .15s;
  }
  .daily-quest .dq-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(255,170,0,0.55); filter: brightness(1.06); }
  .daily-quest .dq-cta:active { transform: translateY(0); }
  .daily-quest.claimed {
    border-color: rgba(74, 222, 128, 0.4);
    box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.15), 0 14px 36px rgba(0,0,0,0.4);
    opacity: 0.95;
  }
  .daily-quest.claimed::before {
    background: radial-gradient(900px 240px at 20% -20%, rgba(74,222,128,0.14), transparent 60%);
  }
  .daily-quest.claimed .dq-ribbon {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #052e13;
    box-shadow: 0 6px 16px rgba(34,197,94,0.35);
  }
  .daily-quest .dq-cta-done {
    background: rgba(74, 222, 128, 0.14);
    color: #b6ffd0;
    cursor: default;
    border: 1px solid rgba(74, 222, 128, 0.32);
    box-shadow: none;
  }
  .daily-quest .dq-cta-done:hover { transform: none; box-shadow: none; filter: none; }
  @media (max-width: 560px) {
    .daily-quest { flex-direction: column; align-items: stretch; text-align: center; padding-top: 38px; gap: 10px; }
    .daily-quest .dq-thumb { width: 108px; height: 108px; margin: 0 auto; }
    .daily-quest .dq-cta { width: 100%; }
  }
  /* Gold banner shown inside the forge result modal when the player
     just claimed today's Daily Quest 2× XP bonus. */
  .daily-bonus-banner {
    margin: 14px auto 0;
    max-width: 380px;
    padding: 12px 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, #ffd166, #ffaa00);
    color: #2a1d04;
    font-family: 'Bangers', 'Black Ops One', Impact, sans-serif;
    font-size: 20px; letter-spacing: 1.2px;
    text-align: center;
    box-shadow: 0 10px 28px rgba(255,170,0,0.45);
  }

  /* Story cards */
  .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 14px; }
  .story-card {
    --t1: #ff8a3d; --t2: #ffc24a;
    position: relative;
    /* Equal inset on all four sides — the artwork sits inside the card
       like a picture in a frame. Picked specifically to match the
       adventure deck look the user singled out as the gold standard. */
    padding: 10px 10px 12px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 18px; cursor: pointer; text-align: left;
    transition: transform .15s ease, box-shadow .25s ease, border-color .25s;
    overflow: hidden; isolation: isolate;
  }
  .story-card[data-topic="sport"]     { --t1: #4ade80; --t2: #22d3ee; }
  .story-card[data-topic="adventure"] { --t1: #ff8a3d; --t2: #ffc24a; }
  .story-card[data-topic="mystery"]   { --t1: #a78bfa; --t2: #ec4899; }
  .story-card[data-topic="scifi"]     { --t1: #6be3ff; --t2: #8b5cf6; }
  .story-card:hover {
    transform: translateY(-4px);
    border-color: color-mix(in srgb, var(--t1) 55%, transparent);
    box-shadow: 0 20px 40px rgba(0,0,0,0.55), 0 0 0 1px color-mix(in srgb, var(--t1) 30%, transparent),
                0 0 36px color-mix(in srgb, var(--t1) 22%, transparent);
  }

  .story-card .art {
    position: relative; aspect-ratio: 4 / 3; width: 100%;
    background: linear-gradient(135deg, color-mix(in srgb, var(--t1) 65%, #1a0a14), color-mix(in srgb, var(--t2) 55%, #140a1f));
    overflow: hidden;
    /* Curved inner corners so every theme reads as a framed picture
       inside the outer card, not a flush edge-to-edge poster. */
    border-radius: 12px;
  }
  /* When the real image loads, JS sets the art's aspect-ratio to match the
     image's natural ratio, so cover never has to crop. */
  .story-card .art img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform .5s ease, filter .25s;
  }
  .story-card:hover .art img { transform: scale(1.07); }
  .story-card .art-fallback {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 72px; pointer-events: none;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.5));
    opacity: 0.7;
  }
  .story-card .art::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, transparent 45%, rgba(10,7,16,0.78) 100%);
  }
  .story-card .art .sheen {
    position: absolute; inset: 0; pointer-events: none; opacity: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
    transition: opacity .35s, transform .6s;
    transform: translateX(-30%);
  }
  .story-card:hover .art .sheen { opacity: 1; transform: translateX(30%); }

  .story-card .l {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    font-size: 11px; font-weight: 900; letter-spacing: 1.2px;
    color: #fff; background: rgba(0,0,0,0.55); padding: 4px 10px; border-radius: 999px;
    backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.12);
  }
  .story-card .l.l1 { color: #b6ffd0; }
  .story-card .l.l2 { color: #ffe7a8; }
  .story-card .l.l3 { color: #ffb6c4; }

  .story-card .forged-stamp {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    font-size: 11px; font-weight: 900; letter-spacing: 1px;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #052e13; padding: 4px 10px; border-radius: 999px;
    box-shadow: 0 6px 18px rgba(34,197,94,0.45);
  }

  /* Card padding (10px) now provides the horizontal inset, so the body
     just adds vertical spacing between the framed art and the meta row. */
  .story-card .body { padding: 12px 4px 2px; position: relative; z-index: 1; }
  .story-card h3 {
    margin: 0; font-size: 18px; font-weight: 900; letter-spacing: 0.2px;
    color: #fff4e8;
    text-shadow: 0 1px 0 rgba(0,0,0,0.35);
  }
  .story-card .ctx {
    color: var(--muted); font-size: 12.5px; margin-top: 6px; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    min-height: 2.9em;
  }
  .story-card .meta {
    display: flex; gap: 8px; margin-top: 12px; align-items: center; justify-content: space-between;
    color: var(--muted); font-size: 12px; font-weight: 700;
  }
  /* When art loads, title is baked into the image — hide the text title + context
     and tighten the body so it's just the CTA row. */
  .story-card.has-art .body { padding: 10px 4px 0; }
  .story-card.has-art h3,
  .story-card.has-art .ctx { display: none; }
  .story-card.has-art .meta { margin-top: 0; }
  .story-card .play-cta {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--t1), var(--t2));
    color: #0a0710; padding: 6px 12px; border-radius: 999px;
    font-size: 11.5px; font-weight: 900; letter-spacing: 0.4px;
    box-shadow: 0 4px 14px color-mix(in srgb, var(--t1) 35%, transparent);
    transition: transform .15s, box-shadow .2s;
  }
  .story-card:hover .play-cta { transform: translateX(2px); }
  .story-card.done .play-cta {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #052e13;
    box-shadow: 0 4px 14px rgba(34,197,94,0.35);
  }
  .story-card .paragon-mark {
    color: var(--gold); font-weight: 900; letter-spacing: 0.5px; font-size: 11px;
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* Forge screen */
  .forge { display: flex; flex-direction: column; gap: 14px; }
  .forge-head { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .forge-head .crumb { color: var(--muted); font-size: 13px; }

  .forge-title-row {
    display: flex; align-items: center; gap: 14px;
    margin: 8px 0 4px;
  }
  .forge-title-col { flex: 1 1 auto; min-width: 0; }
  .forge-title-col h2 {
    overflow: hidden; text-overflow: ellipsis;
  }
  .forge-thumb {
    flex: 0 0 auto;
    height: 140px; max-width: 240px;
    border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 10px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    background: rgba(0,0,0,0.3);
  }
  .forge-thumb img {
    height: 100%; width: auto; max-width: 100%;
    display: block; object-fit: cover;
  }
  @media (max-width: 520px) {
    .forge-thumb { height: 96px; max-width: 150px; border-radius: 10px; }
  }
  .progress-dots { display: flex; gap: 8px; }
  .progress-dots .d {
    width: 26px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.12);
  }
  .progress-dots .d.done { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .progress-dots .d.current { background: var(--accent); box-shadow: 0 0 10px rgba(255,138,61,0.6); }

  .build-display {
    background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; font-size: 19px; line-height: 1.7; color: #fff4e8;
    font-family: Georgia, "Times New Roman", serif;
  }
  .build-display .opener { color: var(--accent-2); font-weight: 700; }
  .build-display .slot-blank {
    display: inline-block; min-width: 70px; padding: 0 6px;
    border-bottom: 2px dashed rgba(255,138,61,0.55);
    color: rgba(255,255,255,0.35);
    text-align: center;
  }
  .build-display .slot-filled {
    display: inline-block; padding: 1px 6px; border-radius: 6px;
    background: rgba(255,138,61,0.16); color: #fff;
    border-bottom: 2px solid var(--accent);
  }
  .build-display .slot-wrong {
    background: rgba(255,90,122,0.18); border-bottom-color: var(--bad);
  }
  .build-display .slot-correct {
    background: rgba(74,222,128,0.15); border-bottom-color: var(--good);
  }

  .containers { display: grid; gap: 12px; }
  .container-card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; padding: 14px;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .container-card.wrong { border-color: var(--bad); background: linear-gradient(160deg, rgba(255,90,122,0.10), transparent 70%); }
  .container-card.correct { border-color: rgba(74,222,128,0.6); background: linear-gradient(160deg, rgba(74,222,128,0.08), transparent 70%); }
  .container-card .role {
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    font-weight: 800;
  }
  .options { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt {
    background: linear-gradient(180deg, #2a1d40, #1d1230);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 10px;
    padding: 8px 14px; cursor: pointer; color: #fff; font-weight: 600; font-size: 15px;
    transition: transform .08s, background .15s, border-color .15s;
    font-family: Georgia, "Times New Roman", serif;
  }
  .opt:hover { background: linear-gradient(180deg, #36254f, #251638); border-color: rgba(255,138,61,0.4); }
  .opt:active { transform: translateY(1px); }
  .opt.selected {
    background: linear-gradient(180deg, #ff8a3d, #ff5a3d);
    color: #1a0a04; border-color: var(--accent-2);
    box-shadow: 0 6px 16px rgba(255,138,61,0.35);
  }
  .opt.locked { background: linear-gradient(180deg, #2c8b6f, #186650); color: #fff; border-color: rgba(74,222,128,0.5); cursor: default; }

  .forge-actions {
    position: sticky; bottom: 14px;
    display: flex; gap: 10px; justify-content: space-between; align-items: center;
    background: rgba(10,7,16,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px;
  }
  .forge-actions .info { color: var(--muted); font-size: 13px; }

  /* Typing step */
  .typing-card {
    background: linear-gradient(160deg, rgba(74,222,128,0.10), rgba(255,138,61,0.05));
    border: 1px solid rgba(74,222,128,0.45); border-radius: 14px; padding: 16px;
  }
  .typing-card h3 { margin: 0 0 8px; color: var(--good); font-size: 16px; }
  /* IMPORTANT: .ref (target sentence) and textarea (student's typing) share
     identical font-family / font-size / line-height / padding / letter-spacing
     so kids can compare letter-for-letter top vs bottom. Eye-tracking
     suffers if even 1px of font-size differs between the two — so they're
     bundled into one block and kept in lockstep. */
  .typing-card .ref,
  .typing-card textarea {
    font-family: Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    letter-spacing: 0;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
  }
  .typing-card .ref {
    margin: 8px 0; color: #fff4e8;
    user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
    cursor: default;
  }
  .typing-card .ref::selection { background: transparent; }
  .typing-card .ref::-moz-selection { background: transparent; }
  .typing-card textarea {
    width: 100%; color: var(--text);
    outline: none;
    min-height: 70px; resize: vertical;
  }
  .typing-card textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,138,61,0.2); }
  .typing-card .matchbar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; margin-top: 8px; overflow: hidden; }
  .typing-card .matchbar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .25s; width: 0%; }
  .typing-card .helper { color: var(--muted); font-size: 12px; margin-top: 6px; }

  /* Toast / modal / confetti (shared from EALD pattern) */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: rgba(20,13,32,0.95); border: 1px solid var(--border); padding: 12px 16px;
    border-radius: 14px; color: var(--text); display: flex; gap: 10px; align-items: center;
    box-shadow: var(--shadow); z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
  }

  .modal-back {

  .confirm-back {
    position: fixed; inset: 0; background: rgba(2,2,8,0.82);

  .arcade-canvas-wrap {

  /* Cinematic cards: rounded scene art on a dark backdrop. Used for the

  .arcade-controls { display: flex; gap: 14px; justify-content: center; margin-top: 14px; }

  .footer-note { color: var(--muted); font-size: 12px; text-align: center; margin-top: 24px; }

  /* ===== Home-screen fun-font pass =====
     Bangers (comic display font) makes the homescreen feel like the inside
     of a comic book. Applied to headings, section labels, stat KPIs, and
     story-card titles/CTAs — kept off long-form paragraphs and the gameplay
     screens where legibility wins. */
  .hero h1 {
    font-family: "Bangers", "Black Ops One", Impact, "Arial Black", sans-serif;

    font-family: "Patrick Hand", "Comic Sans MS", system-ui, sans-serif;
    color: #9aa5c0;
    font-size: clamp(14px, 1.8vw, 17px);

    text-shadow: 0 2px 4px rgba(0,0,0,0.55);

  .stat .k {
    font-family: "Bangers", "Black Ops One", Impact, "Arial Black", sans-serif;

<div class="splash" id="splash" role="dialog" aria-label="Granny Boom intro">

<script>
/* ============================================================
   Granny Boom — Slay aliens while you sharpen your writing (v1.0)
   Single-file guided writing tool for 8–12 yo native English writers.
   ============================================================ */
const APP_VERSION = 'v1.0';

/* --------------------- STORY CONTENT --------------------- */
/* Data shape:
   { id, topic, level (1-3), title, context,
     sentences: [
       { opener: "Fixed phrase,", slots: [
           { role: 'role label', options: [
             { text: 'CORRECT', correct: true },
             { text: 'distractor', why: 'one-line teaching tip' }, ...
           ] }, ...
       ] }, ...
     ]
   }
   When assembled: opener + ' ' + slot1.text + ' ' + slot2.text + ' ' + ... + '.'
   The LAST slot of each sentence includes the trailing punctuation.
*/

const TOPICS = [
  { id: 'sport',     name: 'Sport',     emoji: '⚽' },
  { id: 'adventure', name: 'Adventure', emoji: '🗺️' },
  { id: 'mystery',   name: 'Mystery',   emoji: '🔍' },
  { id: 'scifi',     name: 'Sci-Fi',    emoji: '🚀' }
];

const STORIES = [
  /* ============ SPORT ============ */
  {
    id: 'final-shot', topic: 'sport', level: 1,
    title: 'The Final Shot',
    context: 'Final seconds of the basketball championship — one shot to win.',
    sentences: [
      { opener: 'As the final buzzer drew closer,', slots: [
        { role: 'Who is this about?', options: [
          { text: 'Marcus', correct: true },
          { text: 'he',     why: 'Pronoun — name him to ground the scene.' },
          { text: 'the boy',why: 'Too vague — give him a name.' }
        ]},
        { role: 'Action verb', options: [
          { text: 'clutched', correct: true },
          { text: 'held',     why: 'Bland — pick a verb that shows tension.' },
          { text: 'had',      why: 'Filter verb — what was he DOING with it?' }
        ]},
        { role: 'Sensory detail', options: [
          { text: 'the ball with trembling fingers.', correct: true },
          { text: 'the ball tightly.',                 why: "'Tightly' tells — show how it felt." },
          { text: 'the ball.',                          why: 'No detail — add a sensory image.' }
        ]}
      ]},
      { opener: 'With sweat dripping from his brow,', slots: [
        { role: 'Who', options: [
          { text: 'he', correct: true },
          { text: 'Marcus', why: 'You already named him — pronoun keeps it flowing.' },
          { text: 'the player', why: 'Vague after you have already named him.' }
        ]},
        { role: 'Strong verb', options: [
          { text: 'scanned', correct: true },
          { text: 'looked at', why: "'Looked at' is a filter — show the searching." },
          { text: 'watched',   why: 'Filter verb — distances the reader.' }
        ]},
        { role: 'Specific detail', options: [
          { text: 'the defenders for an opening.', correct: true },
          { text: 'the team quickly.',             why: "Wrong target + tell-adverb 'quickly'." },
          { text: 'the others.',                    why: 'Too vague — name what he saw.' }
        ]}
      ]},
      { opener: 'Without warning,', slots: [
        { role: 'Who', options: [
          { text: 'he', correct: true },
          { text: 'Marcus', why: 'Repeating his name slows it down here.' },
          { text: 'the boy', why: 'Vague + repetitive.' }
        ]},
        { role: 'Power verb', options: [
          { text: 'darted', correct: true },
          { text: 'ran',    why: 'Basic verb — pick something sharper.' },
          { text: 'went',   why: 'Lazy verb — what did he actually do?' }
        ]},
        { role: 'Decisive action', options: [
          { text: 'left and launched a desperate shot.', correct: true },
          { text: 'left and threw the ball.',            why: 'Bland — match the drama of the moment.' },
          { text: 'sideways quickly.',                    why: "Vague direction + tell-adverb 'quickly'." }
        ]}
      ]},
      { opener: 'Spinning through the air,', slots: [

// Dev mode is opt-in via "?dev" on the URL. It exposes the Test Fly button
// in the Hangar (and a quick "unlock all" helper) so the arcade can be
// launched without forging a story. Kids on the public URL never see it.
const DEV_MODE = (() => { try { return new URLSearchParams(location.search).has('dev'); } catch (_) { return false; } })();
const STORE_KEY = 'grannyboom.v1';
// Legacy keys we migrate from on first load so existing testers keep their
// XP, ships, streaks, paragraphs, etc. Walked oldest-first so each rename
// generation auto-upgrades. Add new entries to the FRONT of the list when
// renaming again later.
const LEGACY_STORE_KEYS = ['gforge.v1', 'gforce.v1'];

function defaultState() {
  return {
    name: '',
    points: 0,
    selectedTopic: 'sport',
    completed: {},          // key: storyId -> { perfect, attempts, score }
    paragraphs: [],         // [{ storyId, title, topic, text, ts, perfect, xp }]
    badges: [],
    streak: 0,
    lastSession: null,
    history: [],
    ships: { owned: ['mk1'], equipped: 'mk1' },
    bestArcadeScore: 0,
    // Granny is a surprise drop-in, not an equippable ship — these counters
    // track when she should turn up for an arcade run (see GRANNY_BASE_CHANCE
    // / GRANNY_PITY_THRESHOLD). `arcadeRunsSinceGranny` counts arcade games
    // played without her so we can force a visit before it gets boring.
    arcadeRunsSinceGranny: 0,
    grannyVisits: 0,
    // Daily Quest: one rotating "Today's Special" story per local day.
    // Forging it grants 2× XP exactly once per day. `date` is YYYY-M-D
    // (see todayStr()); when it doesn't match today we re-pick.
    dailyQuest: { date: null, storyId: null, claimed: false }
  };
}
function pushHistory(entry) {
  if (!Array.isArray(state.history)) state.history = [];
  state.history.unshift(Object.assign({ ts: Date.now() }, entry));
  if (state.history.length > 50) state.history.length = 50;
}
function loadState() {
  try {
    let raw = localStorage.getItem(STORE_KEY);
    // One-time migration from any legacy key so existing players keep their
    // XP, badges, streak, ships and forged paragraphs across rename cycles.
    if (!raw) {
      for (const oldKey of LEGACY_STORE_KEYS) {
        const legacy = localStorage.getItem(oldKey);
        if (legacy) {
          localStorage.setItem(STORE_KEY, legacy);
          try { localStorage.removeItem(oldKey); } catch (_) {}
          raw = legacy;
          break;
        }
      }
      // Sweep any other stale legacy keys so they don't sit around.
      for (const oldKey of LEGACY_STORE_KEYS) {
        try { localStorage.removeItem(oldKey); } catch (_) {}
      }
    }
    if (!raw) return defaultState();
    const merged = Object.assign(defaultState(), JSON.parse(raw));
    // Make sure the ship slot is always in a sane shape, even on old saves.
    if (!merged.ships || typeof merged.ships !== 'object') merged.ships = { owned: ['mk1'], equipped: 'mk1' };
    if (!Array.isArray(merged.ships.owned) || merged.ships.owned.length === 0) merged.ships.owned = ['mk1'];
    if (!merged.ships.owned.includes('mk1')) merged.ships.owned.unshift('mk1');
    if (!merged.ships.equipped || !merged.ships.owned.includes(merged.ships.equipped)) merged.ships.equipped = 'mk1';
    // Granny used to be a 7-day-streak unlock — she's now a random in-game
    // drop-in instead, so eject her from any saved owned/equipped slot so
    // the Hangar UI doesn't try to render or equip her.
    merged.ships.owned = merged.ships.owned.filter(id => id !== 'granny');
    if (merged.ships.equipped === 'granny') merged.ships.equipped = 'mk1';
    if (typeof merged.arcadeRunsSinceGranny !== 'number') merged.arcadeRunsSinceGranny = 0;
    if (typeof merged.grannyVisits !== 'number') merged.grannyVisits = 0;
    // Daily Quest shape — older saves won't have it. ensureDailyQuest()
    // will fill in date/storyId on the next home render.
    if (!merged.dailyQuest || typeof merged.dailyQuest !== 'object') {
      merged.dailyQuest = { date: null, storyId: null, claimed: false };
    }
    return merged;
  } catch (e) { return defaultState(); }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
let state = loadState();
if (!Array.isArray(state.history)) state.history = [];

/* --------------------- GRANNY RANDOM EVENT --------------------- */
// Granny isn't equipped — she just shows up, on a strict cadence rather
// than a flat dice roll (so students never get her 5 times in a row, and
// always get a stretch of normal arcade play between visits).
//
// Cycle, measured from the last Granny visit (or from a fresh save):
//   • Runs 1..GRANNY_MIN_GAP        → never Granny (quiet zone)
//   • Next GRANNY_WINDOW runs       → Granny appears EXACTLY ONCE, picked
//                                     uniformly across the three slots
//                                     (slot 0: 1/3, slot 1: 1/2, slot 2: 1/1)
//   • As soon as she shows up the counter resets and the cycle restarts.
//
// With the defaults below: at least 4 granny-free games, then one of the
// next 3 will be Granny — guaranteed, never two in a row, never a gap
// longer than 7 runs.
const GRANNY_MIN_GAP = 4;   // arcade runs that MUST be granny-free
const GRANNY_WINDOW  = 3;   // size of the window in which she lands once
const GRANNY_PREGAME_MESSAGES = [
  "She's back!",
  "Go get 'em, Granny!",
  "Granny's locked and loaded.",
  "Cupcakes are baked — incoming!",
  "Surprise! It's Granny.",
  "Knit. Aim. Fire.",
  "Granny remembered her glasses today.",
  "Today's special: nuke cupcakes.",
  "Hold my knitting needles…",
  "Don't tell Grandpa about this.",
  "Aliens, meet your doom.",
  "Granny's outta tea. Uh oh.",
  "Sprinkles. And chaos.",
  "She heard the aliens — they're toast.",
  "Granny means business."
];
function rollGrannyRound() {
  const runs = state.arcadeRunsSinceGranny || 0;
  // Quiet zone: the first GRANNY_MIN_GAP arcade runs after a Granny visit
  // (or from a fresh save) are guaranteed granny-free.
  if (runs < GRANNY_MIN_GAP) return false;
  // Window of GRANNY_WINDOW runs in which Granny lands EXACTLY ONCE.
  // We pick the slot uniformly using per-slot conditional probability so
  // we don't need to persist a pre-picked target. Each slot is equally
  // likely overall (each 1/GRANNY_WINDOW):
  //   slot 0 (first run in window): 1 / 3
  //   slot 1 (second run in window): 1 / 2 of the remaining 2/3 = 1/3
  //   slot 2 (third run in window):  1 / 1 of the remaining 1/3 = 1/3 (forced)
  const slot = runs - GRANNY_MIN_GAP;
  const remaining = GRANNY_WINDOW - slot;
  if (remaining <= 1) return true; // last slot in the window (or overshoot)
  return Math.floor(Math.random() * remaining) === 0;
}
function pickGrannyMessage() {
  return GRANNY_PREGAME_MESSAGES[Math.floor(Math.random() * GRANNY_PREGAME_MESSAGES.length)];

const MONSTER_SPRITES = {};
function buildMonsterSprite(src, w, h) {
  w = w || 64; h = h || 64;
  const key = (w === 64 && h === 64) ? src : `${src}@${w}x${h}`;
  if (MONSTER_SPRITES[key]) return MONSTER_SPRITES[key];
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const entry = { canvas: off, loaded: false };
  MONSTER_SPRITES[key] = entry;
  const img = new Image();
  img.decoding = 'async';
  img.onload = () => {
    const c = off.getContext('2d');
    const ratio = Math.min(w / img.naturalWidth, h / img.naturalHeight);
    const dw = img.naturalWidth * ratio;
    const dh = img.naturalHeight * ratio;
    c.clearRect(0, 0, w, h);
    c.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
    entry.loaded = true;
  };
  img.src = src;
  return entry;
}

/* --------------------- HELPERS --------------------- */
function $(sel, root = document) { return root.querySelector(sel); }
function $$(sel, root = document) { return Array.from(root.querySelectorAll(sel)); }
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else if (v !== undefined && v !== null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

// Daily Quest picker. Deterministic per local day: same kid opening the
// app five times today sees the same featured story. Prefers stories
// they haven't completed yet; falls back to any story so the feature
// keeps working once the campaign is fully forged.
function ensureDailyQuest() {
  const today = todayStr();
  // Already chosen for today AND the story still exists in STORIES.
  if (state.dailyQuest && state.dailyQuest.date === today && state.dailyQuest.storyId) {
    if (STORIES.some(s => s.id === state.dailyQuest.storyId)) return state.dailyQuest;
  }
  const todo = STORIES.filter(s => !state.completed[s.id]);
  const pool = todo.length > 0 ? todo : STORIES;
  if (pool.length === 0) return state.dailyQuest;
  // Simple date-string hash — good enough to vary the pick day to day
  // while staying stable within a single day.
  let seed = 0;
  for (let i = 0; i < today.length; i++) seed = (seed * 31 + today.charCodeAt(i)) >>> 0;
  const pick = pool[seed % pool.length];
  state.dailyQuest = { date: today, storyId: pick.id, claimed: false };
  saveState();
  return state.dailyQuest;
}

// Build the "Today's Special" hero tile shown above the stories grid.
// Returns null if there's nothing to feature (shouldn't happen in
// practice — STORIES is always populated).
function buildDailyQuestTile() {
  const dq = ensureDailyQuest();
  if (!dq || !dq.storyId) return null;
  const story = STORIES.find(s => s.id === dq.storyId);
  if (!story) return null;
  const topic = TOPICS.find(t => t.id === story.topic) || {};
  const claimed = !!dq.claimed;
  const wrap = el('div', { class: 'daily-quest' + (claimed ? ' claimed' : '') });
  wrap.appendChild(el('div', { class: 'dq-ribbon' },
    claimed ? '✅ CLAIMED TODAY' : '✨ TODAY\u2019S SPECIAL · 2× XP'));
  // Thumbnail of the actual story art. Same loading chain as the story
  // grid cards (png → jpg → webp), with the topic emoji as a graceful
  // fallback so the tile never looks broken if an art file is missing.
  const thumb = el('div', { class: 'dq-thumb' });
  const thumbFallback = el('div', { class: 'dq-thumb-fallback' }, topic.emoji || '🎯');
  thumbFallback.style.display = 'none';
  thumb.appendChild(thumbFallback);
  const thumbImg = document.createElement('img');
  thumbImg.alt = '';
  thumbImg.draggable = false;
  thumbImg.style.opacity = '0';
  thumbImg.style.transition = 'opacity .25s ease';
  let thumbAttempt = 0;
  const tryNextThumb = () => {
    if (thumbAttempt >= ART_EXT_ORDER.length) {
      thumbImg.remove();
      thumbFallback.style.display = '';
      return;
    }
    thumbImg.src = `art/${story.id}.${ART_EXT_ORDER[thumbAttempt++]}`;
  };
  thumbImg.addEventListener('error', tryNextThumb);
  thumbImg.addEventListener('load', () => {
    requestAnimationFrame(() => { thumbImg.style.opacity = '1'; });
  });
  tryNextThumb();
  thumb.appendChild(thumbImg);
  wrap.appendChild(thumb);
  const txt = el('div', { class: 'dq-text' });
  txt.appendChild(el('h3', { class: 'dq-title' }, story.title));
  txt.appendChild(el('p', { class: 'dq-sub' }, claimed
    ? 'Nice work! Come back tomorrow for a fresh challenge.'
    : `${topic.name || 'Story'} · Level ${story.level} — forge it today for double XP!`));
  wrap.appendChild(txt);
  if (!claimed) {
    wrap.appendChild(el('button', { class: 'dq-cta', onclick: (e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      // If the daily pick is in a different topic, switch first so the
      // home view is coherent when the kid returns from the forge.
      if (state.selectedTopic !== story.topic) state.selectedTopic = story.topic;
      startForge(story.id);
    } }, 'FORGE NOW →'));
  } else {
    wrap.appendChild(el('div', { class: 'dq-cta dq-cta-done' }, 'See you tomorrow'));
  }
  return wrap;
}
function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) {
    const hh = d.getHours().toString().padStart(2, '0');
    const mm = d.getMinutes().toString().padStart(2, '0');
    return `Today ${hh}:${mm}`;
  }
  return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
}

// Themed promise-based confirm. Use instead of window.confirm() so we
// don't get a Win-95-looking OS popup floating at the top of the page.
//
// Example:
//   if (!(await confirmDialog({
//     title: 'Unlock Twin Striker MK II?',
//     message: 'This will spend 500 XP.',
//     confirmText: 'Unlock',
//     emoji: '🛸'
//   }))) return;
//
// Returns a Promise that resolves to true (confirm) or false
// (cancel / Esc / backdrop click).
function confirmDialog(opts) {
  opts = opts || {};
  return new Promise(resolve => {
    const back = document.createElement('div');
    back.className = 'confirm-back';
    const dlg = document.createElement('div');
    dlg.className = 'confirm-dlg';
    if (opts.emoji) {
      const em = document.createElement('div');
      em.className = 'confirm-emoji';
      em.textContent = opts.emoji;
      dlg.appendChild(em);
    }
    if (opts.title) {
      const h = document.createElement('h3');
      h.className = 'confirm-title';
      h.textContent = opts.title;
      dlg.appendChild(h);
    }
    if (opts.message) {
      const p = document.createElement('p');
      p.className = 'confirm-msg';
      p.textContent = opts.message;
      dlg.appendChild(p);
    }
    const row = document.createElement('div');
    row.className = 'confirm-row';
    const cancel = document.createElement('button');
    cancel.className = 'btn ghost';
    cancel.type = 'button';
    cancel.textContent = opts.cancelText || 'Cancel';
    const ok = document.createElement('button');
    const okVariant = opts.confirmVariant || 'primary';
    ok.className = 'btn ' + okVariant;
    ok.type = 'button';
    ok.textContent = opts.confirmText || 'OK';
    row.appendChild(cancel);
    row.appendChild(ok);
    dlg.appendChild(row);
    back.appendChild(dlg);
    document.body.appendChild(back);
    // Force a reflow so the .show transition (if any) runs from scratch.
    void back.offsetWidth;
    back.classList.add('show');
    let settled = false;
    const close = (val) => {
      if (settled) return;
      settled = true;
      document.removeEventListener('keydown', onKey, true);
      back.classList.remove('show');
      // Small delay so we don't yank the DOM mid-fade.
      setTimeout(() => { if (back.parentNode) back.parentNode.removeChild(back); }, 180);
      resolve(val);
    };
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); close(false); }
      else if (e.key === 'Enter') { e.preventDefault(); close(true); }
    };
    cancel.onclick = () => close(false);
    ok.onclick = () => close(true);
    back.onclick = (e) => { if (e.target === back) close(false); };
    document.addEventListener('keydown', onKey, true);
    setTimeout(() => { try { ok.focus(); } catch(_) {} }, 30);
  });
}
function confetti(durationMs = 2200, count = 80) {
  const wrap = $('#confetti');
  const colors = ['#ff8a3d', '#ffc24a', '#ff5a3d', '#ffd166', '#ffaa66', '#ff77b7', '#4ade80'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('i');
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.6 + Math.random() * 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.3) + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), durationMs + 500);
  }
}

/* --------------------- SENTENCE ASSEMBLY --------------------- */
function assembleSentence(sentence, picks) {
  // picks: array of option indexes (one per slot). If pick missing, returns null.
  const parts = [sentence.opener];
  for (let i = 0; i < sentence.slots.length; i++) {
    const idx = picks[i];
    if (idx == null) return null;
    parts.push(sentence.slots[i].options[idx].text);
  }
  // Smart join: trim leading whitespace on each part, no space before close-punctuation.
  return parts.reduce((acc, part, i) => {
    if (i === 0) return part;
    const trimmed = part.replace(/^\s+/, '');
    if (/^[,.;:!?]/.test(trimmed)) return acc + trimmed;
    return acc + ' ' + trimmed;
  }, '');
}
function correctSentenceText(sentence) {
  const picks = sentence.slots.map(slot => slot.options.findIndex(o => o.correct));
  return assembleSentence(sentence, picks);
}
function assembleParagraph(story, allPicks) {
  return story.sentences.map((s, i) => assembleSentence(s, allPicks[i])).join(' ');
}
function correctParagraph(story) {
  return story.sentences.map(s => correctSentenceText(s)).join(' ');
}
