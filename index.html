<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="expires" content="0" />
<title>gforce — Forge powerful sentences</title>
<style>
  :root {
    --bg-0: #0a0710;
    --bg-1: #140d20;
    --bg-2: #1f1530;
    --panel: rgba(255,255,255,0.05);
    --panel-2: rgba(255,255,255,0.09);
    --border: rgba(255,255,255,0.13);
    --text: #fff4e8;
    --muted: #b09cbf;
    --accent: #ff8a3d;
    --accent-2: #ffc24a;
    --accent-3: #ff5a3d;
    --good: #4ade80;
    --bad: #ff5a7a;
    --gold: #ffd166;
    --info: #6be3ff;
    --shadow: 0 10px 30px rgba(0,0,0,0.55);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background:
      radial-gradient(1200px 800px at 10% -10%, #4a1810 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 10%, #2d0f3a 0%, transparent 55%),
      radial-gradient(900px 700px at 50% 120%, #2a1505 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-2));
    background-attachment: fixed;
    overflow-x: hidden;
  }
  body::before {
    /* ember sparks */
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 25px 80px, #ff8a3daa, transparent),
      radial-gradient(1.5px 1.5px at 220px 240px, #ffc24a88, transparent),
      radial-gradient(2px 2px at 410px 130px, #ff8a3d99, transparent),
      radial-gradient(1.5px 1.5px at 620px 290px, #ff5a3d77, transparent),
      radial-gradient(2px 2px at 820px 170px, #ffaa6688, transparent),
      radial-gradient(1.5px 1.5px at 140px 410px, #ff8a3d66, transparent),
      radial-gradient(1.5px 1.5px at 730px 480px, #ffc24a88, transparent),
      radial-gradient(2px 2px at 1020px 360px, #ff8a3d99, transparent),
      radial-gradient(1.5px 1.5px at 340px 540px, #ffaa6688, transparent),
      radial-gradient(1.5px 1.5px at 940px 620px, #ff8a3d77, transparent);
    background-size: 1100px 700px;
    background-repeat: repeat;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px 18px 80px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    backdrop-filter: blur(8px); box-shadow: var(--shadow);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: 1px; font-size: 18px; }
  .brand .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: conic-gradient(from 220deg, #ff5a3d, #ff8a3d, #ffc24a, #ff5a3d);
    display: grid; place-items: center; color: #1a0a04; font-weight: 900; font-size: 18px;
    box-shadow: 0 0 24px rgba(255,138,61,0.55);
  }
  .topbar .spacer { flex: 1; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border);
    font-size: 13px;
  }
  .chip .pts { color: var(--gold); font-weight: 800; }
  .chip .name { color: var(--accent-2); font-weight: 700; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700;
    transition: transform .08s, background .15s, box-shadow .15s;
    font-size: 14px; user-select: none;
  }
  .btn:hover { background: rgba(255,255,255,0.13); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent-3), var(--accent), var(--accent-2));
    color: #1a0a04; border-color: transparent; box-shadow: 0 8px 20px rgba(255,138,61,0.35);
  }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.ghost { background: transparent; }
  .btn.warn { background: linear-gradient(135deg, #ffd166, #ffaa00); color: #2a1d04; }
  .btn.danger { background: linear-gradient(135deg, #ff5a7a, #ff8a3d); color: #1a0b0b; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .btn.lg { padding: 14px 22px; font-size: 16px; border-radius: 14px; }

  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px; box-shadow: var(--shadow); backdrop-filter: blur(8px);
  }

  /* Hero */
  .hero { margin-top: 18px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
  @media (max-width: 760px) { .hero { grid-template-columns: 1fr; } }
  .hero h1 {
    margin: 0 0 8px; font-size: clamp(28px, 4vw, 40px); line-height: 1.05;
    background: linear-gradient(120deg, #fff, #ffd9b8 60%, #ffaa66);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: 0.2px;
  }
  .hero p { color: var(--muted); margin: 0 0 16px; font-size: 15px; line-height: 1.5; }

  .section-title { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin: 18px 0 8px; }

  /* Name screen */
  .center-screen { min-height: 70vh; display: grid; place-items: center; }
  .name-card { width: 100%; max-width: 520px; text-align: center; }
  .name-card h2 { margin: 0 0 6px; font-size: 28px; }
  .name-card p { color: var(--muted); margin: 0 0 16px; }
  .name-card input {
    width: 100%; padding: 14px 16px; font-size: 18px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
    outline: none; text-align: center;
  }
  .name-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,138,61,0.25); }

  /* Topic tabs */
  .topic-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 12px; }
  .topic-tab {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 14px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .topic-tab.active {
    background: linear-gradient(135deg, var(--accent-3), var(--accent));
    color: #1a0a04; border-color: transparent; box-shadow: 0 4px 14px rgba(255,138,61,0.35);
  }
  .topic-tab:hover:not(.active) { background: rgba(255,255,255,0.10); }

  /* Story cards */
  .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-top: 14px; }
  .story-card {
    position: relative; padding: 16px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 16px; cursor: pointer; text-align: left;
    transition: transform .12s, border-color .15s, box-shadow .15s, background .15s;
    overflow: hidden;
  }
  .story-card:hover { transform: translateY(-2px); border-color: rgba(255,138,61,0.45); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
  .story-card.done { background: linear-gradient(160deg, rgba(255,138,61,0.18), rgba(255,194,74,0.06)); border-color: rgba(255,194,74,0.5); }
  .story-card .l {
    position: absolute; top: 10px; right: 12px; font-size: 11px; font-weight: 900; letter-spacing: 1px;
    color: var(--muted); background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 999px;
  }
  .story-card .l.l1 { color: #4ade80; }
  .story-card .l.l2 { color: var(--accent-2); }
  .story-card .l.l3 { color: var(--bad); }
  .story-card .ctx { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.45; }
  .story-card h3 { margin: 16px 0 0; font-size: 18px; }
  .story-card .meta { display: flex; gap: 8px; margin-top: 10px; color: var(--muted); font-size: 12px; }
  .story-card.done .meta { color: var(--gold); }

  /* Forge screen */
  .forge { display: flex; flex-direction: column; gap: 14px; }
  .forge-head { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .forge-head .crumb { color: var(--muted); font-size: 13px; }
  .progress-dots { display: flex; gap: 8px; }
  .progress-dots .d {
    width: 26px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.12);
  }
  .progress-dots .d.done { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .progress-dots .d.current { background: var(--accent); box-shadow: 0 0 10px rgba(255,138,61,0.6); }

  .build-display {
    background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; font-size: 19px; line-height: 1.7; color: #fff4e8;
    font-family: Georgia, "Times New Roman", serif;
  }
  .build-display .opener { color: var(--accent-2); font-weight: 700; }
  .build-display .slot-blank {
    display: inline-block; min-width: 70px; padding: 0 6px;
    border-bottom: 2px dashed rgba(255,138,61,0.55);
    color: rgba(255,255,255,0.35);
    text-align: center;
  }
  .build-display .slot-filled {
    display: inline-block; padding: 1px 6px; border-radius: 6px;
    background: rgba(255,138,61,0.16); color: #fff;
    border-bottom: 2px solid var(--accent);
  }
  .build-display .slot-wrong {
    background: rgba(255,90,122,0.18); border-bottom-color: var(--bad);
  }
  .build-display .slot-correct {
    background: rgba(74,222,128,0.15); border-bottom-color: var(--good);
  }

  .containers { display: grid; gap: 12px; }
  .container-card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; padding: 14px;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .container-card.wrong { border-color: var(--bad); background: linear-gradient(160deg, rgba(255,90,122,0.10), transparent 70%); }
  .container-card.correct { border-color: rgba(74,222,128,0.6); background: linear-gradient(160deg, rgba(74,222,128,0.08), transparent 70%); }
  .container-card .role {
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    font-weight: 800;
  }
  .options { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt {
    background: linear-gradient(180deg, #2a1d40, #1d1230);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 10px;
    padding: 8px 14px; cursor: pointer; color: #fff; font-weight: 600; font-size: 15px;
    transition: transform .08s, background .15s, border-color .15s;
    font-family: Georgia, "Times New Roman", serif;
  }
  .opt:hover { background: linear-gradient(180deg, #36254f, #251638); border-color: rgba(255,138,61,0.4); }
  .opt:active { transform: translateY(1px); }
  .opt.selected {
    background: linear-gradient(180deg, #ff8a3d, #ff5a3d);
    color: #1a0a04; border-color: var(--accent-2);
    box-shadow: 0 6px 16px rgba(255,138,61,0.35);
  }
  .opt.locked { background: linear-gradient(180deg, #2c8b6f, #186650); color: #fff; border-color: rgba(74,222,128,0.5); cursor: default; }

  .forge-actions {
    position: sticky; bottom: 14px;
    display: flex; gap: 10px; justify-content: space-between; align-items: center;
    background: rgba(10,7,16,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px;
  }
  .forge-actions .info { color: var(--muted); font-size: 13px; }

  /* Typing step */
  .typing-card {
    background: linear-gradient(160deg, rgba(74,222,128,0.10), rgba(255,138,61,0.05));
    border: 1px solid rgba(74,222,128,0.45); border-radius: 14px; padding: 16px;
  }
  .typing-card h3 { margin: 0 0 8px; color: var(--good); font-size: 16px; }
  .typing-card .ref {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin: 8px 0; font-family: Georgia, serif; font-size: 17px; line-height: 1.5; color: #fff4e8;
  }
  .typing-card textarea {
    width: 100%; padding: 12px 14px; font-size: 16px; color: var(--text); background: rgba(0,0,0,0.3);
    border: 1px solid var(--border); border-radius: 10px; outline: none; font-family: Georgia, serif; line-height: 1.5;
    min-height: 70px; resize: vertical;
  }
  .typing-card textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,138,61,0.2); }
  .typing-card .matchbar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; margin-top: 8px; overflow: hidden; }
  .typing-card .matchbar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .25s; width: 0%; }
  .typing-card .helper { color: var(--muted); font-size: 12px; margin-top: 6px; }

  /* Toast / modal / confetti (shared from EALD pattern) */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: rgba(20,13,32,0.95); border: 1px solid var(--border); padding: 12px 16px;
    border-radius: 14px; color: var(--text); display: flex; gap: 10px; align-items: center;
    box-shadow: var(--shadow); z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -6px); pointer-events: auto; }
  .toast .em { font-size: 22px; }

  .modal-back {
    position: fixed; inset: 0; background: rgba(2,2,8,0.78); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 18px;
    backdrop-filter: blur(6px);
  }
  .modal-back.show { display: flex; }
  .modal {
    width: 100%; max-width: 580px; background: linear-gradient(160deg, #2a1530, #140d20);
    border: 1px solid var(--border); border-radius: 20px; padding: 24px; text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7); animation: pop .25s ease;
    max-height: 92vh; overflow-y: auto;
  }
  @keyframes pop { from { transform: scale(.9); opacity: 0;} to { transform: scale(1); opacity: 1;} }
  .modal h2 { margin: 0 0 6px; font-size: 28px; }
  .modal p { color: var(--muted); margin: 0 0 14px; }

  .paragraph-reveal {
    background: rgba(0,0,0,0.35); border: 1px solid var(--accent-2); border-radius: 14px;
    padding: 18px 20px; margin: 12px 0; font-family: Georgia, serif; font-size: 17px; line-height: 1.7;
    color: #fff4e8; text-align: left; box-shadow: inset 0 0 30px rgba(255,138,61,0.10);
  }

  .stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .stat {
    flex: 1 1 130px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; text-align: left;
  }
  .stat .k { font-size: 12px; color: var(--muted); }
  .stat .v { font-weight: 800; font-size: 18px; }

  .row-wrap { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 99; }
  .confetti i {
    position: absolute; top: -10px; width: 8px; height: 14px; border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0.9; } }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .shake { animation: shake .25s ease 1; }

  /* Gallery */
  .gallery-list { display: grid; gap: 12px; }
  .saved-story {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
  }
  .saved-story h3 { margin: 0 0 6px; font-size: 18px; }
  .saved-story .body {
    font-family: Georgia, serif; font-size: 16px; line-height: 1.7; color: #fff4e8;
    background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-top: 10px;
  }

  /* Progress overview */
  .progress-hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 12px; }
  .ph-stat { background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .ph-stat .k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .ph-stat .v { font-size: 26px; font-weight: 900; margin-top: 4px; line-height: 1; }
  .ph-stat .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .ph-stat.accent .v { color: var(--accent); }
  .ph-stat.gold .v { color: var(--gold); }

  .topic-matrix { background: var(--panel-2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 12px; }
  .topic-matrix h3 { margin: 0 0 10px; font-size: 16px; }
  .matrix-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin: 6px 0; }
  .matrix-row .lbl { width: 30px; color: var(--muted); font-size: 12px; font-weight: 800; }
  .matrix-cell {
    flex: 0 0 auto; min-width: 100px; padding: 6px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border); font-size: 12px; color: var(--muted);
  }
  .matrix-cell.done { background: linear-gradient(135deg, rgba(255,138,61,0.25), rgba(255,194,74,0.10)); border-color: rgba(255,138,61,0.5); color: #fff; }
  .matrix-cell.perfect { background: linear-gradient(135deg, rgba(255,209,102,0.35), rgba(255,138,61,0.20)); border-color: rgba(255,209,102,0.6); color: #fff; box-shadow: 0 0 12px rgba(255,209,102,0.25); }

  /* Arcade */
  .arcade-frame { background: linear-gradient(180deg, #1a0a1c 0%, #2c0e1a 100%); border: 1px solid var(--border); border-radius: 16px; padding: 14px; box-shadow: var(--shadow); }
  .arcade-hud {
    display: flex; gap: 12px; align-items: center; justify-content: space-between;
    margin-bottom: 10px; font-weight: 800;
    background: rgba(0,0,0,0.3); padding: 8px 14px; border-radius: 12px; border: 1px solid var(--border);
  }
  .arcade-hud .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-right: 6px; }
  .arcade-hud .score { color: var(--gold); font-size: 18px; }
  .arcade-hud .lives { color: var(--bad); letter-spacing: 4px; font-size: 20px; }
  .arcade-hud .timer { color: var(--accent-2); font-size: 18px; font-variant-numeric: tabular-nums; }
  .arcade-hud .timer.low { color: var(--bad); animation: lowPulse 0.7s ease-in-out infinite; }
  @keyframes lowPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .arcade-canvas-wrap {
    position: relative; width: 100%; max-width: 720px; margin: 0 auto;
    aspect-ratio: 4 / 3;
    background: radial-gradient(ellipse at center, #1d0a18 0%, #060206 70%);
    border-radius: 12px; overflow: hidden;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  }
  .arcade-canvas-wrap canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .arcade-overlay {
    position: absolute; inset: 0; display: grid; place-items: center;
    background: rgba(2,2,12,0.65); backdrop-filter: blur(2px);
    color: #fff; font-weight: 900; text-align: center; padding: 18px;
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  .arcade-overlay.show { opacity: 1; pointer-events: auto; }
  .arcade-overlay h2 { margin: 0 0 6px; font-size: 30px; letter-spacing: 1px; }
  .arcade-overlay p { margin: 0; color: var(--muted); font-weight: 700; font-size: 14px; }
  .arcade-controls { display: flex; gap: 14px; justify-content: center; margin-top: 14px; }
  .arc-btn {
    width: 72px; height: 64px; border-radius: 14px;
    background: linear-gradient(180deg, #3a1d40, #1d1230);
    border: 1px solid rgba(255,255,255,0.18); color: #fff;
    font-size: 26px; cursor: pointer; user-select: none; display: grid; place-items: center;
    transition: transform .08s, background .15s; touch-action: manipulation;
  }
  .arc-btn:active, .arc-btn.held { transform: scale(0.94); background: linear-gradient(180deg, #46285a, #2a163e); }
  .arc-btn.fire { background: linear-gradient(135deg, var(--accent-3), var(--accent-2)); width: 96px; font-size: 28px; color: #1a0a04; }
  .arc-btn.fire:active, .arc-btn.fire.held { filter: brightness(1.12); }
  .arcade-help { color: var(--muted); font-size: 12px; text-align: center; margin-top: 8px; }
  .arcade-help kbd { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); font-size: 11px; }

  .footer-note { color: var(--muted); font-size: 12px; text-align: center; margin-top: 24px; }

  /* small screens */
  @media (max-width: 520px) {
    .topbar { padding: 8px 10px; }
    .brand { font-size: 16px; }
    .panel { padding: 16px; }
    .build-display { font-size: 17px; }

/* --------------------- STATE / STORAGE --------------------- */
const STORE_KEY = 'gforce.v1';

function defaultState() {
  return {
    name: '',
    points: 0,
    selectedTopic: 'sport',
    completed: {},          // key: storyId -> { perfect, attempts, score }
    paragraphs: [],         // [{ storyId, title, topic, text, ts, perfect, xp }]
    badges: [],
    streak: 0,
    lastSession: null,
    history: []
  };
}
function pushHistory(entry) {
  if (!Array.isArray(state.history)) state.history = [];
  state.history.unshift(Object.assign({ ts: Date.now() }, entry));
  if (state.history.length > 50) state.history.length = 50;
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) { return defaultState(); }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
let state = loadState();
if (!Array.isArray(state.history)) state.history = [];
if (!Array.isArray(state.paragraphs)) state.paragraphs = [];

/* --------------------- HELPERS --------------------- */
function $(sel, root = document) { return root.querySelector(sel); }
function $$(sel, root = document) { return Array.from(root.querySelectorAll(sel)); }
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else if (v !== undefined && v !== null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}
function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) {
    const hh = d.getHours().toString().padStart(2, '0');
    const mm = d.getMinutes().toString().padStart(2, '0');
    return `Today ${hh}:${mm}`;
  }
  return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
}

function confetti(durationMs = 2200, count = 80) {
  const wrap = $('#confetti');
  const colors = ['#ff8a3d', '#ffc24a', '#ff5a3d', '#ffd166', '#ffaa66', '#ff77b7', '#4ade80'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('i');
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.6 + Math.random() * 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.3) + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), durationMs + 500);
  }
}

/* --------------------- SENTENCE ASSEMBLY --------------------- */
function assembleSentence(sentence, picks) {
  // picks: array of option indexes (one per slot). If pick missing, returns null.
  const parts = [sentence.opener];
  for (let i = 0; i < sentence.slots.length; i++) {
    const idx = picks[i];
    if (idx == null) return null;
    parts.push(sentence.slots[i].options[idx].text);
  }
  // Smart join: trim leading whitespace on each part, no space before close-punctuation.
  return parts.reduce((acc, part, i) => {
    if (i === 0) return part;
    const trimmed = part.replace(/^\s+/, '');
    if (/^[,.;:!?]/.test(trimmed)) return acc + trimmed;
    return acc + ' ' + trimmed;
  }, '');
}
function correctSentenceText(sentence) {
  const picks = sentence.slots.map(slot => slot.options.findIndex(o => o.correct));
  return assembleSentence(sentence, picks);
}
function assembleParagraph(story, allPicks) {
  return story.sentences.map((s, i) => assembleSentence(s, allPicks[i])).join(' ');
}
function correctParagraph(story) {
  return story.sentences.map(s => correctSentenceText(s)).join(' ');
}

/* --------------------- FORGE ENGINE --------------------- */
let forge = null;

function startForge(storyId) {
  const story = STORIES.find(s => s.id === storyId);
  if (!story) return;
  // Shuffle option order within each slot per session (but track correct index by content)
  const sentencesState = story.sentences.map(sent => ({
    opener: sent.opener,
    slots: sent.slots.map(slot => {
      const correctText = slot.options.find(o => o.correct).text;
      const shuffled = shuffle(slot.options);
      return {
        role: slot.role,
        options: shuffled,
        correctIndex: shuffled.findIndex(o => o.text === correctText)
      };
    })
  }));
  forge = {
    story,
    sentencesState,
    index: 0,
    picks: sentencesState.map(s => s.slots.map(() => null)),
    sentenceChecked: sentencesState.map(() => false),
    sentenceCorrect: sentencesState.map(() => false),
    sentenceWrongChecks: sentencesState.map(() => 0),
    typed: sentencesState.map(() => ''),
    typedComplete: sentencesState.map(() => false),
    sentencePerfect: sentencesState.map(() => null), // true on first-check pass
    started: Date.now()
  };
  renderForge();
}

function renderForge() {
  const app = $('#app');
  app.innerHTML = '';
  app.appendChild(topbar());
  const f = forge;
  const s = f.story;
  const i = f.index;
  const sentState = f.sentencesState[i];

  const head = el('div', { class: 'panel forge' });
  head.appendChild(el('div', { class: 'forge-head' },
    el('button', { class: 'btn ghost', onclick: () => {
      if (confirm('Leave this forge? Your work on this story will be lost.')) { forge = null; render(); }
    } }, '← Stories'),
    el('div', { class: 'crumb' }, `L${s.level} · ${s.title}`),
    (() => {
      const d = el('div', { class: 'progress-dots' });
      f.sentencesState.forEach((_, idx) => {
        const cls = 'd' + (idx === i ? ' current' : (f.typedComplete[idx] ? ' done' : ''));
        d.appendChild(el('span', { class: cls }));
      });
      return d;
    })()
  ));

  head.appendChild(el('h2', { style: { margin: '8px 0 4px' } }, s.title));
  head.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px' } }, `Sentence ${i + 1} of ${f.sentencesState.length} · ${s.context}`));

  // Build display: shows opener + slots (blank or filled)
  const buildEl = el('div', { class: 'build-display', style: { marginTop: '12px' } });
  buildEl.appendChild(el('span', { class: 'opener' }, sentState.opener));
  sentState.slots.forEach((slot, sIdx) => {
    const pick = f.picks[i][sIdx];
    const wasChecked = f.sentenceChecked[i];
    const isCorrectPick = pick != null && pick === slot.correctIndex;
    let cls = pick == null ? 'slot-blank' : 'slot-filled';
    if (wasChecked && pick != null) cls += isCorrectPick ? ' slot-correct' : ' slot-wrong';
    const rawText = pick == null ? '____' : slot.options[pick].text;
    const text = rawText.replace(/^\s+/, '');
    if (/^[,.;:!?]/.test(text)) {
      buildEl.appendChild(el('span', { class: cls }, text));
    } else {
      buildEl.appendChild(document.createTextNode(' '));
      buildEl.appendChild(el('span', { class: cls }, text));
    }
  });
  head.appendChild(buildEl);

  // If sentence not yet correct, show containers; if correct, show typing step
  if (!f.sentenceCorrect[i]) {
    const containers = el('div', { class: 'containers' });
    sentState.slots.forEach((slot, sIdx) => {
      const pick = f.picks[i][sIdx];
      const checked = f.sentenceChecked[i];
      const isCorrectPick = pick != null && pick === slot.correctIndex;
      let cardCls = 'container-card';
      if (checked && pick != null) cardCls += isCorrectPick ? ' correct' : ' wrong';
      const card = el('div', { class: cardCls });
      card.appendChild(el('div', { class: 'role' }, slot.role));
      const opts = el('div', { class: 'options' });
      slot.options.forEach((opt, oIdx) => {
        const isPicked = pick === oIdx;
        const locked = checked && isPicked && isCorrectPick;
        const cls = 'opt' + (isPicked ? ' selected' : '') + (locked ? ' locked' : '');
        opts.appendChild(el('button', {
          class: cls,
          onclick: () => {
            if (locked) return;
            f.picks[i][sIdx] = oIdx;
            // If user changes a previously-wrong slot, clear the global "checked" wrong-state for THIS slot via re-render
            renderForge();
          }
        }, opt.text));
      });
      card.appendChild(opts);
      containers.appendChild(card);
    });
    head.appendChild(containers);
  } else {
    // Typing step
    const correct = correctSentenceText(s.sentences[i]);
    const card = el('div', { class: 'typing-card', style: { marginTop: '12px' } });
    card.appendChild(el('h3', {}, '✓ Sentence built! Now type it exactly to lock it in.'));
    card.appendChild(el('div', { class: 'ref' }, correct));
    const ta = el('textarea', { placeholder: 'Type the sentence exactly…', spellcheck: 'false' });
    ta.value = f.typed[i] || '';
    const matchBar = el('div', { class: 'matchbar' });
    const matchFill = el('div'); matchBar.appendChild(matchFill);
    const helper = el('div', { class: 'helper' }, '');
    const updateMatch = () => {
      const t = ta.value;
      f.typed[i] = t;
      const pct = computeTypeMatchPct(t, correct);
      matchFill.style.width = pct + '%';
      if (t === correct) {
        helper.textContent = 'Perfect match — press Lock In.';
        helper.style.color = 'var(--good)';
      } else if (pct >= 70) {
        helper.textContent = 'Close — fix small differences (case, punctuation, spelling).';
        helper.style.color = 'var(--accent-2)';
      } else {
        helper.textContent = 'Copy the sample above word-for-word.';
        helper.style.color = 'var(--muted)';
      }
    };
    ta.addEventListener('input', updateMatch);
    card.appendChild(ta);
    card.appendChild(matchBar);
    card.appendChild(helper);
    head.appendChild(card);
    setTimeout(() => { ta.focus(); updateMatch(); }, 30);
  }

  app.appendChild(head);

  // Actions
  const actions = el('div', { class: 'forge-actions' });
  if (!f.sentenceCorrect[i]) {
    const allPicked = f.picks[i].every(p => p != null);
    const wrongCount = f.sentenceChecked[i] ? f.picks[i].filter((p, idx) => p !== sentState.slots[idx].correctIndex).length : 0;
    const infoText = !allPicked
      ? `Pick one option from every container, then press Check.`
      : f.sentenceChecked[i]
      ? `${wrongCount} container${wrongCount === 1 ? '' : 's'} to fix — red borders show which.`
      : 'Press Check to forge the sentence.';
    actions.appendChild(el('div', { class: 'info' }, infoText));
    actions.appendChild(el('button', {
      class: 'btn primary lg',
      onclick: checkSentence
    }, 'Check ✓'));
  } else {
    const correct = correctSentenceText(s.sentences[i]);
    actions.appendChild(el('div', { class: 'info' }, 'Type the sentence above to lock it in.'));
    actions.appendChild(el('button', {
      class: 'btn primary lg',
      onclick: lockTyping
    }, 'Lock In →'));
  }
  app.appendChild(actions);
}

function computeTypeMatchPct(a, b) {
  if (!a) return 0;
  if (a === b) return 100;
  const m = Math.min(a.length, b.length);
  let same = 0;
  for (let i = 0; i < m; i++) if (a[i] === b[i]) same++;
  return Math.round((same / Math.max(b.length, 1)) * 100);
}

function checkSentence() {
  const f = forge;
  const i = f.index;
  const sentState = f.sentencesState[i];
  if (!f.picks[i].every(p => p != null)) {
    toast('Pick from every container first ✏️');
    return;
  }
  f.sentenceChecked[i] = true;
  const allRight = f.picks[i].every((p, idx) => p === sentState.slots[idx].correctIndex);
  if (allRight) {
    if (f.sentencePerfect[i] === null) f.sentencePerfect[i] = (f.sentenceWrongChecks[i] === 0);
    f.sentenceCorrect[i] = true;
    if (f.sentencePerfect[i]) awardBadge('perfect');
    toast('Sentence built! Now type it.', '⚒️');
  } else {
    f.sentenceWrongChecks[i]++;
    // shake the wrong containers
    setTimeout(() => {
      $$('.container-card.wrong').forEach(node => {
        node.classList.add('shake');
        setTimeout(() => node.classList.remove('shake'), 260);
      });
    }, 50);
  }
  renderForge();
}

function lockTyping() {
  const f = forge;
  const i = f.index;
  const correct = correctSentenceText(f.story.sentences[i]);
  const typed = (f.typed[i] || '').trim();
  if (typed !== correct) {
    // strict but helpful: tell them where it differs
    const pct = computeTypeMatchPct(f.typed[i] || '', correct);
    if (pct < 100) {
      toast('Not exact yet — match the reference letter for letter.', '✏️');
      return;
    }
  }
  f.typedComplete[i] = true;
  if (i + 1 < f.sentencesState.length) {
    f.index = i + 1;
    renderForge();
  } else {
    finishStory();
  }
}

function finishStory() {
  const f = forge;
  const story = f.story;
  const lvl = story.level;
  const allPerfect = f.sentencePerfect.every(p => p === true);
  const totalWrongChecks = f.sentenceWrongChecks.reduce((a, b) => a + b, 0);
  const sentencesPerfect = f.sentencePerfect.filter(p => p === true).length;
  const sentencesTotal = f.sentencesState.length;

  const mult = lvl === 1 ? 1 : lvl === 2 ? 1.5 : 2;
  let earned = 0;
  // Per sentence: 50 each
  earned += sentencesTotal * 50;
  // +50 perfect-build per sentence
  earned += sentencesPerfect * 50;
  // +30 typed (always 30 if typed completed)
  earned += sentencesTotal * 30;
  // Paragraph bonus
  earned += 200;
  if (allPerfect) earned += 150;
  earned = Math.round(earned * mult);

  const firstTime = !state.completed[story.id];
  state.points += earned;
  state.completed[story.id] = { perfect: allPerfect, attempts: 1, score: earned };
  state.streak = (state.lastSession === todayStr() || !state.lastSession) ? state.streak + 1 : 1;
  state.lastSession = todayStr();

  // Save the forged paragraph
  const paragraphText = correctParagraph(story);
  state.paragraphs.unshift({
    storyId: story.id, title: story.title, topic: story.topic,
    level: lvl, text: paragraphText, ts: Date.now(), perfect: allPerfect, xp: earned
  });
  if (state.paragraphs.length > 200) state.paragraphs.length = 200;

  if (lvl === 3) awardBadge('l3');
  if (allPerfect) awardBadge('paragon');
  pushHistory({ storyId: story.id, title: story.title, topic: story.topic, level: lvl, perfect: allPerfect, xp: earned });
  saveState();
  checkBadges();

  // Modal: paragraph reveal
  confetti();
  const m = el('div');
  m.appendChild(el('div', { style: { fontSize: '52px' } }, allPerfect ? '💎' : '🔨'));
  m.appendChild(el('h2', {}, allPerfect ? 'Paragon Paragraph!' : 'Paragraph Forged!'));
  m.appendChild(el('p', {}, allPerfect
    ? `${state.name}, every sentence built clean. This one is a keeper.`
    : `${state.name}, you forged the full paragraph for "${story.title}".`));
  m.appendChild(el('div', { class: 'paragraph-reveal' }, paragraphText));
  const row = el('div', { class: 'stat-row' });
  row.appendChild(stat('XP earned', '+' + earned));
  row.appendChild(stat('Perfect builds', `${sentencesPerfect}/${sentencesTotal}`));
  row.appendChild(stat('Streak', state.streak + ' 🔥'));
  m.appendChild(row);

  const btns = el('div', { class: 'row-wrap', style: { justifyContent: 'center', marginTop: '16px' } });
  btns.appendChild(el('button', { class: 'btn warn lg', onclick: () => { closeModal(); forge = null; startArcade({ reward: true, level: lvl }); } }, '🕹️ Play Reward Game'));
  // Find next unforged story in same topic
  const idx = STORIES.findIndex(s => s.id === story.id);
  let nextStory = null;
  for (let i = 1; i <= STORIES.length; i++) {
    const cand = STORIES[(idx + i) % STORIES.length];
    if (cand.topic === story.topic && !state.completed[cand.id]) { nextStory = cand; break; }
  }
  if (nextStory) {
    btns.appendChild(el('button', { class: 'btn primary', onclick: () => { closeModal(); startForge(nextStory.id); } }, `Next: ${nextStory.title} →`));
  } else {
    btns.appendChild(el('button', { class: 'btn primary', onclick: () => { closeModal(); forge = null; render(); } }, 'Back to Stories'));
  }
  btns.appendChild(el('button', { class: 'btn ghost', onclick: () => { closeModal(); forge = null; render(); } }, 'Home'));
  m.appendChild(btns);
  openModal(m);
}

function buildAllText() {
  const lines = [];
  lines.push(`gforce — My Forged Paragraphs`);
  lines.push(`Player: ${state.name}`);
  lines.push(`Generated: ${new Date().toLocaleString()}`);
  lines.push('');
  state.paragraphs.forEach(p => {
    const topic = TOPICS.find(t => t.id === p.topic);
    lines.push(`=== ${p.title}  (${topic ? topic.name : p.topic} · L${p.level})  ${p.perfect ? '★ Paragon' : ''}`);
    lines.push(formatDate(p.ts) + '  · +' + p.xp + ' XP');
    lines.push('');
    lines.push(p.text);
    lines.push('');
  });
  return lines.join('\n');
}
function copyAllParagraphs() {
  if (!state.paragraphs.length) { toast('Nothing to copy yet', 'ℹ️'); return; }
  const text = buildAllText();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast('All paragraphs copied!', '📋'), () => fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('Copied!', '📋'); }
  catch (e) { toast('Copy not supported — use Download', 'ℹ️'); }
  document.body.removeChild(ta);
}
function downloadAllParagraphs() {
  if (!state.paragraphs.length) { toast('Nothing to download yet', 'ℹ️'); return; }
  const text = buildAllText();
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safe = (state.name || 'player').replace(/[^a-z0-9_\-]+/gi, '_');
  a.download = `gforce-paragraphs-${safe}.txt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Downloaded.', '⬇');
}

/* --------------------- ARCADE (re-skinned forge invaders) --------------------- */
let arcade = null;
const ARC_W = 720, ARC_H = 540;
const ARC_KEYS = { left: false, right: false, fire: false };
const ARC_KEYMAP = {
  arrowleft: 'left', a: 'left',
  arrowright: 'right', d: 'right',
  ' ': 'fire', spacebar: 'fire', space: 'fire'
};
function arcKeyDown(e) {
  if (!arcade || !arcade.active) return;
  const k = (e.key || '').toLowerCase();
  if (k === 'p') { arcade.paused = !arcade.paused; return; }
  const m = ARC_KEYMAP[k];
  if (m) { ARC_KEYS[m] = true; e.preventDefault(); }
}
function arcKeyUp(e) {
  if (!arcade) return;
  const k = (e.key || '').toLowerCase();
  const m = ARC_KEYMAP[k];
  if (m) { ARC_KEYS[m] = false; e.preventDefault(); }
}
function startArcade(opts = {}) {
  const reward = opts.reward !== false;
  const fromLevel = opts.level || 1;
  arcade = {
    active: true, paused: false, over: false, won: false, timeUp: false, resultShown: false,
    reward, fromLevel, timeRemaining: 60000,
    player: { x: ARC_W / 2, y: ARC_H - 50, w: 44, h: 30, speed: 0.42, invuln: 0 },
    bullets: [], enemyBullets: [], enemies: createWave(), particles: [],
    score: 0, lives: 3, livesLostThisGame: 0,
    enemyDir: 1, enemyStepEvery: 700, enemyStepTimer: 0, enemyDropPending: false,
    lastFire: 0, fireCooldown: 240, enemyFireTimer: 0, enemyFireEvery: 700,
    shake: 0, raf: null, lastTs: 0
  };
  renderArcade();
  document.addEventListener('keydown', arcKeyDown);
  document.addEventListener('keyup', arcKeyUp);
  arcade.raf = requestAnimationFrame(arcadeLoop);
}
function endArcade() {
  if (!arcade) return;
  arcade.active = false;
  if (arcade.raf) cancelAnimationFrame(arcade.raf);
  document.removeEventListener('keydown', arcKeyDown);
  document.removeEventListener('keyup', arcKeyUp);
  ARC_KEYS.left = ARC_KEYS.right = ARC_KEYS.fire = false;
  arcade = null;
}
function createWave() {
  const enemies = []; const cols = 8, rows = 5;
  const stepX = 64, stepY = 50;
  const startX = (ARC_W - (cols - 1) * stepX) / 2;
  const startY = 70;
  const rowEmoji = ['👾','🛸','🤖','👽','👹'];
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
    enemies.push({ x: startX + c * stepX, y: startY + r * stepY, w: 40, h: 36, emoji: rowEmoji[r % rowEmoji.length], alive: true, col: c, row: r });
  return enemies;
}
function renderArcade() {
  const app = $('#app');
  app.innerHTML = '';
  app.appendChild(topbar());
  const head = el('div', { class: 'panel' });
  head.appendChild(el('div', { class: 'forge-head' },
    el('button', { class: 'btn ghost', onclick: () => { endArcade(); render(); } }, '← Quit'),
    el('div', { class: 'crumb' }, '🕹️ Forge Invaders — clear the wave!')
  ));
  const frame = el('div', { class: 'arcade-frame' });
  const hud = el('div', { class: 'arcade-hud' });
  hud.appendChild(el('div', {}, el('span', { class: 'k' }, 'Score'), el('span', { class: 'score', id: 'arcScore' }, '0')));
  hud.appendChild(el('div', {}, el('span', { class: 'k' }, 'Time'), el('span', { id: 'arcTime', class: 'timer' }, '60s')));
  hud.appendChild(el('div', {}, el('span', { class: 'k' }, 'XP'), el('span', { id: 'arcXp', style: { color: 'var(--accent)' } }, '+0')));
  hud.appendChild(el('div', {}, el('span', { class: 'k' }, 'Lives'), el('span', { class: 'lives', id: 'arcLives' }, '❤❤❤')));
  frame.appendChild(hud);
  const wrap = el('div', { class: 'arcade-canvas-wrap' });
  wrap.appendChild(el('canvas', { id: 'arcCanvas', width: String(ARC_W), height: String(ARC_H) }));
  const overlay = el('div', { class: 'arcade-overlay', id: 'arcOverlay' });
  overlay.appendChild(el('h2', { id: 'arcOverlayTitle' }, 'Get Ready!'));
  overlay.appendChild(el('p', { id: 'arcOverlayBody' }, '60 seconds — score as much as you can!'));
  wrap.appendChild(overlay);
  frame.appendChild(wrap);
  const controls = el('div', { class: 'arcade-controls' });
  const btnL = el('button', { class: 'arc-btn' }, '◀');
  const btnF = el('button', { class: 'arc-btn fire' }, '🔫');
  const btnR = el('button', { class: 'arc-btn' }, '▶');
  const bindHold = (btn, key) => {
    const dn = (ev) => { ev.preventDefault(); ARC_KEYS[key] = true; btn.classList.add('held'); };
    const up = (ev) => { ev.preventDefault(); ARC_KEYS[key] = false; btn.classList.remove('held'); };
    btn.addEventListener('mousedown', dn); btn.addEventListener('mouseup', up); btn.addEventListener('mouseleave', up);
    btn.addEventListener('touchstart', dn, { passive: false });
    btn.addEventListener('touchend', up, { passive: false });
    btn.addEventListener('touchcancel', up, { passive: false });
  };
  bindHold(btnL, 'left'); bindHold(btnR, 'right'); bindHold(btnF, 'fire');
  controls.appendChild(btnL); controls.appendChild(btnF); controls.appendChild(btnR);
  frame.appendChild(controls);
  frame.appendChild(el('div', { class: 'arcade-help' },
    '60 seconds. Desktop: ', el('kbd', {}, '◀'), ' ', el('kbd', {}, '▶'), ' move, ', el('kbd', {}, 'Space'), ' fire, ', el('kbd', {}, 'P'), ' pause.'));
  head.appendChild(frame);
  app.appendChild(head);
  showArcOverlay('Get Ready!', '60 seconds — score as much as you can!');
  setTimeout(() => hideArcOverlay(), 1000);
}
function showArcOverlay(t, b) { const o = $('#arcOverlay'); if (!o) return; $('#arcOverlayTitle').textContent = t; $('#arcOverlayBody').textContent = b || ''; o.classList.add('show'); }
function hideArcOverlay() { const o = $('#arcOverlay'); if (o) o.classList.remove('show'); }
function arcadeLoop(ts) {
  if (!arcade || !arcade.active) return;
  if (!arcade.lastTs) arcade.lastTs = ts;
  const dt = Math.min(50, ts - arcade.lastTs);
  arcade.lastTs = ts;
  if (!arcade.paused && !arcade.over) updateArcade(dt);
  drawArcade();
  arcade.raf = requestAnimationFrame(arcadeLoop);
  if (arcade.over && !arcade.resultShown) {
    arcade.resultShown = true;
    setTimeout(() => showArcadeResult(), 600);
  }
}
function updateArcade(dt) {
  const a = arcade;
  a.timeRemaining = Math.max(0, a.timeRemaining - dt);
  if (ARC_KEYS.left)  a.player.x -= a.player.speed * dt;
  if (ARC_KEYS.right) a.player.x += a.player.speed * dt;
  a.player.x = Math.max(a.player.w/2 + 6, Math.min(ARC_W - a.player.w/2 - 6, a.player.x));
  if (ARC_KEYS.fire && performance.now() - a.lastFire > a.fireCooldown) {
    a.bullets.push({ x: a.player.x, y: a.player.y - 14, w: 4, h: 12, vy: -0.9 });
    a.lastFire = performance.now();
  }
  for (const b of a.bullets) b.y += b.vy * dt;
  a.bullets = a.bullets.filter(b => b.y > -20);
  a.enemyStepTimer += dt;
  const alive = a.enemies.filter(e => e.alive);
  const killCount = a.enemies.length - alive.length;
  a.enemyStepEvery = Math.max(120, 700 - killCount * 18);
  if (a.enemyStepTimer >= a.enemyStepEvery && alive.length > 0) {
    a.enemyStepTimer = 0;
    if (a.enemyDropPending) { for (const e of alive) e.y += 22; a.enemyDir *= -1; a.enemyDropPending = false; }
    else {
      const dx = 14 * a.enemyDir;
      for (const e of alive) e.x += dx;
      let minX = Infinity, maxX = -Infinity;
      for (const e of alive) { if (e.x - e.w/2 < minX) minX = e.x - e.w/2; if (e.x + e.w/2 > maxX) maxX = e.x + e.w/2; }
      if (minX < 16 || maxX > ARC_W - 16) a.enemyDropPending = true;
    }
  }
  a.enemyFireTimer += dt;
  a.enemyFireEvery = Math.max(180, 700 - killCount * 12);
  if (a.enemyFireTimer >= a.enemyFireEvery && alive.length > 0 && a.enemyBullets.length < 4) {
    a.enemyFireTimer = 0;
    const byCol = {};
    for (const e of alive) if (!byCol[e.col] || e.y > byCol[e.col].y) byCol[e.col] = e;
    const fronts = Object.values(byCol);
    const sh = fronts[Math.floor(Math.random() * fronts.length)];
    if (sh) a.enemyBullets.push({ x: sh.x, y: sh.y + 16, w: 4, h: 10, vy: 0.32 });
  }
  for (const b of a.enemyBullets) b.y += b.vy * dt;
  a.enemyBullets = a.enemyBullets.filter(b => b.y < ARC_H + 20);
  for (const b of a.bullets) {
    for (const e of alive) {
      if (!e.alive) continue;
      if (Math.abs(b.x - e.x) < e.w/2 + b.w/2 && Math.abs(b.y - e.y) < e.h/2 + b.h/2) {
        e.alive = false; b.y = -100; a.score += 10;
        spawnParticles(e.x, e.y, '#ff8a3d');
        break;
      }
    }
  }
  a.bullets = a.bullets.filter(b => b.y > -20);
  if (a.player.invuln <= 0) {
    for (const b of a.enemyBullets) {
      if (Math.abs(b.x - a.player.x) < a.player.w/2 + b.w/2 && Math.abs(b.y - a.player.y) < a.player.h/2 + b.h/2) {
        a.lives--; a.livesLostThisGame++; a.player.invuln = 1200; a.shake = 18; b.y = ARC_H + 100;
        spawnParticles(a.player.x, a.player.y, '#ff5a7a');
        break;
      }
    }
    a.enemyBullets = a.enemyBullets.filter(b => b.y < ARC_H + 20);
  } else a.player.invuln -= dt;
  const reachedBottom = alive.some(e => e.y + e.h/2 >= a.player.y - 10);
  for (const p of a.particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; }
  a.particles = a.particles.filter(p => p.life > 0);
  if (a.shake > 0) a.shake = Math.max(0, a.shake - dt * 0.05);
  if (alive.length === 0) { a.over = true; a.won = true; a.score += 100; if (a.livesLostThisGame === 0) a.score += 50; }
  else if (a.lives <= 0 || reachedBottom) { a.over = true; a.won = false; }
  else if (a.timeRemaining <= 0) { a.over = true; a.won = false; a.timeUp = true; }
  updateArcHud();
}
function spawnParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const ang = Math.random() * Math.PI * 2;
    const sp = 0.15 + Math.random() * 0.3;
    arcade.particles.push({ x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, life: 500 + Math.random() * 300, maxLife: 800, color });
  }
}
function updateArcHud() {
  const a = arcade;
  const sc = $('#arcScore'); const lv = $('#arcLives'); const xp = $('#arcXp'); const tm = $('#arcTime');
  if (sc) sc.textContent = String(a.score);
  if (lv) lv.textContent = a.lives > 0 ? '❤'.repeat(a.lives) : '✖';
  if (xp) xp.textContent = '+' + previewXp(a.score);
  if (tm) { const s = Math.ceil(a.timeRemaining / 1000); tm.textContent = s + 's'; tm.classList.toggle('low', s <= 10); }
}
function previewXp(score) {
  if (!arcade || !arcade.reward) return 0;
  const mult = arcade.fromLevel === 1 ? 1 : arcade.fromLevel === 2 ? 1.25 : 1.5;
  return Math.round(Math.min(100, Math.floor(score / 8)) * mult);
}
function drawArcade() {
  const cnv = $('#arcCanvas'); if (!cnv) return;
  const ctx = cnv.getContext('2d');
  ctx.save();
  if (arcade.shake > 0) ctx.translate((Math.random() - 0.5) * arcade.shake, (Math.random() - 0.5) * arcade.shake);
  const grad = ctx.createRadialGradient(ARC_W/2, ARC_H/2, 50, ARC_W/2, ARC_H/2, ARC_W*0.7);
  grad.addColorStop(0, '#1d0a18'); grad.addColorStop(1, '#060206');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, ARC_W, ARC_H);
  ctx.fillStyle = '#ffffff55';
  for (let i = 0; i < 60; i++) { const x = ((i * 137) % ARC_W); const y = ((i * 271) % ARC_H); ctx.fillRect(x, y, 2, 2); }
  ctx.font = '34px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",system-ui,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const e of arcade.enemies) if (e.alive) ctx.fillText(e.emoji, e.x, e.y);
  ctx.fillStyle = '#ffe066';
  for (const b of arcade.bullets) ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  ctx.fillStyle = '#ff5a7a';
  for (const b of arcade.enemyBullets) ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  const p = arcade.player;
  const blink = p.invuln > 0 && Math.floor(performance.now() / 80) % 2 === 0;
  if (!blink) {
    ctx.fillStyle = '#ff8a3d';
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - p.h/2);
    ctx.lineTo(p.x - p.w/2, p.y + p.h/2);
    ctx.lineTo(p.x + p.w/2, p.y + p.h/2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1a0a04'; ctx.fillRect(p.x - 4, p.y - 2, 8, 6);
    ctx.fillStyle = '#ffd166';
    const fh = 6 + Math.random() * 6;
    ctx.fillRect(p.x - 6, p.y + p.h/2, 12, fh);
  }
  for (const pt of arcade.particles) {
    ctx.fillStyle = pt.color; ctx.globalAlpha = Math.max(0, pt.life / pt.maxLife);
    ctx.fillRect(pt.x - 2, pt.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
  if (arcade.paused) showArcOverlay('Paused', 'Press P to resume.');
  else if (!arcade.over) hideArcOverlay();
}
function showArcadeResult() {
  const a = arcade;
  const won = a.won, score = a.score, livesLost = a.livesLostThisGame;
  const xpEarned = a.reward ? previewXp(score) : 0;
  if (a.reward && xpEarned > 0) state.points += xpEarned;
  if (score >= 200) awardBadge('arcade');
  if (won) awardBadge('defender');
  saveState();
  const m = el('div');
  const emoji = won ? '🛸' : a.timeUp ? '⏰' : '👾';
  const title = won ? 'Wave Cleared!' : a.timeUp ? "Time's Up — Back to the Forge!" : 'Game Over';
  const sub = won
    ? `Brilliant flying, ${state.name}! Every alien blasted.`
    : a.timeUp
    ? `60 seconds is up, ${state.name}. Score locked in — now back to forging.`
    : `Tough wave, ${state.name}. The aliens got you this time.`;
  m.appendChild(el('div', { style: { fontSize: '52px' } }, emoji));
  m.appendChild(el('h2', {}, title));
  m.appendChild(el('p', {}, sub));
  const row = el('div', { class: 'stat-row' });
  row.appendChild(stat('Score', score));
  row.appendChild(stat('Lives lost', livesLost));
  if (a.reward) row.appendChild(stat('Bonus XP', '+' + xpEarned));
  m.appendChild(row);
  const btns = el('div', { class: 'row-wrap', style: { justifyContent: 'center', marginTop: '16px' } });
  if (!a.reward) {
    btns.appendChild(el('button', { class: 'btn', onclick: () => { closeModal(); endArcade(); startArcade({ reward: false, level: a.fromLevel }); } }, '↻ Play Again'));
  }
  btns.appendChild(el('button', { class: 'btn primary lg', onclick: () => { closeModal(); endArcade(); render(); } }, 'Back to the Forge →'));
  m.appendChild(btns);
  openModal(m);
}

/* --------------------- BOOT --------------------- */
render();
</script>
