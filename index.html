const MONSTER_SPRITES = {};
function buildMonsterSprite(src, w, h) {
  w = w || 64; h = h || 64;
  const key = (w === 64 && h === 64) ? src : `${src}@${w}x${h}`;
  if (MONSTER_SPRITES[key]) return MONSTER_SPRITES[key];
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const entry = { canvas: off, loaded: false };
  MONSTER_SPRITES[key] = entry;
  const img = new Image();
  img.decoding = 'async';
  img.onload = () => {
    const c = off.getContext('2d');
    const ratio = Math.min(w / img.naturalWidth, h / img.naturalHeight);
    const dw = img.naturalWidth * ratio;
    const dh = img.naturalHeight * ratio;
    c.clearRect(0, 0, w, h);
    c.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
    entry.loaded = true;
  };
  img.src = src;
  return entry;
}

function daysUntilHatch(c) {
  if (!c || c.hatched || !c.hatchDate) return null;

  const p0 = today.split('-').map(Number);
  const p1 = c.hatchDate.split('-').map(Number);
  const d0 = new Date(p0[0], p0[1] - 1, p0[2]);

  if (getCritterRecord(topic)) return;
  if (!isThemeComplete(topic)) return;
  state.themesCritterQueued.push(topic);

function ensurePetCare(topic) {
  if (!state.petCare || typeof state.petCare !== 'object') state.petCare = {};
  if (!state.petCare[topic]) state.petCare[topic] = { lastFedDate: null, lastJoyDate: null };
  return state.petCare[topic];
}
function petNeedsFood(topic) {

  if (!c || !c.hatched) return false;
  const care = ensurePetCare(topic);
  return care.lastFedDate !== todayStr();
}
function petNeedsJoy(topic) {
  const c = getCritterRecord(topic);
  if (!c || !c.hatched) return false;
  const care = ensurePetCare(topic);
  if (!care.lastJoyDate) return true;
  return daysBetweenDateStr(care.lastJoyDate, todayStr()) >= PET_JOY_SEGMENTS;
}

function buyPetShopItem(item) {

  if (state.points < item.cost) {
    toast('Not enough XP yet.', '💸');

  state.points -= item.cost;

  toast(`${who} loved the ${item.name}!`, item.type === 'food' ? '🥣' : '💫');

function playCritterDeliveryAnimation(topic, onDone) {
  const o = $('#arcOverlay');
  if (!o) { if (onDone) onDone(); return; }
  const birthSrc = critterPath(topic, 'birth_ship');
  const eggSrc = critterPath(topic, 'egg');
  o.classList.remove('granny', 'show');
  const stale = o.querySelector('.arc-cinematic, .arc-granny, .arc-birth-scene');
  if (stale) stale.remove();
  o.classList.add('cinematic', 'birth-delivery');
  const titleEl = $('#arcOverlayTitle');
  const bodyEl = $('#arcOverlayBody');
  if (titleEl) titleEl.style.display = 'none';
  if (bodyEl) bodyEl.style.display = 'none';

  const scene = document.createElement('div');
  scene.className = 'arc-birth-scene';
  scene.appendChild(el('div', { class: 'arc-birth-whiz', 'aria-hidden': 'true' }));
  const ship = document.createElement('img');
  ship.className = 'arc-birth-ship';
  ship.src = birthSrc;
  ship.alt = '';
  ship.draggable = false;
  scene.appendChild(ship);
  const egg = document.createElement('img');
  egg.className = 'arc-birth-egg';
  egg.src = eggSrc;
  egg.alt = '';
  egg.draggable = false;
  scene.appendChild(egg);
  scene.appendChild(el('div', { class: 'arc-birth-impact', 'aria-hidden': 'true' }));
  o.appendChild(scene);
  void o.offsetWidth;
  o.classList.add('show');

  const DELIVERY_MS = 4300;
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    document.removeEventListener('keydown', skipHandler, true);
    o.removeEventListener('click', skipHandler);
    o.removeEventListener('touchstart', skipHandler);
    o.classList.remove('cinematic', 'birth-delivery', 'show');
    scene.remove();
    if (titleEl) titleEl.style.display = '';
    if (bodyEl) bodyEl.style.display = '';
    if (onDone) onDone();
  };
  const skipHandler = (ev) => {
    if (ev && ev.type === 'keydown' && (ev.key || '').toLowerCase() === 'p') return;
    if (ev && ev.stopPropagation) ev.stopPropagation();
    if (ev && ev.preventDefault) ev.preventDefault();
    finish();
  };
  setTimeout(() => {
    if (done) return;
    document.addEventListener('keydown', skipHandler, true);
    o.addEventListener('click', skipHandler);
    o.addEventListener('touchstart', skipHandler, { passive: false });
  }, 350);
  setTimeout(finish, DELIVERY_MS);
}
function runCritterBirthSequence(topic, onDone) {
  if (!arcade) { if (onDone) onDone(); return; }
  arcade.paused = true;
  preloadCritterImg(topic, 'birth_ship');
  preloadCritterImg(topic, 'card');
  preloadCritterImg(topic, 'egg');
  const afterLanding = () => {
    receiveCritterEgg(topic);
    showCritterRevealCard(topic, () => {

  };
  const img = CRITTER_IMGS[`${topic}/birth_ship`];

    startAnim();
  } else if (img) {
    img.onload = startAnim;
    img.onerror = () => {
      showArcOverlay('The Nursery Ship arrives!', 'Something precious is being delivered…');
      setTimeout(() => {
        hideArcOverlay();
        afterLanding();
      }, 2200);
    };
  } else {
    startAnim();
  }
}

const STREAK_MILESTONES = [
  { id: 'spark_trail',     days: 3,  icon: '✨', name: 'Spark Trail',     desc: 'Gold sparkle trail on your shots.' },
  { id: 'extended_round',  days: 5,  icon: '⏱️', name: 'Extended Round',  desc: '90-second arcade runs.' },
  { id: 'daily_boost',     days: 7,  icon: '📅', name: 'Daily Boost',     desc: "Today's Special pays 2.5× XP." },
  { id: 'twin_tap',        days: 10, icon: '🎯', name: 'Twin Tap',        desc: 'Every 3rd shot adds a side pellet.' },
  { id: 'streak_shield',   days: 14, icon: '🛡️', name: 'Streak Shield',   desc: 'One free hit per arcade run.' },
  { id: 'granny_favour',   days: 21, icon: '👵', name: "Granny's Favour", desc: 'Granny visits more often for 7 days.' },
  { id: 'golden_forge',    days: 30, icon: '🔨', name: 'Golden Forge',    desc: '+10% XP on every forge.' },
  { id: 'veteran',         days: 50, icon: '🎖️', name: "Granny Boom's Favourite Child", desc: 'Prestige title + badge on your profile.' }
];
function hasStreakUnlock(id) {
  return Array.isArray(state.streakUnlocks) && state.streakUnlocks.includes(id);
}
function addDaysToDateStr(dateStr, days) {
  const p = dateStr.split('-').map(Number);
  const d = new Date(p[0], p[1] - 1, p[2]);
  d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}
function isYesterday(dateStr) {
  if (!dateStr) return false;
  return addDaysToDateStr(dateStr, 1) === todayStr();
}
function bumpDailyStreak() {
  const today = todayStr();
  const last = state.lastSession;
  if (last === today) { syncStreakUnlocks(); return; }
  if (isYesterday(last)) state.streak = (state.streak || 0) + 1;
  else state.streak = 1;
  state.lastSession = today;
  syncStreakUnlocks();
}
function syncStreakUnlocks(silent) {
  if (!Array.isArray(state.streakUnlocks)) state.streakUnlocks = [];
  const today = todayStr();
  for (const m of STREAK_MILESTONES) {
    if (state.streak < m.days || hasStreakUnlock(m.id)) continue;
    state.streakUnlocks.push(m.id);
    if (m.id === 'granny_favour') state.grannyFavourUntil = addDaysToDateStr(today, 7);
    if (m.id === 'veteran') awardBadge('veteran');
    if (!silent) toast(`Streak reward: ${m.name}!`, m.icon);
  }
}
function getGrannyMinGap() {
  const today = todayStr();
  if (state.grannyFavourUntil && today <= state.grannyFavourUntil) return 3;
  return GRANNY_MIN_GAP;
}
function hideLadderFloatTip() {
  const tip = document.getElementById('ladderFloatTip');
  if (tip) {
    tip.classList.remove('show');
    tip.setAttribute('aria-hidden', 'true');
  }
}
function showLadderFloatTip(anchor, text) {
  const tip = document.getElementById('ladderFloatTip');
  if (!tip || !anchor) return;
  tip.textContent = text;
  tip.classList.add('show');
  tip.setAttribute('aria-hidden', 'false');
  const r = anchor.getBoundingClientRect();
  let left = r.left + r.width / 2;
  let top = r.top - 8;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
  requestAnimationFrame(() => {
    const tr = tip.getBoundingClientRect();
    if (tr.left < 8) left += 8 - tr.left;
    if (tr.right > window.innerWidth - 8) left -= tr.right - (window.innerWidth - 8);
    if (tr.top < 8) {
      top = r.bottom + 8;
      tip.style.transform = 'translate(-50%, 0)';
    } else {
      tip.style.transform = 'translate(-50%, -100%)';
    }
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  });
}
function bindLadderTip(el, text) {
  const show = () => showLadderFloatTip(el, text);
  const hide = () => hideLadderFloatTip();
  el.addEventListener('mouseenter', show);
  el.addEventListener('mouseleave', hide);
  el.addEventListener('focus', show);
  el.addEventListener('blur', hide);
}

function $(sel, root = document) { return root.querySelector(sel); }

function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'disabled' || k === 'checked' || k === 'readonly') e[k] = !!v;
    else if (v !== undefined && v !== null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number' || typeof c === 'boolean') {
      e.appendChild(document.createTextNode(String(c)));
    } else if (c instanceof Node) {
      e.appendChild(c);
    }
  }
  return e;
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

}
function todayStr() {

// Days between two todayStr() values (YYYY-M-D). Used for the daily-quest

function daysBetweenDateStr(a, b) {

}

// Daily Quest picker. Deterministic per local day: same kid opening the
// app five times today sees the same featured story.
//
// Pick priority (each tier skips stories featured in the last 7 days):
//   1. Not forged yet
//   2. Forged but no Paragon yet (writing mastery chase)
//   3. Everything else (Paragon replays allowed — daily grants full XP + 2×)
function ensureDailyQuest() {
  const today = todayStr();
  // Already chosen for today AND the story still exists in STORIES.
  if (state.dailyQuest && state.dailyQuest.date === today && state.dailyQuest.storyId) {
    if (STORIES.some(s => s.id === state.dailyQuest.storyId)) return state.dailyQuest;
  }
  const history = (state.dailyQuest && state.dailyQuest.history) || [];
  const offCooldown = (s) => {
    const last = history.find(h => h.storyId === s.id);
    if (!last || !last.date) return true;
    return daysBetweenDateStr(last.date, today) >= DAILY_QUEST_COOLDOWN_DAYS;
  };
  const tier1 = STORIES.filter(s => !state.completed[s.id] && offCooldown(s));
  const tier2 = STORIES.filter(s => state.completed[s.id] && !storyHasParagon(s.id) && offCooldown(s));
  const tier3 = STORIES.filter(s => offCooldown(s));
  let pool = tier1.length ? tier1 : (tier2.length ? tier2 : (tier3.length ? tier3 : STORIES));
  if (pool.length === 0) return state.dailyQuest;
  let seed = 0;
  for (let i = 0; i < today.length; i++) seed = (seed * 31 + today.charCodeAt(i)) >>> 0;
  const pick = pool[seed % pool.length];
  const nextHistory = history.filter(h => h.storyId !== pick.id);
  nextHistory.push({ date: today, storyId: pick.id });
  if (nextHistory.length > 21) nextHistory.splice(0, nextHistory.length - 21);
  state.dailyQuest = {
    date: today,
    storyId: pick.id,
    claimed: false,
    history: nextHistory
  };
  saveState();
  return state.dailyQuest;
}

  return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });

// Themed promise-based confirm. Use instead of window.confirm() so we
// don't get a Win-95-looking OS popup floating at the top of the page.
//
// Example:
//   if (!(await confirmDialog({
//     title: 'Unlock Twin Striker MK II?',
//     message: 'This will spend 500 XP.',
//     confirmText: 'Unlock',
//     emoji: '🛸'
//   }))) return;
//
// Returns a Promise that resolves to true (confirm) or false
// (cancel / Esc / backdrop click).
function confirmDialog(opts) {
  opts = opts || {};
  return new Promise(resolve => {
    const back = document.createElement('div');
    back.className = 'confirm-back';
    const dlg = document.createElement('div');
    dlg.className = 'confirm-dlg';
    if (opts.image) {
      const art = document.createElement('div');
      art.className = 'confirm-art';
      const img = document.createElement('img');
      img.src = opts.image;
      img.alt = opts.imageAlt || '';
      img.draggable = false;
      art.appendChild(img);
      dlg.appendChild(art);
    } else if (opts.emoji) {
      const em = document.createElement('div');
      em.className = 'confirm-emoji';
      em.textContent = opts.emoji;
      dlg.appendChild(em);
    }
    if (opts.title) {
      const h = document.createElement('h3');
      h.className = 'confirm-title';
      h.textContent = opts.title;
      dlg.appendChild(h);
    }
    if (opts.message) {
      const p = document.createElement('p');
      p.className = 'confirm-msg';
      p.textContent = opts.message;
      dlg.appendChild(p);
    }
    const row = document.createElement('div');
    row.className = 'confirm-row';
    const cancel = document.createElement('button');
    cancel.className = 'btn ghost';
    cancel.type = 'button';
    cancel.textContent = opts.cancelText || 'Cancel';
    const ok = document.createElement('button');
    const okVariant = opts.confirmVariant || 'primary';
    ok.className = 'btn ' + okVariant;
    ok.type = 'button';
    ok.textContent = opts.confirmText || 'OK';
    row.appendChild(cancel);
    row.appendChild(ok);
    dlg.appendChild(row);
    back.appendChild(dlg);
    document.body.appendChild(back);
    // Force a reflow so the .show transition (if any) runs from scratch.
    void back.offsetWidth;
    back.classList.add('show');
    let settled = false;
    const close = (val) => {
      if (settled) return;
      settled = true;
      document.removeEventListener('keydown', onKey, true);
      back.classList.remove('show');
      // Small delay so we don't yank the DOM mid-fade.
      setTimeout(() => { if (back.parentNode) back.parentNode.removeChild(back); }, 180);
      resolve(val);
    };
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); close(false); }
      else if (e.key === 'Enter') { e.preventDefault(); close(true); }
    };
    cancel.onclick = () => close(false);
    ok.onclick = () => close(true);
    back.onclick = (e) => { if (e.target === back) close(false); };
    document.addEventListener('keydown', onKey, true);
    setTimeout(() => { try { ok.focus(); } catch(_) {} }, 30);
  });
}
function confetti(durationMs = 2200, count = 80) {
  const wrap = $('#confetti');
  const colors = ['#ff8a3d', '#ffc24a', '#ff5a3d', '#ffd166', '#ffaa66', '#ff77b7', '#4ade80'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('i');
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.6 + Math.random() * 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.3) + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), durationMs + 500);
  }
}

/* --------------------- SENTENCE ASSEMBLY --------------------- */
function assembleSentence(sentence, picks) {
  // picks: array of option indexes (one per slot). If pick missing, returns null.
  const parts = [sentence.opener];
  for (let i = 0; i < sentence.slots.length; i++) {
    const idx = picks[i];
    if (idx == null) return null;
    parts.push(sentence.slots[i].options[idx].text);
  }
  // Smart join: trim leading whitespace on each part, no space before close-punctuation.
  return parts.reduce((acc, part, i) => {
    if (i === 0) return part;
    const trimmed = part.replace(/^\s+/, '');
    if (/^[,.;:!?]/.test(trimmed)) return acc + trimmed;
    return acc + ' ' + trimmed;
  }, '');
}
function correctSentenceText(sentence) {
  const picks = sentence.slots.map(slot => slot.options.findIndex(o => o.correct));
  return assembleSentence(sentence, picks);
}
function assembleParagraph(story, allPicks) {
  return story.sentences.map((s, i) => assembleSentence(s, allPicks[i])).join(' ');
}
function correctParagraph(story) {
  return story.sentences.map(s => correctSentenceText(s)).join(' ');
}

// Hero art for story cards. Tries art/<id>.png -> .jpg -> .webp,
// then falls back to a topic-colored gradient with the topic emoji.
const ART_EXT_ORDER = ['png', 'jpg', 'webp'];
function buildStoryArt(s, topicEmoji, done, cardRef) {
  const art = el('div', { class: 'art' });
  // Fallback emoji is HIDDEN by default; it only appears if every image
  // attempt fails. During load the card shows its topic-coloured gradient
  // background instead of a flash of giant emoji.
  const fallback = el('div', { class: 'art-fallback' }, topicEmoji);
  fallback.style.display = 'none';
  art.appendChild(fallback);

  const img = document.createElement('img');
  img.alt = s.title;
  img.loading = 'lazy';
  img.decoding = 'async';
  img.draggable = false;
  img.style.opacity = '0';
  img.style.transition = 'opacity .35s ease';
  let attempt = 0;
  const tryNext = () => {
    if (attempt >= ART_EXT_ORDER.length) {
      // All extensions exhausted: now show the emoji placeholder.
      img.remove();
      fallback.style.display = '';
      return;
    }
    img.src = `art/${s.id}.${ART_EXT_ORDER[attempt++]}`;
  };
  img.addEventListener('error', tryNext);
  img.addEventListener('load', () => {
    // Match the art container's aspect-ratio to the image's natural ratio so
    // the image always displays in full (no cropping) regardless of 1:1 / 4:3 / etc.
    if (img.naturalWidth && img.naturalHeight) {
      art.style.aspectRatio = `${img.naturalWidth} / ${img.naturalHeight}`;
    }
    // Fade in once decoded so the swap from gradient -> art is smooth.
    requestAnimationFrame(() => { img.style.opacity = '1'; });
    // Title is baked into the image — collapse the text title/context in the body.
    if (cardRef && cardRef.classList) cardRef.classList.add('has-art');
  });
  tryNext();
  art.appendChild(img);

  art.appendChild(el('div', { class: 'sheen' }));
  art.appendChild(el('div', { class: 'l l' + s.level }, 'L' + s.level));
  if (done) art.appendChild(el('div', { class: 'forged-stamp' }, '✓ FORGED'));
  return art;
}

/* --------------------- FORGE ENGINE --------------------- */
let forge = null;

function startForge(storyId) {
  const story = STORIES.find(s => s.id === storyId);
  if (!story) return;
  // Shuffle option order within each slot per session (but track correct index by content)
  const sentencesState = story.sentences.map(sent => ({
    opener: sent.opener,
    slots: sent.slots.map(slot => {
      const correctText = slot.options.find(o => o.correct).text;
      const shuffled = shuffle(slot.options);
      return {
        role: slot.role,
        options: shuffled,
        correctIndex: shuffled.findIndex(o => o.text === correctText)
      };
    })
  }));
  forge = {
    story,
    sentencesState,
    index: 0,
    picks: sentencesState.map(s => s.slots.map(() => null)),
    sentenceChecked: sentencesState.map(() => false),
    sentenceCorrect: sentencesState.map(() => false),
    sentenceWrongChecks: sentencesState.map(() => 0),
    typed: sentencesState.map(() => ''),
    typedComplete: sentencesState.map(() => false),
    sentencePerfect: sentencesState.map(() => null), // true on first-check pass
    started: Date.now()
  };
  renderForge();
}

function renderForge() {
  const app = $('#app');
  app.innerHTML = '';
  app.appendChild(topbar());
  const f = forge;
  const s = f.story;
  const i = f.index;

  }
  head.appendChild(headRow);

  const titleRow = el('div', { class: 'forge-title-row' });

  thumbImg.src = `art/${s.id}.png`;
  thumb.appendChild(thumbImg);
  titleRow.appendChild(thumb);
  head.appendChild(titleRow);

  // Build display: shows opener + slots (blank or filled)
  const buildEl = el('div', { class: 'build-display', style: { marginTop: '12px' } });
  buildEl.appendChild(el('span', { class: 'opener' }, sentState.opener));
  sentState.slots.forEach((slot, sIdx) => {
    const pick = f.picks[i][sIdx];
    const wasChecked = f.sentenceChecked[i];
    const isCorrectPick = pick != null && pick === slot.correctIndex;
    let cls = pick == null ? 'slot-blank' : 'slot-filled';
    if (wasChecked && pick != null) cls += isCorrectPick ? ' slot-correct' : ' slot-wrong';
    const rawText = pick == null ? '____' : slot.options[pick].text;
    const text = rawText.replace(/^\s+/, '');
    if (/^[,.;:!?]/.test(text)) {
      buildEl.appendChild(el('span', { class: cls }, text));
    } else {
      buildEl.appendChild(document.createTextNode(' '));
      buildEl.appendChild(el('span', { class: cls }, text));

  // If sentence not yet correct, show containers; if correct, show typing step
  if (!f.sentenceCorrect[i]) {

    sentState.slots.forEach((slot, sIdx) => {
      const pick = f.picks[i][sIdx];
      const checked = f.sentenceChecked[i];
      const isCorrectPick = pick != null && pick === slot.correctIndex;
      let cardCls = 'container-card';
      if (checked && pick != null) cardCls += isCorrectPick ? ' correct' : ' wrong';
      const card = el('div', { class: cardCls });
      card.appendChild(el('div', { class: 'role' }, slot.role));
      const opts = el('div', { class: 'options' });
      slot.options.forEach((opt, oIdx) => {
        const isPicked = pick === oIdx;
        const locked = checked && isPicked && isCorrectPick;
        const cls = 'opt' + (isPicked ? ' selected' : '') + (locked ? ' locked' : '');
        opts.appendChild(el('button', {
          class: cls,
          onclick: () => {
            if (locked) return;
            f.picks[i][sIdx] = oIdx;
            // If user changes a previously-wrong slot, clear the global "checked" wrong-state for THIS slot via re-render
            renderForge();
          }
        }, opt.text));
      });
      card.appendChild(opts);
      containers.appendChild(card);
    });
    head.appendChild(containers);
  } else {
    // Typing step
    const correct = correctSentenceText(s.sentences[i]);
    const card = el('div', { class: 'typing-card', style: { marginTop: '12px' } });
    card.appendChild(el('h3', {}, '✓ Sentence built! Now type it exactly to lock it in.'));
    const refEl = el('div', { class: 'ref' }, correct);
    // Block easy ways to lift the reference text
    const blockEvt = (e) => { e.preventDefault(); return false; };
    refEl.addEventListener('copy', blockEvt);
    refEl.addEventListener('cut', blockEvt);
    refEl.addEventListener('contextmenu', blockEvt);
    refEl.addEventListener('dragstart', blockEvt);
    refEl.addEventListener('selectstart', blockEvt);
    refEl.addEventListener('mousedown', (e) => { if (e.detail > 1) e.preventDefault(); }); // block double/triple-click select
    card.appendChild(refEl);
    const ta = el('textarea', {
      placeholder: 'Type the sentence exactly…',
      spellcheck: 'false',
      autocomplete: 'off',
      autocorrect: 'off',
      autocapitalize: 'off'
    });
    ta.value = f.typed[i] || '';
    let prevValue = ta.value;
    const matchBar = el('div', { class: 'matchbar' });
    const matchFill = el('div'); matchBar.appendChild(matchFill);
    const helper = el('div', { class: 'helper' }, '');
    const rejectPaste = (e) => {
      if (e && typeof e.preventDefault === 'function') e.preventDefault();
      toast('No pasting — type it out yourself ✍️', '🚫');
    };
    ta.addEventListener('paste', rejectPaste);
    ta.addEventListener('drop', rejectPaste);
    ta.addEventListener('dragover', (e) => e.preventDefault());
    const updateMatch = (e) => {
      // Backstop: if value jumped by many chars in a single input event, treat as a paste.
      // Normal typing/IME adds at most a few characters; bulk insertions are almost certainly paste/drop.
      if (e && e.type === 'input' && e.inputType && /paste|drop/i.test(e.inputType)) {
        ta.value = prevValue;
        rejectPaste();
        return;
      }
      const t = ta.value;
      if (t.length - prevValue.length > 8) {
        ta.value = prevValue;
        rejectPaste();
        return;
      }
      prevValue = t;
      f.typed[i] = t;
      const pct = computeTypeMatchPct(t, correct);
      matchFill.style.width = pct + '%';
      if (normalizeTypingText(t) === normalizeTypingText(correct)) {
        helper.textContent = 'Perfect match — press Lock In.';
        helper.style.color = 'var(--good)';
      } else if (pct >= 70) {
        helper.textContent = 'Close — fix small differences (case, punctuation, spelling).';
        helper.style.color = 'var(--accent-2)';
      } else {
        helper.textContent = 'Type the sample above word-for-word.';
        helper.style.color = 'var(--muted)';
      }
    };
    ta.addEventListener('input', updateMatch);
    card.appendChild(ta);
    card.appendChild(matchBar);
    card.appendChild(helper);
    head.appendChild(card);
    setTimeout(() => { ta.focus(); updateMatch(); }, 30);
  }

  app.appendChild(head);

  // Actions
  const actions = el('div', { class: 'forge-actions' });
  if (!f.sentenceCorrect[i]) {
    const allPicked = f.picks[i].every(p => p != null);
    const wrongCount = f.sentenceChecked[i] ? f.picks[i].filter((p, idx) => p !== sentState.slots[idx].correctIndex).length : 0;
    const infoText = !allPicked
      ? `Pick one option from every container, then press Check.`
      : f.sentenceChecked[i]
      ? `${wrongCount} container${wrongCount === 1 ? '' : 's'} to fix — red borders show which.`
      : 'Press Check to forge the sentence.';
    actions.appendChild(el('div', { class: 'info' }, infoText));
    actions.appendChild(el('button', {
      class: 'btn primary lg',
      onclick: checkSentence
    }, 'Check ✓'));
  } else {
    const correct = correctSentenceText(s.sentences[i]);
    actions.appendChild(el('div', { class: 'info' }, 'Type the sentence above to lock it in.'));
    actions.appendChild(el('button', {
      class: 'btn primary lg',
      onclick: lockTyping
    }, 'Lock In →'));
  }
  app.appendChild(actions);
}

// Normalize visually-identical characters so the comparison doesn't reject
// students whose keyboard produces straight quotes while the source uses
// smart quotes (or non-breaking spaces, en/em dashes, ellipsis, etc).
function normalizeTypingText(s) {
  if (!s) return '';
  return s
    .normalize('NFC')
    .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'") // single quotes & primes -> '
    .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"') // double quotes & primes -> "
    .replace(/[\u2013\u2014\u2212]/g, '-')                    // en/em/minus dashes -> -
    .replace(/\u2026/g, '...')                                // ellipsis -> ...
    .replace(/\u00A0/g, ' ')                                  // non-breaking space -> space
    .replace(/[ \t]+/g, ' ')                                  // collapse runs of spaces/tabs
    .trim();
}

function computeTypeMatchPct(a, b) {
  if (!a) return 0;
  const na = normalizeTypingText(a);
  const nb = normalizeTypingText(b);
  if (na === nb) return 100;
  const m = Math.min(na.length, nb.length);
  let same = 0;
  for (let i = 0; i < m; i++) if (na[i] === nb[i]) same++;
  return Math.round((same / Math.max(nb.length, 1)) * 100);
}

function checkSentence() {
  const f = forge;
  const i = f.index;
  const sentState = f.sentencesState[i];
  if (!f.picks[i].every(p => p != null)) {
    toast('Pick from every container first ✏️');
    return;
  }
  f.sentenceChecked[i] = true;
  const allRight = f.picks[i].every((p, idx) => p === sentState.slots[idx].correctIndex);
  if (allRight) {
    if (f.sentencePerfect[i] === null) f.sentencePerfect[i] = (f.sentenceWrongChecks[i] === 0);
    f.sentenceCorrect[i] = true;
    if (f.sentencePerfect[i]) awardBadge('perfect');
    toast('Sentence built! Now type it.', '⚒️');
  } else {
    f.sentenceWrongChecks[i]++;
    // shake the wrong containers
    setTimeout(() => {
      $$('.container-card.wrong').forEach(node => {
        node.classList.add('shake');
        setTimeout(() => node.classList.remove('shake'), 260);
      });
    }, 50);
  }
  renderForge();
}

function lockTyping() {
  const f = forge;
  const i = f.index;
  const correct = correctSentenceText(f.story.sentences[i]);
  const typed = f.typed[i] || '';
  if (normalizeTypingText(typed) !== normalizeTypingText(correct)) {
    // strict but helpful: tell them where it differs
    const pct = computeTypeMatchPct(typed, correct);
    if (pct < 100) {
      toast('Not exact yet — match the reference letter for letter.', '✏️');
      return;
    }
  }
  f.typedComplete[i] = true;
  if (i + 1 < f.sentencesState.length) {
    f.index = i + 1;
    renderForge();
  } else {
    finishStory();
  }
}

// DEV: stub out the typing flow by pretending every sentence was solved
// perfectly first-try and typed correctly, then jump to finishStory() so
// we land on the result modal with the "Play Reward Game" button. Used to
// iterate on the arcade intro / cinematic / boss flow without re-typing.
function devSkipToReward() {
  if (!DEV_MODE || !forge) return;
  const f = forge;
  for (let i = 0; i < f.sentencesState.length; i++) {
    const sent = f.story.sentences[i];
    f.picks[i] = sent.slots.map(slot => slot.options.findIndex(o => o.correct));
    f.sentenceChecked[i] = true;
    f.sentenceCorrect[i] = true;
    f.sentenceWrongChecks[i] = 0;
    f.sentencePerfect[i] = true;
    f.typed[i] = correctSentenceText(sent);
    f.typedComplete[i] = true;
  }
  f.index = f.sentencesState.length - 1;
  finishStory();
}
function finishStory() {
  const f = forge;
  const story = f.story;
  const lvl = story.level;
  const allPerfect = f.sentencePerfect.every(p => p === true);
  const totalWrongChecks = f.sentenceWrongChecks.reduce((a, b) => a + b, 0);
  const sentencesPerfect = f.sentencePerfect.filter(p => p === true).length;
  const sentencesTotal = f.sentencesState.length;

  const mult = lvl === 1 ? 1 : lvl === 2 ? 1.5 : 2;
  let earnedBase = 0;
  // Per sentence: 50 each
  earnedBase += sentencesTotal * 50;
  // +50 perfect-build per sentence
  earnedBase += sentencesPerfect * 50;
  // +30 typed (always 30 if typed completed)
  earnedBase += sentencesTotal * 30;
  // Paragraph bonus
  earnedBase += 200;
  if (allPerfect) earnedBase += 150;
  if (hasStreakUnlock('golden_forge')) earnedBase = Math.round(earnedBase * 1.1);
  earnedBase = Math.round(earnedBase * mult);

  // Replay discount: first time you forge a story you get the full payout;
  // every subsequent attempt is worth 25% so lifetime XP still climbs but
  // doesn't trivialise the campaign economy.
  const firstTime = !state.completed[story.id];
  const _todayDQ = todayStr();
  const isDailyClaim = !!(state.dailyQuest && state.dailyQuest.storyId === story.id
    && state.dailyQuest.date === _todayDQ && !state.dailyQuest.claimed);
  // Today's Special overrides the replay penalty — a replay daily still
  // pays full base XP + the 2× bonus (200% of first-time), not 50%.
  let replayMul = firstTime ? 1 : 0.25;
  if (isDailyClaim && !firstTime) replayMul = 1;
  const earned = Math.round(earnedBase * replayMul);
  const prevAttempts = (state.completed[story.id] && state.completed[story.id].attempts) || 0;
  state.points += earned;
  // Daily Quest bonus: grant +earned again (i.e. 2× XP total). One-shot
  // per day so replays of the same story later don't keep doubling.
  let dailyBonus = 0;
  if (isDailyClaim) {
    dailyBonus = hasStreakUnlock('daily_boost') ? Math.round(earned * 1.5) : earned;
    state.points += dailyBonus;
    state.dailyQuest.claimed = true;
    state.dailyQuestClaims = (state.dailyQuestClaims || 0) + 1;
    if (!Array.isArray(state.dailyQuest.history)) state.dailyQuest.history = [];
  }
  state.totalXpEarned = (state.totalXpEarned || 0) + earned + dailyBonus;
  state.completed[story.id] = {
    perfect: allPerfect || (state.completed[story.id] && state.completed[story.id].perfect),
    attempts: prevAttempts + 1,
    score: earned,
  };
  queueCritterForTheme(story.topic);
  bumpDailyStreak();
  checkStreakUnlocks();
  if (allPerfect && ownsUpgrade('paragon_overdrive')) {
    state.arcadeFireBoost = true;
    toast('Paragon Overdrive armed for your next arcade run!', '💎');
  }

  // Save the forged paragraph
  const paragraphText = correctParagraph(story);
  state.paragraphs.unshift({
    storyId: story.id, title: story.title, topic: story.topic,
    level: lvl, text: paragraphText, ts: Date.now(), perfect: allPerfect, xp: earned
  });
  if (state.paragraphs.length > 200) state.paragraphs.length = 200;

  if (lvl === 3) awardBadge('l3');
  if (allPerfect) awardBadge('paragon');
  pushHistory({ storyId: story.id, title: story.title, topic: story.topic, level: lvl, perfect: allPerfect, xp: earned });
  saveState();
  checkBadges();

  const pendingShip = drainPendingShipUnlock();
  const showForgeResultModal = () => {
  // Modal: paragraph reveal
  confetti();
  if (dailyBonus > 0) toast(`Daily Special! +${dailyBonus} bonus XP`, '✨');
  const m = el('div');
  m.appendChild(el('div', { style: { fontSize: '52px' } }, allPerfect ? '💎' : '🔨'));
  m.appendChild(el('h2', {}, allPerfect ? 'Paragon Paragraph!' : 'Paragraph Forged!'));
  m.appendChild(el('p', {}, allPerfect
    ? `${state.name}, every sentence built clean. This one is a keeper.`
    : `${state.name}, you forged the full paragraph for "${story.title}".`));
  if (!firstTime) {
    if (isDailyClaim) {
      m.appendChild(el('p', { style: { color: 'var(--muted)', fontSize: '13px', marginTop: '-4px' } },
        `✨ Today's Special — full XP + 2× bonus (${earnedBase} + ${dailyBonus} = ${earned + dailyBonus} total).`));
    } else {
      m.appendChild(el('p', { style: { color: 'var(--muted)', fontSize: '13px', marginTop: '-4px' } },
        `↻ Replay #${prevAttempts + 1} — XP reduced to 25% of first-time payout (${earnedBase} → ${earned}).`));
    }
  }
  m.appendChild(el('div', { class: 'paragraph-reveal' }, paragraphText));
  // Daily Quest bonus banner — shown only when this completion just
  // claimed today's 2× XP special. Big, gold, hard to miss.
  if (dailyBonus > 0) {
    m.appendChild(el('div', { class: 'daily-bonus-banner' },
      `✨ DAILY SPECIAL — +${dailyBonus} BONUS XP!`));
  }
  const row = el('div', { class: 'stat-row' });
  row.appendChild(stat('XP earned', '+' + (earned + dailyBonus) + (dailyBonus > 0 ? ' ✨' : '')));
  row.appendChild(stat('Perfect builds', `${sentencesPerfect}/${sentencesTotal}`));
  row.appendChild(stat('Streak', state.streak + ' 🔥'));
  m.appendChild(row);

  const btns = el('div', { class: 'row-wrap', style: { justifyContent: 'center', marginTop: '16px' } });
  btns.appendChild(el('button', { class: 'btn warn lg', onclick: () => { closeModal(); forge = null; startArcade({ reward: true, level: lvl }); } }, '🕹️ Play Reward Game'));
  // Find next unforged story in same topic
  const idx = STORIES.findIndex(s => s.id === story.id);
  let nextStory = null;
  for (let i = 1; i <= STORIES.length; i++) {
    const cand = STORIES[(idx + i) % STORIES.length];
    if (cand.topic === story.topic && !state.completed[cand.id]) { nextStory = cand; break; }
  }
  if (nextStory) {
    btns.appendChild(el('button', { class: 'btn primary', onclick: () => { closeModal(); startForge(nextStory.id); } }, `Next: ${nextStory.title} →`));
  } else {
    btns.appendChild(el('button', { class: 'btn primary', onclick: () => { closeModal(); forge = null; render(); } }, 'Back to Stories'));
  }
  btns.appendChild(el('button', { class: 'btn ghost', onclick: () => { closeModal(); forge = null; render(); } }, 'Home'));
  m.appendChild(btns);
  openModal(m);
  };
  if (pendingShip) celebrateShipUnlock(pendingShip, showForgeResultModal);
  else showForgeResultModal();
}

function buildAllText() {
  const lines = [];
  lines.push(`Granny Boom — My Forged Paragraphs`);
  lines.push(`Player: ${state.name}`);
  lines.push(`Generated: ${new Date().toLocaleString()}`);
  lines.push('');
  state.paragraphs.forEach(p => {
    const topic = TOPICS.find(t => t.id === p.topic);
    lines.push(`=== ${p.title}  (${topic ? topic.name : p.topic} · L${p.level})  ${p.perfect ? '★ Paragon' : ''}`);
    lines.push(formatDate(p.ts) + '  · +' + p.xp + ' XP');
    lines.push('');
    lines.push(p.text);
    lines.push('');
  });
  return lines.join('\n');
}
function copyAllParagraphs() {
  if (!state.paragraphs.length) { toast('Nothing to copy yet', 'ℹ️'); return; }
  const text = buildAllText();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast('All paragraphs copied!', '📋'), () => fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('Copied!', '📋'); }
  catch (e) { toast('Copy not supported — use Download', 'ℹ️'); }
  document.body.removeChild(ta);
}
function downloadAllParagraphs() {
  if (!state.paragraphs.length) { toast('Nothing to download yet', 'ℹ️'); return; }
  const text = buildAllText();
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safe = (state.name || 'player').replace(/[^a-z0-9_\-]+/gi, '_');
  a.download = `grannyboom-paragraphs-${safe}.txt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Downloaded.', '⬇');
}

    let scale = 1;
    if (elapsed < 220)      scale = (elapsed / 220) * 1.25;          // pop-in to 1.25×
    else if (elapsed < 620) scale = 1.25 - ((elapsed - 220) / 400) * 0.25; // settle back to 1.0
    ctx.globalAlpha = Math.min(1, lp * 1.4); // hold full alpha most of the life
    ctx.font = `900 ${Math.round(pt.size * scale)}px system-ui, -apple-system, "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = pt.color;
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#0b0708';
    ctx.fillText(pt.text, pt.x + 2, pt.y + 3);
    ctx.shadowBlur = 24;
    ctx.fillStyle = pt.color;
    ctx.fillText(pt.text, pt.x, pt.y);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  }
  ctx.globalAlpha = 1;
  // Pass 4b: skull glyph (death cinematic). Pops in with a scale anim,
  // then holds with a subtle pulse and a red glow so it reads as ominous.
  for (const pt of parts) {
    if (pt.type !== 'skull') continue;
    const elapsed = pt.maxLife - pt.life;
    let scale = 1;
    if (elapsed < 280)       scale = (elapsed / 280) * 1.15;            // pop-in to 1.15×
    else if (elapsed < 520)  scale = 1.15 - ((elapsed - 280) / 240) * 0.15; // settle to 1.0
    else                     scale = 1 + Math.sin((elapsed - 520) / 110) * 0.04; // gentle pulse
    const size = Math.round(pt.targetSize * scale);
    ctx.font = `${size}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff3344';
    ctx.shadowBlur = 38;
    ctx.fillStyle = '#fff';
    ctx.fillText('💀', pt.x, pt.y);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  }
  ctx.globalAlpha = 1;
  // Pass 4c: GAME OVER text (death cinematic). Slams in with a scale
  // animation, holds solid for most of its life, then fades at the end so
  // it bridges cleanly into the result modal.
  for (const pt of parts) {
    if (pt.type !== 'gameover') continue;
    const elapsed = pt.maxLife - pt.life;
    let scale = 1;
    if (elapsed < 260)       scale = (elapsed / 260) * 1.2;             // pop-in to 1.2×
    else if (elapsed < 540)  scale = 1.2 - ((elapsed - 260) / 280) * 0.2; // settle to 1.0
    // Hold full alpha for most of the life, then fade out in the last 400ms.
    let alpha = 1;
    const fadeStart = pt.maxLife - 400;
    if (elapsed > fadeStart) alpha = (pt.maxLife - elapsed) / 400;
    alpha = Math.max(0, Math.min(1, alpha));
    ctx.globalAlpha = alpha;
    const fontSize = Math.round(pt.size * scale);
    ctx.font = `900 ${fontSize}px system-ui, -apple-system, "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = pt.color;
    ctx.shadowBlur = 36;
    ctx.fillStyle = '#1a0408';
    ctx.fillText(pt.text, pt.x + 3, pt.y + 4);
    ctx.shadowBlur = 44;
    ctx.fillStyle = pt.color;
    ctx.fillText(pt.text, pt.x, pt.y);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  }
  ctx.globalAlpha = 1;
  // Pass 5: full-screen flash — drawn on top so it briefly washes the
  // scene white. Oversized so the shake translate doesn't reveal edges.
  for (const pt of parts) {
    if (pt.type !== 'flash') continue;
    const lp = Math.max(0, pt.life / pt.maxLife);
    ctx.globalAlpha = lp * 0.45;
    ctx.fillStyle = pt.color;
    ctx.fillRect(-40, -40, ARC_W + 80, ARC_H + 80);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
  // Pause indicator. drawArcade only owns the generic "Paused" overlay —
  // it must NEVER auto-hide overlays it didn't put up (Get Ready, Granny
  // pregame, cinematic cards, etc.) or it'll strip them on the very next
  // frame after they mount.
  //
  //   • cinematic / granny card up  → leave it alone (those self-manage)
  //   • showing "Paused" right now  → keep showing while paused, hide on unpause
  //   • anything else (Get Ready)   → leave it alone, the caller's setTimeout
  //                                   handles the eventual hide
  const arcO = document.getElementById('arcOverlay');
  const arcTitle = document.getElementById('arcOverlayTitle');
  const arcCardUp = !!arcO && (arcO.classList.contains('cinematic') || arcO.classList.contains('granny'));
  const arcPausedUp = !!arcTitle && arcTitle.textContent === 'Paused';
  if (!arcCardUp) {
    if (arcade.paused && !arcPausedUp) {
      showArcOverlay('Paused', 'Press P to resume.');
    } else if (!arcade.paused && arcPausedUp && !arcade.over) {
      hideArcOverlay();
    }
  }
}
function showArcadeResult() {
  const a = arcade;
  let score = a.score;
  if (a.upgradeId === 'campaign_ace') score = Math.round(score * 1.25);
  const livesLost = a.livesLostThisGame, waves = a.wavesCleared;
  const timeUp = a.timeUp || a.won; // a.won only fires on the buzzer-beater edge case
  const xpEarned = a.reward ? previewXp(score) : 0;
  if (a.reward && xpEarned > 0) state.points += xpEarned;
  // Personal best for Alien Atax — shown on the home stats card.
  const prevBest = state.bestArcadeScore || 0;
  const newBest = score > prevBest;
  if (newBest) state.bestArcadeScore = score;
  if (score >= 200) awardBadge('arcade');
  if (waves >= 1) awardBadge('defender');
  const bossDef = a.bossDefeated;
  const bossKilledYou = a.bossSpawnedThisGame && !a.bossDefeated && !a.timeUp; // boss alive AND player died
  const bossSurvived = a.bossSpawnedThisGame && !a.bossDefeated && a.timeUp;   // boss alive AND clock ran out
  saveState();
  const m = el('div');
  const emoji = bossDef ? '😈'
    : bossSurvived ? '🛡️'
    : bossKilledYou ? '💀'
    : timeUp ? (waves >= 3 ? '🏆' : waves >= 1 ? '🛸' : '⏰')
    : '👾';
  const title = bossDef
    ? 'Grand-Daddy Slain!'
    : bossSurvived
      ? 'You Survived the Grand-Daddy!'
      : bossKilledYou
        ? 'The Grand-Daddy Got You'
        : timeUp
          ? (waves >= 1 ? (waves === 1 ? 'Wave Conquered!' : `${waves} Waves Conquered!`) : "Time's Up!")
          : 'Game Over';
  const secs = Math.round((a.duration || 60000) / 1000);
  const sub = bossDef
    ? `Legendary, ${state.name}! You took down the Grand-Daddy and lived to tell the tale.`
    : bossSurvived
      ? `You outlasted the Grand-Daddy, ${state.name}! It got first blood — but you got the buzzer.`
      : bossKilledYou
        ? `So close, ${state.name}. The Grand-Daddy got the last laugh — try again with an upgraded ship!`
        : timeUp
          ? (waves >= 1
              ? `Brilliant flying, ${state.name}! You cleared ${waves} wave${waves === 1 ? '' : 's'} before the buzzer.`
              : `${secs} seconds is up, ${state.name}. Score locked in — back to the forge.`)
          : `Tough run, ${state.name}. The aliens got you on wave ${waves + 1}.`;
  m.appendChild(el('div', { style: { fontSize: '52px' } }, emoji));
  m.appendChild(el('h2', {}, title));
  m.appendChild(el('p', {}, sub));
  // Granny / streak flavour notes — keep them short so they don't crowd the modal.
  if (a.grannyRound) {
    m.appendChild(el('p', { style: { marginTop: '-2px', color: '#ffd29a', fontWeight: '800' } },
      '💥 Granny dropped by for this one!'));
  }
  if (a.streakBonus) {
    m.appendChild(el('p', { style: { marginTop: '-2px', color: '#ffd86b', fontWeight: '700', fontSize: '13px' } },
      `🔥 Streak bonus: ${secs}s round (5-day streak reward)`));
  }
  if (newBest && score > 0) {
    m.appendChild(el('p', { style: { color: 'var(--accent)', fontWeight: '700', marginTop: '-4px' } },
      `★ NEW PERSONAL BEST! (was ${prevBest})`));
    toast(`New Forge Invaders record: ${score}!`, '🏅');
  }
  const row = el('div', { class: 'stat-row' });
  row.appendChild(stat('Score', score));
  row.appendChild(stat('Waves', waves));
  row.appendChild(stat('Lives lost', livesLost));
  if (a.reward) row.appendChild(stat('Bonus XP', '+' + xpEarned));
  m.appendChild(row);
  const btns = el('div', { class: 'row-wrap', style: { justifyContent: 'center', marginTop: '16px' } });
  if (!a.reward) {
    btns.appendChild(el('button', { class: 'btn', onclick: () => { closeModal(); endArcade(); startArcade({ reward: false, level: a.fromLevel }); } }, '↻ Play Again'));
  }
  btns.appendChild(el('button', { class: 'btn primary lg', onclick: () => { closeModal(); endArcade(); render(); } }, 'Back to the Forge →'));
  m.appendChild(btns);
  openModal(m);
}

/* --------------------- SPLASH --------------------- */
// Intro screen: hero artwork, tagline, fake loading bar with a rotating
// quip, then 3-2-1-BOOM countdown before the home screen fades in. Skip
// button bails early. Splash shows once per browser tab (sessionStorage)
// unless the user URL-overrides with ?splash=always (handy for showing it
// off) or ?dev (assume the dev is iterating and wants it skipped).
const SPLASH_MESSAGES = [
  'Mixing nuclear frosting…',
  'Polishing the bazooka…',
  'Briefing Granny on grammar…',
  'Defrosting the cupcake nukes…',
  'Adjusting Granny\u2019s bifocals…',
  'Loading semicolons…',
  'Stocking up on sprinkles…',
  'Sharpening Granny\u2019s wit…',
  'Teaching aliens to read…',
  'Calibrating the rocket launcher…',
  'Spell-checking the warheads…',
  'Warning the aliens…',
  'Brewing Granny\u2019s tea…',
];
function runSplash() {
  const splash = document.getElementById('splash');
  if (!splash) { boot(); return; }
  const params = new URLSearchParams(location.search);
  const force = params.get('splash') === 'always';
  // Explicit override only — '?nosplash' bails immediately. (Previously
  // '?dev' auto-skipped, but that hides the splash during dev work where
  // the user is actively iterating on it.)
  if (params.has('nosplash') && !force) {
    console.log('[splash] skipped via ?nosplash');
    hideSplash(true); boot(); return;
  }
  // Per-session: once you've watched it through, refreshes don't replay it.
  // Override with ?splash=always or open a new tab.
  let seen = false;
  try { seen = sessionStorage.getItem('grannyboom.splashSeen') === '1'; } catch (_) {}
  if (seen && !force) {
    console.log('[splash] skipped — already seen this tab session. Use ?splash=always to replay.');
    hideSplash(true); boot(); return;
  }

  const fill = document.getElementById('splashFill');
  const msg  = document.getElementById('splashMsg');
  const cnt  = document.getElementById('splashCount');
  const loading = document.getElementById('splashLoading');
  const skipBtn = document.getElementById('splashSkip');
  const welcome = document.getElementById('splashWelcome');
  // Personalise the welcome heading if we already know the player's name.
  // New visitors (state.name empty) just get the generic greeting.
  if (welcome) {
    const nm = (state && state.name) ? String(state.name).trim() : '';
    if (nm) {
      welcome.innerHTML = 'Granny Boom welcomes you, <span class="name"></span>!';
      welcome.querySelector('.name').textContent = nm;
    } else {
      welcome.textContent = 'Granny Boom welcomes you!';
    }
  }

  let cancelled = false;
  const timers = [];
  const setT = (fn, ms) => { const id = setTimeout(fn, ms); timers.push(id); return id; };
  const clearAll = () => { for (const t of timers) clearTimeout(t); timers.length = 0; };

  // Loading bar fills smoothly over LOAD_MS while the quip rotates a couple
  // of times. Then the countdown takes over.
  const LOAD_MS = 2400;
  const STEPS = 30;
  const showMsg = (text) => {
    if (!msg) return;
    msg.classList.remove('show');
    setT(() => { msg.textContent = text; msg.classList.add('show'); }, 120);
  };
  const pickMsg = () => SPLASH_MESSAGES[Math.floor(Math.random() * SPLASH_MESSAGES.length)];
  showMsg(pickMsg());
  setT(() => showMsg(pickMsg()), Math.round(LOAD_MS * 0.4));
  setT(() => showMsg(pickMsg()), Math.round(LOAD_MS * 0.75));
  for (let i = 1; i <= STEPS; i++) {
    setT(() => { if (!cancelled && fill) fill.style.width = ((i / STEPS) * 100) + '%'; },
      Math.round((LOAD_MS / STEPS) * i));
  }
  setT(() => { if (!cancelled) showMsg('Ready to slay!'); }, LOAD_MS + 60);

  // Countdown — three numbers then BOOM. Each slot reuses the same node;
  // CSS animation fires anew because we remove + re-append the element.
  const showCount = (html, slotMs) => setT(() => {
    if (cancelled) return;
    if (loading) loading.style.opacity = '0';
    if (cnt) {
      cnt.innerHTML = html;
      // Force a reflow so the animation restarts every slot.
      void cnt.offsetWidth;
    }
  }, slotMs);
  let t = LOAD_MS + 400;
  showCount('<span class="num">3</span>', t);          t += 700;
  showCount('<span class="num">2</span>', t);          t += 700;
  showCount('<span class="num">1</span>', t);          t += 700;
  showCount('<span class="boom">BOOM!</span>', t);     t += 900;
  setT(() => { if (!cancelled) finish(false); }, t);

  function finish(skipped) {
    cancelled = true;
    clearAll();
    hideSplash(skipped);
    boot();
  }
  skipBtn.addEventListener('click', () => finish(true));
  splash.addEventListener('click', (e) => {
    if (e.target === splash) finish(true);
  });
}
function hideSplash(immediate) {
  const splash = document.getElementById('splash');
  if (!splash) return;
  try { sessionStorage.setItem('grannyboom.splashSeen', '1'); } catch (_) {}
  if (immediate) { splash.remove(); return; }
  splash.classList.add('fade-out');
  setTimeout(() => splash.remove(), 600);
}
function boot() {
  let migrated = false;
  for (const topic of CRITTER_TOPICS) {
    const c = getCritterRecord(topic);
    if (c && c.babyId) {
      delete c.babyId;
      migrated = true;
    }
  }
  if (migrated) {
    for (const k of Object.keys(CRITTER_IMGS)) delete CRITTER_IMGS[k];
  }
  retroactiveCritterQueue();
  if (processCritterHatches(false)) migrated = true;
  if (migrated) saveState();
  syncStreakUnlocks(true);
  syncShipUnlocks(true);
  const pending = drainPendingShipUnlock();
  if (pending) celebrateShipUnlock(pending, () => render());
  else render();
}

/* --------------------- BOOT --------------------- */
if (typeof STORIES === 'undefined' || !Array.isArray(STORIES) || !STORIES.length) {
  const app = document.getElementById('app');
  if (app) {
    app.innerHTML = '';
    app.appendChild(el('div', { class: 'panel', style: { margin: '24px' } },
      el('h2', {}, 'Story data missing'),
      el('p', {}, 'Could not load story data (js/stories-data.js and js/stories-extra.js). If you opened this file from disk, run it from your web host instead.')));
  }
} else {
  runSplash();
}
</script>
